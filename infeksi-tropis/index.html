<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infeksi Tropis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#F1F0E6;
        --bg-panel:#FFFFFF;
        --ink:#1B1F17;
        --muted:#6B6F5F;
        --line:#DDDCC7;
        --red:#2F6E4E;
        --red-deep:#1F4F38;
        --red-tint:#E3EFE6;
        --teal:#1F6E77;
        --teal-tint:#E1EFF0;
        --amber:#C1791B;
        --amber-tint:#FBEBD2;
        --shadow: 0 1px 2px rgba(27,31,23,0.06), 0 8px 24px rgba(27,31,23,0.05);
        --radius: 10px;
      }
      *{box-sizing:border-box;}
      html,body{margin:0;padding:0;}
      body{
        background:var(--bg);
        color:var(--ink);
        font-family:'IBM Plex Sans', sans-serif;
        -webkit-font-smoothing:antialiased;
        line-height:1.5;
      }
      h1,h2,h3,h4{
        font-family:'Fraunces', serif;
        font-weight:600;
        margin:0;
        letter-spacing:-0.01em;
      }
      .mono{font-family:'IBM Plex Mono', monospace;}
      ::selection{background:var(--red-tint); color:var(--red-deep);}
      a{color:inherit;}
      button{font-family:inherit;}

      /* ---------- App shell ---------- */
      #app{display:flex; min-height:100vh;}

      /* Sidebar */
      #sidebar{
        width:290px;
        flex-shrink:0;
        background:var(--bg-panel);
        border-right:1px solid var(--line);
        height:100vh;
        position:sticky;
        top:0;
        overflow-y:auto;
        padding:20px 14px 40px;
      }
      .sb-brand{
        display:flex; align-items:center; gap:10px;
        padding:6px 8px 18px;
        border-bottom:1px solid var(--line);
        margin-bottom:14px;
        transition:opacity .15s ease;
      }
      .sb-brand:hover{opacity:0.7;}
      .sb-brand .cell{
        width:34px;height:34px;border-radius:50%;
        background:radial-gradient(circle at 32% 30%, #4f9970, var(--red-deep) 70%);
        box-shadow: inset 0 -3px 6px rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.15);
        flex-shrink:0;
      }
      .sb-brand .t1{font-size:17px; line-height:1.1;}
      .sb-brand .t2{font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-top:2px;}
      .watermark{
        font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--muted); opacity:0.55;
        text-align:right; margin:-8px 4px 14px 0; letter-spacing:0.02em;
      }

      .search-box{
        display:flex; align-items:center; gap:8px;
        background:var(--bg);
        border:1px solid var(--line);
        border-radius:8px;
        padding:8px 10px;
        margin-bottom:16px;
      }
      .search-box input{
        border:none; background:transparent; outline:none;
        font-size:13.5px; width:100%; color:var(--ink); font-family:inherit;
      }
      .search-box svg{flex-shrink:0; opacity:0.5;}

      .mode-toggle{
        display:flex; background:var(--bg); border:1px solid var(--line);
        border-radius:8px; padding:3px; margin-bottom:18px; gap:3px;
      }
      .mode-toggle button{
        flex:1; border:none; background:transparent; padding:8px 6px;
        border-radius:6px; font-size:12.5px; font-weight:600; color:var(--muted);
        cursor:pointer; transition:all .15s ease;
      }
      .mode-toggle button.active{background:var(--red); color:#fff; box-shadow:var(--shadow);}

      .nav-cat{margin-bottom:4px;}
      .nav-cat-head{
        display:flex; align-items:center; justify-content:space-between;
        padding:9px 8px; cursor:pointer; border-radius:7px;
        font-size:13px; font-weight:600;
        user-select:none;
      }
      .nav-cat-head:hover{background:var(--bg);}
      .nav-cat-head .chev{transition:transform .18s ease; opacity:0.5;}
      .nav-cat-head .badge-count{
        font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted);
        background:var(--bg); border:1px solid var(--line); border-radius:20px;
        padding:1px 7px; margin-left:6px;
      }
      .nav-cat.open .chev{transform:rotate(90deg);}
      .nav-list{max-height:0; overflow:hidden; transition:max-height .25s ease;}
      .nav-cat.open .nav-list{max-height:1200px;}
      .nav-item{
        display:flex; align-items:center; gap:8px;
        padding:7px 8px 7px 22px; font-size:13px; cursor:pointer;
        border-radius:7px; color:var(--muted); position:relative;
      }
      .nav-item:hover{background:var(--bg); color:var(--ink);}
      .nav-item.active{background:var(--red-tint); color:var(--red-deep); font-weight:600;}
      .nav-item .dot{width:5px;height:5px;border-radius:50%; background:currentColor; opacity:0.5; flex-shrink:0;}
      .nav-item .check{
        margin-left:auto; width:14px; height:14px; border-radius:50%;
        border:1.5px solid var(--line); flex-shrink:0;
      }
      .nav-item .check.done{background:var(--teal); border-color:var(--teal);}

      .sb-progress{
        margin-top:20px; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--line);
      }
      .sb-progress .lbl{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:6px;}
      .sb-progress .bar{height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
      .sb-progress .fill{height:100%; background:linear-gradient(90deg, var(--teal), #164e55); border-radius:4px; transition:width .3s ease;}
      .sb-progress-foot{
        display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px;
      }
      .sb-progress-foot span{font-size:10px; color:var(--muted); opacity:0.8;}
      .sb-progress-foot button{
        border:none; background:transparent; color:var(--muted); font-size:10.5px; font-weight:600;
        cursor:pointer; text-decoration:underline; padding:0; flex-shrink:0;
      }
      .sb-progress-foot button:hover{color:var(--red);}

      /* Main */
      #main{flex:1; min-width:0;}
      .topbar{
        position:sticky; top:0; z-index:5;
        background:rgba(241,239,233,0.88); backdrop-filter:blur(8px);
        border-bottom:1px solid var(--line);
        padding:14px 40px; display:none; align-items:center; gap:10px;
      }
      .hamburger{display:none; border:1px solid var(--line); background:#fff; border-radius:8px; width:36px; height:36px; align-items:center; justify-content:center; cursor:pointer;}

      .content-wrap{max-width:880px; margin:0 auto; padding:56px 40px 120px;}
    </style>
  </head>
  <body>
    <style>
      /* ---------- Hero (home view) ---------- */
      .hero{padding-bottom:12px;}
      .hero .eyebrow{
        font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em;
        text-transform:uppercase; color:var(--red); display:flex; align-items:center; gap:8px; margin-bottom:14px;
      }
      .hero .eyebrow::before{content:""; width:20px; height:1px; background:var(--red);}
      .hero h1{font-size:clamp(34px,5vw,52px); line-height:1.02;}
      .hero h1 em{font-style:italic; color:var(--red);}
      .hero p.lede{font-size:16.5px; color:var(--muted); max-width:560px; margin-top:16px;}
      .hero-stats{display:flex; gap:28px; margin-top:30px; flex-wrap:wrap;}
      .hero-stats .stat b{font-family:'Fraunces',serif; font-size:28px; display:block;}
      .hero-stats .stat span{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}

      /* Signature: MCV algorithm widget */
      .algo-widget{
        margin-top:40px; background:var(--bg-panel); border:1px solid var(--line); border-radius:14px;
        padding:28px 28px 24px; box-shadow:var(--shadow);
      }
      .algo-widget h3{font-size:16px; margin-bottom:4px;}
      .algo-widget .sub{font-size:12.5px; color:var(--muted); margin-bottom:20px;}
      .algo-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
      .algo-btn{
        flex:1; min-width:150px; text-align:left; border:1.5px solid var(--line); background:var(--bg);
        border-radius:9px; padding:12px 14px; cursor:pointer; transition:all .15s ease;
      }
      .algo-btn b{display:block; font-size:13.5px; font-family:'IBM Plex Mono',monospace;}
      .algo-btn span{font-size:11.5px; color:var(--muted);}
      .algo-btn:hover{border-color:var(--red); background:var(--red-tint);}
      .algo-btn.picked{border-color:var(--red); background:var(--red-tint); box-shadow:inset 0 0 0 1px var(--red);}
      .algo-result{
        margin-top:16px; padding:16px 18px; border-radius:10px; background:var(--teal-tint);
        border:1px solid #c2dcdd; font-size:13.5px; min-height:20px;
      }
      .algo-result .rlabel{font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal); font-weight:600; margin-bottom:6px;}
      .algo-result .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
      .chip{
        background:#fff; border:1px solid var(--line); padding:5px 11px; border-radius:20px; font-size:12.5px;
        font-family:'IBM Plex Mono', monospace; cursor:pointer;
      }
      .chip:hover{border-color:var(--teal); color:var(--teal);}

      .home-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; margin-top:44px;}
      .home-card{
        background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:18px;
        cursor:pointer; transition:all .15s ease;
      }
      .home-card:hover{transform:translateY(-2px); box-shadow:var(--shadow); border-color:#cfc9ba;}
      .home-card .n{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--red); margin-bottom:8px;}
      .home-card h4{font-size:15.5px;}
      .home-card p{font-size:12.5px; color:var(--muted); margin-top:6px;}

      /* ---------- Topic page ---------- */
      .crumbs{font-size:12px; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:6px;}
      .crumbs .sep{opacity:0.5;}
      .topic-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:6px;}
      .topic-head h1{font-size:clamp(28px,4vw,40px);}
      .badge-level{
        font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#fff;
        background:var(--red); border-radius:6px; padding:4px 9px; flex-shrink:0; margin-top:6px;
        white-space:nowrap;
      }
      .topic-sub{color:var(--muted); font-size:14.5px; margin-bottom:8px;}
      .mark-btn{
        display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--line); background:#fff;
        padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; margin:18px 0 8px;
        color:var(--muted);
      }
      .mark-btn.done{border-color:var(--teal); background:var(--teal-tint); color:var(--teal);}
      .mark-btn .dotc{width:9px;height:9px;border-radius:50%; border:1.5px solid currentColor;}
      .mark-btn.done .dotc{background:var(--teal);}

      .section-block{margin-top:30px;}
      .section-block h2{
        font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--red);
        font-family:'IBM Plex Mono', monospace; font-weight:600;
        display:flex; align-items:center; gap:10px; margin-bottom:14px;
      }
      .section-block h2::after{content:""; flex:1; height:1px; background:var(--line);}
      .section-block ul{margin:0; padding-left:20px;}
      .section-block li{margin-bottom:7px; font-size:14.5px;}
      .section-block p{font-size:14.5px; margin:0 0 10px;}
      .section-block .sub-h{font-weight:600; font-size:14px; margin-top:14px; margin-bottom:6px; font-family:'Fraunces',serif;}

      .extra-wrap{margin-top:34px; border-top:2px dashed var(--line); padding-top:26px;}
      .extra-wrap-head{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
      .extra-wrap-head .tag{
        font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; letter-spacing:0.06em;
        color:#fff; background:var(--teal); padding:3px 9px; border-radius:20px; text-transform:uppercase;
      }
      .extra-wrap-head b{font-family:'Fraunces',serif; font-size:16px;}
      .extra-wrap-note{font-size:12px; color:var(--muted); margin-bottom:18px;}
      .extra-block{margin-top:22px;}
      .extra-block h3{
        font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal);
        font-family:'IBM Plex Mono', monospace; font-weight:600; display:flex; align-items:center; gap:10px; margin-bottom:10px;
      }
      .extra-block h3::after{content:""; flex:1; height:1px; background:var(--line);}
      .extra-block ul{margin:0; padding-left:20px;}
      .extra-block li{margin-bottom:7px; font-size:14px;}

      .topic-images{display:flex; gap:14px; flex-wrap:wrap; margin:18px 0;}
      .topic-image-card{
        background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
        overflow:hidden; width:200px; flex-shrink:0; box-shadow:var(--shadow);
      }
      .topic-image-card img{display:block; width:100%; height:auto;}
      .topic-image-card .cap{padding:9px 11px; font-size:11.5px; color:var(--muted); line-height:1.4;}
      @media (max-width:640px){ .topic-image-card{width:100%;} }

      .callout{
        border-radius:10px; padding:16px 18px; margin:14px 0; font-size:13.5px; border:1px solid;
      }
      .callout.mnemonic{background:var(--amber-tint); border-color:#e3ca9a;}
      .callout.mnemonic .clabel{font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--amber); font-weight:700; margin-bottom:6px;}
      .callout.key{background:var(--red-tint); border-color:#a8cdb5;}
      .callout.key .clabel{font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--red-deep); font-weight:700; margin-bottom:6px;}

      table.data-tbl{width:100%; border-collapse:collapse; margin:14px 0; font-size:13px;}
      table.data-tbl th, table.data-tbl td{border:1px solid var(--line); padding:9px 11px; text-align:left; vertical-align:top;}
      table.data-tbl th{background:var(--bg); font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted);}
      table.data-tbl tr:nth-child(even) td{background:#fbfaf7;}

      .topic-nav{display:flex; justify-content:space-between; margin-top:56px; padding-top:22px; border-top:1px solid var(--line); gap:14px;}
      .tn-btn{flex:1; border:1px solid var(--line); background:#fff; border-radius:10px; padding:14px 16px; cursor:pointer; max-width:48%;}
      .tn-btn .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}
      .tn-btn .ttl{font-family:'Fraunces',serif; font-size:15px; margin-top:3px;}
      .tn-btn.next{text-align:right; margin-left:auto;}

      /* ---------- Quiz ---------- */
      .quiz-shell{max-width:680px; margin:0 auto; padding:56px 40px 100px;}
      .quiz-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:26px;}
      .quiz-progress-track{height:6px; background:var(--line); border-radius:4px; flex:1; margin:0 16px; overflow:hidden;}
      .quiz-progress-fill{height:100%; background:var(--red); border-radius:4px; transition:width .3s ease;}
      .quiz-count{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--muted); white-space:nowrap;}
      .qcard{background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:28px; box-shadow:var(--shadow);}
      .qcard .vignette{font-size:15px; line-height:1.65; margin-bottom:20px;}
      .qcard .question{font-weight:600; font-size:15px; margin-bottom:18px; font-family:'Fraunces',serif;}
      .opt{
        display:flex; gap:12px; align-items:flex-start; padding:13px 14px; border:1.5px solid var(--line);
        border-radius:9px; margin-bottom:10px; cursor:pointer; font-size:14px; transition:all .12s ease;
      }
      .opt:hover{border-color:#c9a; background:var(--red-tint);}
      .opt .lt{
        width:24px;height:24px; border-radius:50%; border:1.5px solid var(--line); flex-shrink:0;
        display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;
        font-family:'IBM Plex Mono',monospace;
      }
      .opt.correct{border-color:var(--teal); background:var(--teal-tint);}
      .opt.correct .lt{background:var(--teal); border-color:var(--teal); color:#fff;}
      .opt.wrong{border-color:var(--red); background:var(--red-tint);}
      .opt.wrong .lt{background:var(--red); border-color:var(--red); color:#fff;}
      .opt.disabled{cursor:default;}
      .opt.disabled:hover{background:none;}
      .opt.dim{opacity:0.55;}

      .qexplain{margin-top:16px; padding:15px 16px; background:var(--bg); border-radius:9px; font-size:13.5px; border-left:3px solid var(--teal); display:none;}
      .qexplain.show{display:block;}
      .qexplain b{color:var(--teal);}
      .qnext-row{display:flex; justify-content:flex-end; margin-top:18px;}
      .btn-primary{
        background:var(--red); color:#fff; border:none; padding:11px 22px; border-radius:8px;
        font-weight:600; font-size:13.5px; cursor:pointer;
      }
      .btn-primary:disabled{opacity:0.35; cursor:not-allowed;}
      .btn-ghost{background:transparent; border:1.5px solid var(--line); padding:11px 22px; border-radius:8px; font-weight:600; font-size:13.5px; cursor:pointer;}
      .btn-ghost:disabled{opacity:0.35; cursor:not-allowed;}

      .quiz-result{text-align:center; padding:40px 20px;}
      .quiz-result .score{font-family:'Fraunces',serif; font-size:64px; margin:14px 0;}
      .quiz-result .score span{font-size:28px; color:var(--muted);}

      /* ---------- Flow / algorithm diagrams (from PPT schemes) ---------- */
      .flowcard{
        background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
        padding:22px 22px 20px; margin-top:14px;
      }
      .flowcard .fnote{font-size:12px; color:var(--muted); margin-bottom:16px;}
      .fstep{
        display:flex; align-items:center; gap:12px; margin-bottom:10px;
      }
      .fstep .fbox{
        background:var(--bg); border:1.5px solid var(--line); border-radius:9px; padding:10px 14px;
        font-size:13px; font-weight:600; flex-shrink:0;
      }
      .fstep .farrow{color:var(--muted); font-size:15px; flex-shrink:0;}
      .fstep .fresult{font-size:13px; color:var(--muted);}
      .fsplit{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:10px 0 4px;}
      .fsplit.three{grid-template-columns:1fr 1fr 1fr;}
      .fbranch{
        border:1.5px solid var(--line); border-radius:10px; padding:14px 15px; background:var(--bg);
      }
      .fbranch.red{border-color:#a8cdb5; background:var(--red-tint);}
      .fbranch.teal{border-color:#a8cfd2; background:var(--teal-tint);}
      .fbranch.amber{border-color:#e3ca9a; background:var(--amber-tint);}
      .fbranch .flabel{
        font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
        color:var(--muted); margin-bottom:6px; font-weight:600;
      }
      .fbranch.red .flabel{color:var(--red-deep);}
      .fbranch.teal .flabel{color:var(--teal);}
      .fbranch.amber .flabel{color:var(--amber);}
      .fbranch .fhead{font-family:'Fraunces',serif; font-size:15px; margin-bottom:6px;}
      .fbranch ul{margin:0; padding-left:16px;}
      .fbranch li{font-size:12.5px; margin-bottom:4px;}
      .fbranch p{font-size:12.5px; margin:0;}
      .fdivider{
        display:flex; align-items:center; gap:8px; margin:16px 0 10px; font-size:11px;
        color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-family:'IBM Plex Mono',monospace;
      }
      .fdivider::before, .fdivider::after{content:""; flex:1; height:1px; background:var(--line);}
      .fseq{counter-reset:fseq; margin-top:6px;}
      .fseq-item{
        counter-increment:fseq; display:flex; gap:14px; padding:12px 0; border-top:1px solid var(--line);
      }
      .fseq-item:first-child{border-top:none;}
      .fseq-item .fnum{
        width:26px; height:26px; border-radius:50%; background:var(--red); color:#fff; flex-shrink:0;
        display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;
      }
      .fseq-item .fbody b{display:block; font-size:13.5px; margin-bottom:3px;}
      .fseq-item .fbody span{font-size:12.5px; color:var(--muted);}
      @media (max-width:640px){
        .fsplit, .fsplit.three{grid-template-columns:1fr;}
      }

      /* ---------- Scroll reveal ---------- */
      .reveal{opacity:0; transform:translateY(10px); animation:rise .5s ease forwards;}
      @keyframes rise{to{opacity:1; transform:none;}}

      @media (max-width:880px){
        #sidebar{position:fixed; left:0; top:0; z-index:50; transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,0.25); width:280px;}
        #sidebar.open{transform:translateX(0);}

      const TOPICS = [
      // ---------------- HIV ----------------
      {
        id:'hiv', cat:'hiv', level:'4A/3A', title:'HIV — Etiologi & Stadium Klinis',
        sub:'Infeksi virus yang menyerang sistem imun (sel CD4), menular lewat cairan tubuh tertentu.',
        sections:[
          {h:'Patofisiologi Singkat', list:['HIV (Human Immunodeficiency Virus) menginfeksi dan menghancurkan sel limfosit T CD4 — sel yang berperan sebagai "komandan" sistem imun yang mengoordinasikan respons terhadap infeksi. Seiring waktu, jumlah CD4 terus menurun sehingga tubuh kehilangan kemampuan melawan infeksi yang biasanya mudah dikendalikan oleh orang sehat (infeksi oportunistik).','AIDS (Acquired Immunodeficiency Syndrome) adalah kumpulan gejala/penyakit yang muncul akibat kerusakan sistem imun oleh HIV pada stadium lanjut — jadi AIDS bukan nama virusnya, melainkan kondisi klinis yang ditimbulkan HIV setelah imunitas sangat rendah.']},
          {h:'Transmisi', list:['Menular melalui cairan tubuh tertentu: darah, muntahan, semen, sekresi vagina, ASI, dan pus (nanah).','Keringat, air mata, air liur, dan urin TIDAK menularkan HIV — poin penting yang sering jadi jebakan soal, karena banyak yang mengira kontak sehari-hari (berjabat tangan, berbagi alat makan) berisiko menular, padahal virus tidak cukup pekat pada cairan-cairan tersebut.','Tiga jalur transmisi utama: paparan darah/produk darah yang terinfeksi, transmisi seksual, dan transmisi perinatal (ibu ke anak saat kehamilan/persalinan/menyusui).']},
          {h:'Stadium Infeksi (Perjalanan Penyakit)', list:['Serokonversi: fase awal infeksi saat tubuh mulai membentuk antibodi terhadap HIV — disebut juga "window period", periode sekitar 6 bulan pertama pasca infeksi di mana virus sudah ada tapi antibodi belum cukup terbentuk untuk terdeteksi tes standar.','Asimptomatik: belum ada tanda/gejala HIV, dan belum terjadi supresi sistem imun yang bermakna — jumlah CD4 relatif masih terjaga.','Simptomatik: mulai muncul tanda/gejala infeksi HIV, seiring supresi sistem imun yang semakin nyata (CD4 mulai turun signifikan).','AIDS: stadium akhir (end-stage), ditandai infeksi oportunistik yang muncul karena sistem imun sudah sangat lemah untuk melawannya.']},
          {h:'Fase Infeksi Akut vs Kronis', sub:[
            {t:'Infeksi HIV Akut (awal/primer)', list:['Dapat asimtomatik, atau muncul sebagai "acute retroviral syndrome" — gejala menyerupai flu (flu-like syndrome): demam, nyeri telan, limfadenopati, diare, nyeri kepala, nyeri sendi-otot.','Periode serokonversi/"window period" terjadi di fase ini — antibodi anti-HIV baru mulai terdeteksi setelah infeksi (dalam 6 bulan pertama pasca infeksi), sehingga tes serologi bisa memberi hasil negatif palsu bila diperiksa terlalu dini.']},
            {t:'Infeksi HIV Kronis', list:['Viral load meningkat tajam dan CD4 count menurun tajam secara progresif seiring waktu tanpa terapi.','Dapat asimtomatik untuk waktu lama, atau simptomatik dengan kondisi non-AIDS-defining (belum termasuk kriteria AIDS, tapi sudah menunjukkan gangguan imun).']},
            {t:'AIDS', list:['Ditegakkan bila pasien HIV memiliki CD4 <200 ATAU sudah muncul kondisi AIDS-defining conditions (infeksi oportunistik spesifik) — kriteria kedua ini berlaku terlepas dari berapa pun jumlah CD4 saat itu.']},
          ]},
          {h:'Stadium Klinis WHO', sub:[
            {t:'Stadium Klinis 1', list:['Tidak ada gejala.','Limfadenopati generalisata persisten.']},
            {t:'Stadium Klinis 2', list:['Penurunan BB sedang tanpa sebab jelas (<10% dari perkiraan BB atau BB sebelumnya).','Infeksi saluran napas berulang (sinusitis, tonsilitis, otitis media, faringitis).','Herpes zoster, ulkus mulut berulang, kelitis angularis, ruam kulit gatal di lengan/tungkai, dermatitis seboroik, infeksi jamur kuku (onikomikosis).']},
            {t:'Stadium Klinis 3', list:['Penurunan BB banyak tanpa sebab jelas (>10% dari perkiraan BB atau BB sebelumnya).','Diare kronis tanpa sebab jelas >1 bulan; demam intermiten/menetap tanpa sebab jelas >1 bulan.','Kandidiasis mulut berulang, Oral Hairy Leukoplakia pada lidah, tuberkulosis paru.','Infeksi bakteri berat (pneumonia, empiema, meningitis, piomiositis, infeksi tulang/sendi, bakteremia); stomatitis/gingivitis/periodontitis nekrotikan ulseratif akut.','Anemia (<8 g/dL), neutropenia (<500/µL), dan/atau trombositopenia kronis (<50.000/µL) yang tak jelas penyebabnya.']},
            {t:'Stadium Klinis 4 (AIDS)', list:['HIV Wasting Syndrome, Pneumonia Pneumocystis (jiroveci), pneumonia bakteri berat berulang.','Infeksi herpes simpleks kronis (orolabial, genital, anorektal >1 bulan, atau viseral manapun); kandidiasis esofagal/trakea/bronkus/paru; tuberkulosis ekstraparu; sarkoma Kaposi.','Penyakit Cytomegalovirus (retinitis/infeksi organ lain selain hati-limpa-KGB); toksoplasmosis SSP; ensefalopati HIV; kriptokokus ekstraparu (termasuk meningitis).','Infeksi Mycobacterium non-tuberculosis diseminata; leukoensefalopati multifokal progresif; kriptosporidiosis & isosporiasis kronis; mikosis profunda (histoplasmosis, koksidioidomikosis).','Septikemia berulang (termasuk Salmonella non-tifoid); limfoma (serebral/non-Hodgkin); karsinoma serviks invasif; leishmaniasis atipikal diseminata; nefropati/kardiomiopati simptomatik terkait HIV.']},
          ]},
          {h:'Membedakan Oral Thrush vs Hairy Leukoplakia', list:['Keduanya sama-sama muncul sebagai plak putih di rongga mulut pada pasien HIV, tapi penyebab dan cara membedakannya berbeda jauh — sering jadi jebakan soal karena tampilannya mirip sekilas.']},
        ],
        table:{title:'Oral Thrush vs Hairy Leukoplakia', head:['Aspek','Oral Thrush (Candidiasis)','Hairy Leukoplakia'],
          rows:[
            ['Penyebab','Infeksi jamur oportunistik Candida albicans','Lesi prekanker, sering terkait infeksi EBV pada pasien HIV'],
            ['Populasi','Bayi, imunokompromais (HIV), pasien kemo/radioterapi','Terutama infeksi EBV dan HIV'],
            ['Lokasi & tampilan','Plak putih pada mukosa buccal, palatum, lidah, orofaring','Lateral lidah, palatum, mukosa buccal — plak putih hairy/feathery dengan peninggian'],
            ['Nyeri','Dapat nyeri','Tidak nyeri'],
            ['Bisa dilepas dari mukosa?','Ya, dapat dilepaskan dari permukaan mukosa','Tidak dapat dilepaskan dari permukaan mukosa'],
            ['Pemeriksaan','KOH → pseudohifa (+), yeast (+)','Diagnosis klinis, dikaitkan status EBV/HIV'],
          ]}
      },
      {
        id:'hiv-penunjang', cat:'hiv', level:'4A/3A', title:'HIV — Pemeriksaan Penunjang & Strategi Tes',
        sub:'Serologi bertingkat (3 strategi) untuk memastikan diagnosis, plus PCR untuk kasus khusus.',
        sections:[
          {h:'Jenis Pemeriksaan', list:['Serologi — EIA/ELISA (lebih superior dibanding rapid test dari segi akurasi) dan Rapid Test, keduanya mendeteksi antibodi terhadap HIV.','PCR — digunakan pada neonatus (karena antibodi ibu masih ada di darah bayi sehingga serologi tidak akurat) atau pada hasil pemeriksaan serologi yang inkonklusif/indeterminate.','CD4 dan Viral Load — bukan untuk skrining/diagnosis awal, melainkan untuk monitoring perjalanan penyakit dan respons terapi.']},
          {h:'3 Strategi Pemeriksaan HIV', list:['Konsep dasarnya: makin tinggi risiko/makin penting kepastian diagnosisnya, makin banyak reagen yang dipakai secara berjenjang — supaya hasil positif benar-benar meyakinkan sebelum pasien diberi label diagnosis HIV.']},
        ],
        table:{title:'3 Strategi Pemeriksaan HIV', head:['Strategi','Tujuan','Jumlah Reagen'],
          rows:[
            ['Strategi I','Pemeriksaan darah untuk donor atau transplantasi','1 reagen (A1)'],
            ['Strategi II','Studi epidemiologi, skrining acak (mis. ANC, IMS)','2 reagen (A1 dan A2)'],
            ['Strategi III','Diagnosis individu (mis. pada suspek bergejala)','3 reagen (A1, A2, A3)'],
          ]},
      },
      {
        id:'hiv-tatalaksana', cat:'hiv', level:'4A/3A', title:'HIV — Tatalaksana ARV & Profilaksis',
        sub:'Kombinasi ARV seumur hidup, diberikan tanpa memandang jumlah CD4.',
        sections:[
          {h:'Prinsip Terapi ARV', list:['ARV kombinasi diberikan kepada SEMUA pasien terkonfirmasi HIV tanpa memandang jumlah CD4 — berbeda dari pedoman lama yang menunggu CD4 turun ke ambang tertentu, prinsip terkini adalah "test and treat" karena terapi dini terbukti menekan progresivitas penyakit dan menurunkan risiko penularan.','Regimen dasar: 2 NRTI + 1 NNRTI.']},
          {h:'ARV Lini Pertama Dewasa', list:['Paduan pilihan: TDF (Tenofovir) + 3TC/FTC (Lamivudin/Emtricitabine) + EFV (Efavirenz), tersedia dalam bentuk KDT (Kombinasi Dosis Tetap) — dikenal sebagai TELE (Tenofovir-Lamivudin-Efavirenz), memudahkan kepatuhan karena cukup 1 tablet/hari.','Paduan alternatif: AZT (Zidovudine) + 3TC + EFV (atau NVP/Nevirapine), atau TDF + 3TC + NVP.','Regimen anak: menggunakan Zidovudine sebagai bagian dari terapinya.']},
          {h:'Efek Samping ARV', list:['Tenofovir (TDF): disfungsi tubulus renal, Sindrom Fanconi, penurunan densitas tulang, asidosis laktat, hepatomegali dengan steatosis, eksaserbasi Hepatitis B.','Lamivudin (3TC): neuropati perifer (jarang), lipoatrofi/lipodistrofi, asidosis laktat, hepatomegali dengan steatosis.','Zidovudin (AZT): anemia, neutropenia berat, miopati, lipoatrofi/lipodistrofi, intoleransi saluran cerna, asidosis laktat, hepatomegali dengan steatosis.','Nevirapin (NVP): hepatotoksik, hipersensitivitas obat.','Efavirenz (EFV): toksisitas SSP, hepatotoksik, kejang, hipersensitivitas, ginekomastia.','Stavudin, Didanosin: neuropati perifer.']},
          {h:'TB dan HIV (Kemenkes 2016)', list:['Berlaku untuk semua anak <5 tahun tanpa melihat stadium klinis WHO dan berapapun jumlah CD4.','Pengobatan TB harus dimulai lebih dahulu, kemudian obat ARV diberikan dalam 2–8 minggu sejak mulai obat TB, TANPA menghentikan terapi TB — prinsip ini penting karena memulai ARV terlalu cepat pada pasien dengan beban kuman TB tinggi berisiko memicu IRIS (Immune Reconstitution Inflammatory Syndrome), reaksi inflamasi berlebihan akibat sistem imun yang pulih mendadak.','Pada ODHA+TB dengan CD4 <50 sel/mm³, ARV harus dimulai lebih cepat, yaitu dalam 2 minggu setelah mulai pengobatan TB — karena risiko kematian akibat imunosupresi berat lebih mengkhawatirkan dibanding risiko IRIS pada kondisi ini.','Untuk ODHA+TB dengan meningitis kriptokokus, ARV baru dimulai setelah 5 minggu pengobatan kriptokokus — karena IRIS pada meningitis kriptokokus bisa fatal (edema serebri berat), sehingga infeksi jamurnya perlu dikendalikan dulu sebelum sistem imun "dibangunkan" kembali oleh ARV.']},
          {h:'Profilaksis Infeksi Oportunistik (Dewasa)', list:['Profilaksis Kotrimoksazol — indikasi: stadium klinis 3 atau 4, CD4 ≤200/mm³, atau koinfeksi TB; dosis 960 mg per oral per hari.','Profilaksis Isoniazid (INH) — indikasi: dewasa dengan HIV tanpa TB aktif, atau anak <5 tahun; dosis dewasa 600 mg/hari selama 6 bulan, anak 10 mg/kgBB/hari selama 6 bulan.']},
          {h:'Profilaksis Bayi dari Ibu HIV Positif', list:['Semua bayi yang lahir dari ibu HIV — baik yang diberi ASI eksklusif maupun susu formula — harus diberi Zidovudin sejak hari pertama (usia 12 jam), selama 6 minggu, karena ketidakpatuhan adalah penyebab utama kegagalan pencegahan penularan.','Dosis Zidovudin/AZT: bayi cukup bulan 4 mg/kgBB/12 jam selama 6 minggu; bayi prematur <30 minggu 2 mg/kgBB/12 jam selama 4 minggu lalu 2 mg/kgBB/8 jam selama 2 minggu; bayi prematur 30–35 minggu 2 mg/kgBB/12 jam selama 2 minggu pertama, lalu 2 mg/kgBB/8 jam selama 2 minggu, diikuti 4 mg/kgBB/12 jam selama 2 minggu.','Diagnosis HIV pada bayi/anak <18 bulan menggunakan PCR HIV DNA (metode rekomendasi, dilakukan sesegera mungkin 4–6 minggu; bila bayi mendapat ASI, PCR dilakukan setelah ASI dihentikan minimal 6 minggu) — bukan serologi, karena antibodi ibu yang ditransfer ke bayi bisa memberi hasil positif palsu hingga usia 18 bulan.','Bila pada minggu ke-6 diagnosis HIV belum dapat disingkirkan, kotrimoksazol profilaksis dilanjutkan sampai usia 12 bulan atau sampai dinyatakan HIV negatif.']},
          {h:'Jenis Layanan Terkait HIV', list:['VCT (Voluntary Counseling & Testing): tes sukarela individu untuk mengetahui status HIV, disertai konseling.','PITC (Provider Initiated Testing and Counseling): tes atas inisiatif/rekomendasi petugas kesehatan.','PPTCT (Prevention of Parent to Child Transmission): layanan khusus untuk orang tua (terutama ibu hamil) yang terinfeksi HIV, untuk mencegah penularan ke anak.','CST (Care Support and Treatment): dukungan berkelanjutan bagi orang yang telah berstatus HIV positif.']},
        ]
      },
      // ---------------- LEPTOSPIROSIS ----------------
      {
        id:'leptospirosis', cat:'lepto', level:'4A/3B', title:'Leptospirosis',
        sub:'Infeksi spiroket Leptospira, ditularkan lewat urin tikus yang mencemari air/tanah/lumpur.',
        sections:[
          {h:'Definisi & Epidemiologi', list:['Leptospirosis adalah penyakit infeksius akibat infeksi spiroket genus Leptospira.','Leptospira hidup subur di daerah dengan sanitasi buruk, wilayah persawahan, air kotor, lumpur, dan tanah lembab — urin tikus (reservoir utama) mencemari lingkungan tersebut, dan manusia terinfeksi lewat kontak kulit/mukosa yang terluka dengan air/tanah yang terkontaminasi.','Leptospira sering tumbuh bersamaan dengan virus Dengue, sehingga daerah endemik Dengue sering berbarengan dengan daerah endemik Leptospira — kedua penyakit ini penting menjadi diagnosis banding satu sama lain pada pasien demam pasca banjir.']},
          {h:'Manifestasi Klinis', list:['Demam dan nyeri otot sebagai gejala inti.','Pemeriksaan fisik: injeksi konjungtiva (mata merah tanpa sekret, khas leptospirosis), jaundice, oliguria, perdarahan spontan, trombositopenia, nyeri perut, dan nyeri otot gastroknemius (betis) — nyeri tekan betis ini merupakan tanda yang sangat sering ditanyakan dan cukup spesifik untuk leptospirosis dibanding demam infeksi lain.']},
          {h:'Fase Penyakit', sub:[
            {t:'Fase 1 — Septikemia (4–7 hari)', list:['Demam tinggi, nyeri kepala, nyeri otot, nyeri sendi.','Dapat terjadi proteinuria dan peningkatan kreatinin.','Organisme dapat terdeteksi langsung dalam darah pada fase ini; uji serologi biasanya masih negatif karena antibodi belum terbentuk cukup.']},
            {t:'Fase 2 — Imun', list:['Mulai terbentuk antibodi IgM terhadap Leptospira.','Terdapat periode 1–3 hari bebas gejala, sebelum kemudian timbul gejala susunan saraf pusat (SSP).','Organisme pada fase ini terdeteksi di urin (bukan lagi di darah).']},
          ]},
          {h:'Weil\'s Syndrome (Icteric Leptospirosis)', list:['Merupakan bentuk leptospirosis berat, ditandai ikterus berat disertai gagal ginjal (dapat muncul hematuria dan oliguria), perdarahan saluran cerna dan paru, hingga syok — inilah yang membedakan leptospirosis "ringan" dari "berat" dalam menentukan pilihan antibiotik dan rute pemberiannya.']},
          {h:'Pemeriksaan Penunjang', list:['Laboratorium rutin: leukosit normal atau meningkat, peningkatan enzim transaminase liver, peningkatan ureum-kreatinin, peningkatan bilirubin, trombositopenia, proteinuria, piuria, mikrohematuria — gambaran yang mencerminkan keterlibatan multi-organ (hati, ginjal, sistem koagulasi).','Kultur: dapat mengonfirmasi diagnosis, namun prosesnya lama, mahal, dan tidak semua laboratorium bisa melakukannya. Sampel darah & CSF positif dalam 10 hari pertama gejala, sementara urin baru positif setelah hari ke-7 gejala (sesuai perpindahan organisme dari darah ke urin antara fase septikemia dan fase imun). Visualisasi bakteri memakai dark field microscopy atau fluorescent microscopy.','Serologi — lebih sering dipakai untuk konfirmasi diagnosis dalam praktik klinis dibanding kultur: MAT (Microscopic Agglutination Test) adalah gold standard di antara semua tes serologi, mendeteksi antibodi anti-leptospira yang baru terdeteksi setelah 1 minggu, dinyatakan positif bila titer >1:200 (pemeriksaan tunggal) atau >1:100 (pemeriksaan serial), dan lebih spesifik lagi bila titer meningkat ≥4 kali antara spesimen fase akut dan konvalesen. IgM ELISA dapat terdeteksi lebih awal, dalam 3–5 hari sakit.']},
          {h:'Tatalaksana', list:['Leptospirosis ringan (rawat jalan, oral): Doksisiklin 2×100 mg (7 hari), atau Ampisilin 4×500–750 mg (7 hari), atau Amoxicillin 4×500 mg (7 hari).','Leptospirosis berat (rawat inap, IV): Penisilin G 1,5 juta unit/6 jam (7 hari), atau Ampisilin 1 g/6 jam (7 hari), atau Amoxicillin 1 g/6 jam (7 hari), atau Ceftriaxone 1 g/hari (7 hari), atau Cefotaxim 1 g/6 jam (7 hari).','Kemoprofilaksis: Doksisiklin 200 mg/minggu, dimulai 1–2 hari sebelum dan selama periode paparan, untuk orang berisiko tinggi (mis. petugas yang bekerja di area banjir/persawahan).','Catatan penting: pada ibu hamil, hindari Doksisiklin (kontraindikasi kehamilan karena efek pada pertumbuhan tulang & gigi janin) — pilih golongan penisilin/sefalosporin sebagai gantinya.']},
        ]
      },
      // ---------------- DEMAM TIFOID ----------------
      {
        id:'demam-tifoid', cat:'tifoid', level:'4A', title:'Demam Tifoid',
        sub:'Penyakit sistemik akut akibat Salmonella typhi/paratyphi, dengan pola demam step-ladder yang khas.',
        sections:[
          {h:'Definisi & Etiologi', list:['Demam tifoid adalah penyakit sistemik akut yang disebabkan infeksi kuman Salmonella typhi atau Salmonella paratyphi.','Bakteri ini gram negatif, berflagel, dan tidak berspora. S. typhi memiliki 3 macam antigen: antigen O (somatik), antigen H (flagela), dan antigen Vi (kapsul) — ketiga antigen ini menjadi dasar berbagai pemeriksaan serologi seperti tes Widal.']},
          {h:'Manifestasi Klinis per Minggu', sub:[
            {t:'Minggu 1', list:['Demam dengan pola "step-ladder" — suhu meningkat bertahap tiap hari menyerupai anak tangga, bukan langsung tinggi sejak awal.','Nyeri kepala, nyeri perut, konstipasi (lebih sering pada dewasa) atau diare (lebih sering pada anak, klasik digambarkan sebagai "pea soup diarrhea").','Rose spot dapat muncul — bercak kemerahan kecil di kulit abdomen, namun sulit terlihat pada ras kaukasia (dan juga pada kulit gelap seperti masyarakat Indonesia).']},
            {t:'Minggu 2', list:['Demam menjadi terus-menerus (kontinu, bukan lagi bertahap).','Bradikardia relatif — nadi tidak meningkat sebanding dengan derajat demamnya, tanda klasik yang cukup spesifik untuk tifoid.','Lidah kotor dengan tepi hiperemis disertai tremor ("typhoid tongue").','Nyeri perut, hepatomegali (dapat ditemukan pada sekitar 50% kasus), dan splenomegali.']},
            {t:'Minggu 3', list:['Fase paling berisiko komplikasi: perdarahan usus, perforasi usus (akibat nekrosis plak Peyer di ileum terminal tempat bakteri berkumpul), meningitis tifosa, hepatitis tifosa, kolesistitis, dan lain-lain.']},
          ]},
          {h:'Cara Penularan — "5F"', list:['Food (makanan), Fingers (jari tangan yang tidak higienis), Fomites (benda-benda yang terkontaminasi), Fly (lalat sebagai vektor mekanis), dan Feces (feses penderita/carrier sebagai sumber utama) — kelima jalur ini menggambarkan siklus fecal-oral penyebaran demam tifoid, sehingga edukasi higiene dan sanitasi menjadi kunci pencegahan.']},
          {h:'Pemeriksaan Penunjang', list:['Baku emas: isolasi organisme lewat kultur, media empedu — namun waktu pengambilan sampel berbeda tiap minggu perjalanan penyakit karena lokasi bakteri berpindah: minggu 1 sampel darah dan sumsum tulang (bakteremia awal), minggu 2 sampel feses, minggu 3 sampel urin — diringkas mnemonic "DFU" (Darah, Feses, Urin) sesuai urutan minggunya.','Tes Widal — dilakukan di akhir minggu 1, mendeteksi reaksi antara antibodi aglutinin serum penderita terhadap antigen O (somatik) dan H (flagela); kenaikan titer O 1:320 atau kenaikan 4 kali lipat antara pemeriksaan mendukung diagnosis demam tifoid. Sensitivitas 64–74%, spesifisitas 76–83% — cukup moderate, sehingga rentan hasil positif/negatif palsu terutama di daerah endemis tinggi (titer dasar populasi sudah tinggi).','Tubex-TF — mendeteksi IgM terhadap antigen O9 (spesifik untuk Salmonella serogroup D, termasuk S. typhi). Sensitivitas dan spesifisitas bervariasi antar studi (100%/100% hingga 78%/94% hingga 91,2%/82,3%). Nilai skor >4 dinyatakan positif demam tifoid, dan >6 merupakan indikasi kuat demam tifoid — nilai ambang ini sering ditanyakan di soal.']},
          {h:'Tatalaksana', list:['Bed rest total, hindari beraktivitas terlalu banyak — untuk mencegah komplikasi seperti perforasi usus akibat aktivitas fisik berlebih saat plak Peyer sedang rapuh.','Simptomatik: antipiretik, antiemetik sesuai keluhan.','Diet: menjaga kecukupan asupan cairan (oral maupun parenteral), diet bergizi seimbang dengan konsistensi lunak, cukup kalori dan protein, namun rendah serat — serat kasar dihindari karena berisiko mengiritasi/melukai mukosa usus yang sedang meradang dan rapuh akibat infeksi.','Antibiotik lini pertama: Fluoroquinolone — Ciprofloxacin 2×500 mg (7–14 hari), Ofloxacin 2×400 mg (7–14 hari), atau Norfloxacin 2×400 mg (14 hari).','Antibiotik lini kedua: Cephalosporin generasi 3 — Ceftriaxone 3–4 gram/hari (3–5 hari), atau Cefixime 20 mg/kg/hari (7–14 hari).','Kelompok khusus: anak — Kloramfenikol 50–100 mg/kg/hari dibagi 4 dosis selama 14 hari (fluoroquinolone dihindari pada anak karena potensi mengganggu pertumbuhan kartilago); ibu hamil — Ampicillin, Amoxicillin, atau Ceftriaxone (fluoroquinolone dan kloramfenikol dihindari pada kehamilan).']},
        ],
        mnemonic:{label:'MED+EASY — Pilihan Antibiotik', text:'"DeCi Anak Malam" — Dewasa: Ciprofloxacin (fluoroquinolone). Anak: Kloramfenikol. (Malam = mengingatkan kloramfenikol sering dikaitkan risiko gray baby syndrome/aplastik, jadi hati-hati dosis pada anak).'}
      },
      // ---------------- MALARIA ----------------
      {
        id:'malaria', cat:'malaria', level:'4A', title:'Malaria',
        sub:'Infeksi parasit Plasmodium yang menyerang eritrosit, ditularkan nyamuk Anopheles betina.',
        sections:[
          {h:'Definisi & Epidemiologi', list:['Malaria adalah penyakit infeksi parasit yang disebabkan Plasmodium, menyerang eritrosit manusia.','Di Indonesia, daerah endemis malaria meliputi Kalimantan, Sulawesi Tengah hingga Utara, Maluku, Papua, Lombok, NTT, dan Sumatra bagian selatan — riwayat perjalanan/tinggal di wilayah-wilayah ini menjadi kunci kecurigaan diagnosis.','Patogen: Plasmodium falciparum, P. vivax, P. ovale, P. malariae, dan P. knowlesi. Vektor: nyamuk Anopheles sp. betina.']},
          {h:'Manifestasi Klinis', list:['Trias malaria klasik: menggigil → demam tinggi → berkeringat, terjadi berulang mengikuti siklus pecahnya skizon dari eritrosit yang terinfeksi (skizogoni eritrositik) — pola berulang inilah yang menjelaskan mengapa demam malaria bersifat periodik/siklik, bukan terus-menerus.','Riwayat yang penting digali: riwayat sakit malaria sebelumnya, riwayat berkunjung ke daerah endemis, dan riwayat tinggal di daerah endemis malaria.']},
          {h:'Morfologi & Karakteristik per Spesies', list:['Setiap spesies Plasmodium memiliki masa inkubasi, siklus demam, dan tanda khas pada apusan darah tepi yang berbeda — informasi ini krusial karena menentukan jenis obat antimalaria dan durasi terapi (khususnya kebutuhan primakuin untuk membasmi hipnozoit hati pada P. vivax/ovale).']},
        ],
        table:{title:'Perbandingan 4 Spesies Plasmodium', head:['Aspek','P. falciparum','P. vivax','P. ovale','P. malariae'],
          rows:[
            ['Masa inkubasi (hari)','9–14 (rerata 12)','12–17 (rerata 15)','16–18 (rerata 17)','18–40 (rerata 28)'],
            ['Siklus demam','Tidak beraturan (malaria tropikana)','48 jam (malaria tertiana)','50 jam (malaria tertiana)','72 jam (malaria kuartana)'],
            ['Eritrosit terinfeksi','Ukuran normal','Lebih besar, pucat','Lebih besar, oval','Ukuran normal'],
            ['Tanda khas (stippling)','Maurer\'s spots','Schüffner\'s dots','James dot','Ziemann\'s dots'],
            ['Bentuk tropozoit','Ring form kecil, accolé ring','Ameboid, ring','—','Bentuk pita (band form), rectangular'],
            ['Bentuk gametosit','Bulan sabit / pisang / sosis (khas!)','Sferis','Sferis','Sferis'],
          ]},

      {
        id:'malaria-tatalaksana', cat:'malaria', level:'4A', title:'Malaria — Tatalaksana & Profilaksis',
        sub:'ACT sebagai lini pertama, dengan tambahan primakuin sesuai spesies.',
        sections:[
          {h:'Prinsip Umum', list:['Semua jenis malaria diterapi dengan ACT (Artemisinin-based Combination Therapy) selama 3 hari sebagai lini pertama — contoh kombinasi ACT: dihidroartemisinin + piperakuin (DHP) atau artesunat + amodiakuin (Program Nasional Indonesia), artemeter + lumefantrine, atau artesunat + meflokuin.','Primakuin ditambahkan sebagai gametosidal (membunuh gametosit, mencegah penularan lanjut lewat nyamuk) dan pada P. vivax/ovale juga berfungsi hipnozoitosidal (membasmi bentuk dorman di hati yang menjadi sumber relaps) — inilah alasan durasi primakuin berbeda antar spesies.']},
          {h:'Regimen per Spesies', list:['P. falciparum: ACT (3 hari) + Primakuin dosis tunggal (0,75 mg/kgBB) — karena falciparum tidak memiliki fase hipnozoit hati, primakuin cukup dosis tunggal untuk efek gametosidal saja.','P. vivax / P. ovale: ACT (3 hari) + Primakuin 14 hari (0,25 mg/kg/hari) — durasi lebih panjang karena harus membasmi hipnozoit hati yang berpotensi menyebabkan relaps berulang bila tidak dieradikasi tuntas. Bila relaps, primakuin dosis ditingkatkan (0,5 mg/kg/hari, 14 hari).','P. malariae: ACT (3 hari) saja, tanpa primakuin — karena tidak memiliki fase hipnozoit hati (serupa falciparum) dan tidak memerlukan gametosidal tambahan seperti pada falciparum.']},
          {h:'Regimen Kelompok Khusus', list:['Malaria falsiparum lini kedua (bila lini pertama gagal): Kina (Quinine) + Primakuin + (Doksisiklin/Tetrasiklin).','Ibu hamil trimester 1: Kina + Klindamisin (7 hari) — kina dipilih karena relatif lebih aman di trimester awal dibanding artemisinin yang datanya masih terbatas untuk periode organogenesis; klindamisin menggantikan doksisiklin/tetrasiklin yang kontraindikasi pada kehamilan.','Ibu hamil trimester 2–3: DHP (3 hari) — pada trimester ini ACT sudah lebih dianggap aman.','Primakuin KONTRAINDIKASI pada ibu hamil dan anak — karena berisiko menyebabkan hemolisis berat, terutama pada individu dengan defisiensi G6PD yang skriningnya sulit dilakukan cepat di lapangan.']},
          {h:'Non-ACT & Efek Samping', list:['Klorokuin: sudah banyak resisten di berbagai daerah, sehingga tidak lagi jadi pilihan utama.','Kina dosis 200 mg: relatif aman untuk ibu hamil, namun perlu diwaspadai efek samping hipoglikemia, hipotensi, dan gangguan telinga (tinnitus/tuli sementara — dikenal sebagai cinchonism).']},
          {h:'Profilaksis Malaria (untuk pelancong ke daerah endemis)', list:['Daerah sensitif klorokuin: Klorokuin 2 tablet (500 mg)/minggu, dimulai 1–2 minggu sebelum paparan hingga 4 minggu setelah kembali.','Daerah resisten klorokuin (termasuk Indonesia): Doksisiklin 100 mg/hari (1–2 hari sebelum hingga 4 minggu setelah paparan; kontraindikasi anak <8 tahun dan ibu hamil), ATAU Meflokuin 250 mg/minggu (2 minggu sebelum hingga 4 minggu setelah; menjadi lini pertama untuk ibu hamil dan dapat diberikan pada anak), ATAU Atovaquone 250 mg/Proguanil 100 mg per hari (1–2 hari sebelum hingga 7 hari setelah paparan; dapat diberikan pada ibu hamil dan anak).']},
        ]
      },
      {
        id:'malaria-serebral', cat:'malaria', level:'3B', title:'Malaria Serebral',
        sub:'Komplikasi malaria falsiparum berat dengan penurunan kesadaran — kegawatdaruratan medis.',
        sections:[
          {h:'Definisi & Diagnosis', list:['Malaria serebral ditegakkan bila ditemukan Plasmodium falciparum stadium aseksual pada apusan darah, DISERTAI minimal SATU tanda klinis atau laboratorium tanda bahaya berikut — jadi bukan sekadar parasitemia falciparum saja, melainkan harus disertai bukti keterlibatan organ vital.']},
          {h:'Manifestasi Klinis (Tanda Bahaya)', list:['Perubahan kesadaran (GCS <11) — inilah yang secara spesifik disebut "malaria serebral".','Kelemahan otot generalisata (tidak bisa duduk/berjalan tanpa bantuan).','Kejang berulang (lebih dari 2 episode dalam 24 jam).','Distres pernapasan.','Gagal sirkulasi atau syok: CRT >3 detik, tekanan sistolik <80 mmHg (pada anak <70 mmHg).','Jaundice (bilirubin >3 mg/dL disertai kepadatan parasit >100.000/µL).','Hemoglobinuria (dikenal sebagai "black water fever" — urin berwarna gelap seperti teh/cola akibat hemolisis masif).','Perdarahan spontan abnormal.','Edema paru (dikonfirmasi radiologi, atau saturasi O2 <92%).']},
          {h:'Gambaran Laboratorium (Tanda Bahaya)', list:['Hipoglikemia (gula darah <40 mg%) — dapat terjadi akibat konsumsi glukosa oleh parasit sekaligus efek obat antimalaria tertentu (kina).','Asidosis metabolik (bikarbonat <15 mmol/L).','Anemia berat (Hb <5 g% untuk daerah endemis tinggi, atau <7 g% untuk daerah endemis sedang-rendah — ambangnya berbeda karena penduduk daerah endemis tinggi umumnya sudah lebih adaptif terhadap anemia kronik akibat infeksi berulang).','Hiperparasitemia (parasit >2% eritrosit atau >100.000 parasit/mm³ di daerah endemis rendah; atau >5% eritrosit atau >100.000 parasit/mm³ di daerah endemis tinggi).','Hiperlaktemia (asam laktat >5 mmol/L), hemoglobinuria, dan gangguan fungsi ginjal (kreatinin serum >3 mg%).']},
          {h:'Tatalaksana', list:['Di Puskesmas (fasilitas primer): Artesunat IM 3–4 mg/kgBB — sebagai stabilisasi awal sebelum rujukan ke fasilitas yang lebih lengkap, karena malaria serebral adalah kegawatdaruratan yang butuh terapi cepat sebelum pasien sempat dirujuk.','Di Rumah Sakit: Artesunat IV 2,4 mg/kgBB, diberikan hingga pasien sadar kembali — artesunat IV merupakan terapi pilihan utama malaria berat karena kerja cepat dan terbukti menurunkan mortalitas dibanding kina IV pada studi-studi besar.']},
        ],
        diagram:{title:'Alur Cepat Membedakan Diagnosis Banding Demam + Penurunan Kesadaran', note:'Tiga skenario UKMPPD yang sering tertukar: malaria serebral, meningitis TB, dan sindrom neurosistiserkosis — kuncinya pada riwayat perjalanan & gambaran penunjang.', html:`
          <div class="fsplit three">
            <div class="fbranch red">
              <div class="flabel">Malaria Serebral</div>
              <div class="fhead">Riwayat daerah endemis</div>
              <p>Demam periodik + penurunan kesadaran (GCS&lt;11), apusan darah: gametosit bentuk pisang/bulan sabit (P. falciparum).</p>
            </div>
            <div class="fbranch teal">
              <div class="flabel">Meningitis TB</div>
              <div class="fhead">Onset subakut-kronik</div>
              <p>Riwayat kontak TB, penurunan kesadaran bertahap, kaku kuduk, LCS: pleositosis limfositik, protein tinggi, glukosa rendah.</p>
            </div>
            <div class="fbranch amber">
              <div class="flabel">Neurosistiserkosis</div>
              <div class="fhead">Riwayat makan babi/T. solium</div>
              <p>Kejang fokal/umum berulang, nyeri kepala kronik, CT/MRI: lesi kistik multipel di otak.</p>
            </div>
          </div>`}
      },
      // ---------------- DEMAM DENGUE ----------------
      {
        id:'demam-dengue', cat:'dengue', level:'4A/3B', title:'Demam Dengue',
        sub:'Infeksi virus Dengue oleh nyamuk Aedes aegypti — spektrum dari demam ringan hingga syok.',
        sections:[
          {h:'Etiologi', list:['Vektor: nyamuk Aedes aegypti betina (aktif menggigit terutama pagi–sore hari, berbeda dari Anopheles vektor malaria yang aktif malam hari).','Virus Dengue memiliki 4 serotipe (DENV-1 hingga DENV-4) — infeksi oleh satu serotipe memberi imunitas seumur hidup terhadap serotipe tersebut, namun tidak melindungi terhadap serotipe lain, bahkan infeksi sekunder oleh serotipe berbeda justru berisiko menimbulkan gejala yang lebih berat (lihat teori antibody-dependent enhancement di bagian pemeriksaan penunjang).']},
          {h:'Spektrum Manifestasi Klinis', list:['Demam Dengue (Dengue Fever/DF) — bentuk paling ringan.','Demam Berdarah Dengue (Dengue Haemorrhagic Fever/DHF) — mencakup grade I dan II, ditandai bukti kebocoran plasma.','Dengue Shock Syndrome (DSS) — mencakup grade III dan IV, DHF yang sudah disertai kegagalan sirkulasi/syok.']},
          {h:'Manifestasi Klinis DF', list:['Dapat asimtomatis pada sebagian kasus.','Demam tinggi (38–39°C), nyeri kepala, nyeri di belakang mata (retro-orbital pain — cukup khas untuk dengue), nyeri sendi dan otot, mual-muntah.','Ruam (rash) makulopapular di dada, punggung, dan daerah fleksor lengan-kaki.']},
          {h:'Diagnosis Klinis — 3 Tingkat Keparahan', list:['Dengue Fever: demam, nyeri kepala, mialgia, artralgia, rash, manifestasi perdarahan ringan — tanpa bukti kebocoran plasma.','Dengue Haemorrhagic Fever: demam akut, kontinu, tinggi selama 2–7 hari, disertai manifestasi perdarahan (uji tourniquet positif, petekie, gusi berdarah, perdarahan saluran cerna), hepatomegali, dan mulai tampak tanda syok.','Expanded Dengue Syndrome: sudah menyebabkan kerusakan organ (liver, ginjal, otak, jantung) akibat syok hipovolemia berkepanjangan — bentuk paling berat dan mengancam nyawa.']},
          {h:'Uji Diaskopi', list:['Merupakan uji blanchability (pemucatan) pada kulit, dilakukan dengan menekan lesi kulit menggunakan benda transparan seperti kaca objek.','Berguna membedakan eritema (akibat vasodilatasi pembuluh darah — akan memucat saat ditekan) dengan petekie/purpura (akibat ekstravasasi eritrosit ke jaringan — TIDAK memucat saat ditekan, karena darahnya sudah keluar dari pembuluh, bukan sekadar melebar).','Interpretasi: (+) warna merah menghilang saat ditekan → eritema. (–) warna merah tidak menghilang → petekie/purpura, atau telangiektasis.']},
          {h:'Pemeriksaan Penunjang', list:['Tes tourniquet (Rumple Leede) — manset tensimeter dipertahankan di lengan dengan tekanan di antara sistolik dan diastolik selama 5 menit; hasil positif bila terdapat ≥10 petekie pada area 2,5×2,5 cm, menunjukkan tanda perdarahan/fragilitas kapiler.','Serologi: Rapid test NS1 (non-structural protein 1, dideteksi lebih awal karena merupakan bagian dari virus itu sendiri, bukan respons antibodi), RT-PCR, dan ELISA IgM-IgG anti-Dengue.','Interpretasi IgM-IgG: IgM(+)/IgG(–) → infeksi primer. IgM(+)/IgG(+) → infeksi sekunder. IgM(–)/IgG(+) → pernah terinfeksi (di masa lalu). IgM(–)/IgG(–) → tidak ada infeksi.','Teori Secondary Heterologous Infection: DHF berat dapat terjadi bila seseorang sebelumnya pernah terinfeksi satu serotipe Dengue, lalu terinfeksi kembali oleh serotipe yang berbeda — antibodi dari infeksi pertama tidak menetralkan virus serotipe baru secara sempurna, malah membentuk kompleks yang mempermudah virus masuk ke sel (antibody-dependent enhancement), memicu respons imun berlebihan yang justru memperparah kebocoran plasma. Gejala paling berat cenderung terjadi bila infeksi kedua oleh serotipe paling virulen, yaitu DEN-2.']},
          {h:'Alur Pemeriksaan Sesuai Hari Sakit', list:['Sebelum hari ke-5: isolasi virus, NS1, atau RT-PCR — pada fase ini virus/antigen virus masih beredar cukup untuk terdeteksi langsung.','Hari ke-5: NS1, RT-PCR, atau IgM-IgG.','Setelah hari ke-5: IgM-IgG — pada fase ini virus/antigennya sudah mulai bersih dari sirkulasi, sehingga deteksi beralih mengandalkan respons antibodi tubuh.']},
        ],
        table:{title:'Klasifikasi DF/DHF WHO 2021', head:['Klasifikasi','Grade','Tanda & Gejala','Laboratorium'],
          rows:[
            ['Dengue tanpa warning signs','DF','Demam + 2 dari: nyeri kepala, nyeri retro-orbital, mialgia, artralgia/nyeri tulang, rash, manifestasi perdarahan; tanpa bukti kebocoran plasma','Leukopenia (<5.000/mm³), trombositopenia (<150.000/mm³), Ht meningkat 5–10%'],
            ['Dengue dengan warning signs','DHF I','Demam + manifestasi perdarahan (tourniquet test +) + bukti kebocoran plasma','Trombosit <100.000/mm³; Ht meningkat >20%'],
            ['','DHF II','Seperti Grade I + perdarahan spontan','Trombosit <100.000/mm³; Ht meningkat >20%'],
            ['Severe Dengue','DHF III','Seperti Grade I/II + kegagalan sirkulasi (nadi lemah, tekanan nadi sempit <20mmHg, hipotensi, gelisah)','Trombosit <100.000/mm³; Ht meningkat >20%'],
            ['','DHF IV','Seperti Grade III + syok berat dengan TD dan nadi tidak terukur','Trombosit <100.000/mm³; Ht meningkat >20%'],
          ]}
      },
      {
        id:'fluid-overload', cat:'dengue', level:'3B', title:'Fluid Overload pada Dengue',
        sub:'Komplikasi tersering DSS akibat resusitasi cairan yang tidak sesuai algoritma.',
        sections:[
          {h:'Definisi', list:['Fluid overload merupakan komplikasi tersering dari Dengue Shock Syndrome (DSS) — pemberian cairan seharusnya sesuai algoritma dan bertujuan menjaga perfusi tetap adekuat, TIDAK asal diberikan sebanyak-banyaknya, karena kebocoran plasma pada DSS bersifat sementara (biasanya membaik dalam 24–48 jam) sehingga cairan berlebih yang diberikan akan "terjebak" di ruang ekstravaskular begitu kebocoran plasma mereda.']},
          {h:'Etiologi (Faktor Risiko Terjadinya Fluid Overload)', list:['Pemberian cairan IV yang berlebihan pada saat fase kritis, saat kapiler sedang sangat permeabel sehingga cairan yang diberikan justru banyak bocor ke jaringan interstisial alih-alih tetap di intravaskular.','Kesalahan penggunaan cairan kristaloid hipotonik seperti NaCl 0,45% — cairan hipotonik tidak ideal untuk resusitasi syok karena distribusinya cepat keluar dari ruang intravaskular.','Penggunaan volume cairan IV yang terlalu besar tanpa evaluasi berkala.','Pemberian cairan IV yang terlalu lama, misalnya tetap diteruskan meskipun tanda kebocoran plasma sudah membaik — inilah kesalahan tersering, karena begitu fase kritis terlewati (biasanya ditandai Ht mulai turun/stabil dan diuresis membaik), rate cairan harus segera diturunkan bertahap.']},
          {h:'Manifestasi Klinis', sub:[
            {t:'Manifestasi Awal', list:['Kelopak mata bengkak.','Takipnea, dispnea ringan.','Distensi abdomen, asites.','Peningkatan tekanan vena jugularis.']},
            {t:'Manifestasi Akhir (lebih berat)', list:['Distres pernapasan hingga impending respiratory failure (gagal napas yang mengancam).','Ronki basah basal (tanda edema paru).','Agitasi, hipoksia.']},
          ]},
          {h:'Pemeriksaan Penunjang', list:['AGDA (analisis gas darah arteri), laktat serum, EKG — menilai dampak sistemik dari kelebihan cairan dan gangguan perfusi yang menyertainya.','Foto polos dada: dapat ditemukan kardiomegali, efusi pleura, dan gambaran edema paru klasik berupa "bat\'s wings" (opasitas perihilar bilateral menyerupai sayap kelelawar) dengan atau tanpa Kerley B lines (garis-garis halus di lapangan paru bawah akibat penebalan septa interlobular oleh cairan).']},
          {h:'Tatalaksana', list:['Berikan oksigen untuk mengatasi hipoksia.','Segera turunkan rate cairan menjadi 1 cc/kgBB/jam bila tidak tersedia koloid — langkah pertama dan paling sederhana untuk menghentikan penambahan volume lebih lanjut.','Ganti kristaloid menjadi koloid bila tersedia — berikan Dextran 40 sebanyak 10 cc/kgBB bolus, maksimal 30 cc/kgBB/hari; koloid dipilih karena memiliki tekanan onkotik lebih tinggi sehingga lebih efektif menarik cairan kembali ke intravaskular dibanding menambah kristaloid.','Bila terjadi edema paru, berikan Furosemide 1 mg/kgBB/dosis untuk membantu mengeluarkan cairan berlebih lewat diuresis.','Evaluasi ketat setiap 15 menit — bila tidak membaik, ulangi pemberian furosemid dengan dosis dinaikkan menjadi 2 mg/kgBB/dosis.','Ukur volume urin secara ketat — bila oliguria menetap meski sudah dikoreksi, ini menunjukkan tanda-tanda gagal ginjal akut, dan perlu dipertimbangkan tindakan dialisis.']},
        ]
      },

        sections:[
          {h:'Klasifikasi Besar Helminths', list:['Nematoda (cacing gilig/bulat) — dibagi lagi menjadi kelompok Tissue (menyerang jaringan, contoh: Onchocerca, Brugia, Wuchereria, Dracunculus, Loa loa, Trichinella, Toxocara) dan kelompok GI (menyerang saluran cerna, contoh: Ascaris, Strongyloides, Trichuris, Enterobius, Hookworms, Trichinella).','Platyhelminthes (cacing pipih) — dibagi menjadi Trematoda (cacing daun/pipih tak bersegmen, dengan kelompok Tissue: Schistosoma, Paragonimus, Fasciola; dan kelompok GI: Clonorchis, Opisthorchis, Fasciola, Heterophyes) dan Cestoda (cacing pita bersegmen, dengan kelompok Tissue: Echinococcus, Cysticercosis, Coenurosis; dan kelompok Intestinal: Taenia saginata, Taenia solium, Diphyllobothrium latum, Hymenolepis nana).','Cara berpikir cepat untuk soal UKMPPD: identifikasi dulu golongan besarnya dari bentuk telur/morfologi, baru persempit ke spesies berdasarkan gejala klinis dan riwayat paparan (makan daging mentah, jalan tanpa alas kaki, kontak air tawar, dll).']},

      {
        id:'nematoda', cat:'cacing', level:'4A', title:'Nematoda (Cacing Gilig)',
        sub:'Ascaris, Hookworm, Trichuris, Enterobius, Strongyloides — kelompok cacing usus tersering.',
        sections:[
          {h:'Askariasis (Ascaris lumbricoides)', list:['Stadium infektif: telur cacing (tertelan lewat makanan/tangan terkontaminasi).','Manifestasi klinis: dapat asimtomatik; dapat keluar cacing dewasa saat BAB (sering jadi keluhan utama yang membawa pasien berobat); Sindrom Loeffler (sesak napas akibat migrasi larva melalui paru, memicu reaksi hipersensitivitas); nyeri perut, mual-muntah, anoreksia, diare; pada infestasi berat dapat menyebabkan ileus obstruktif (massa cacing menyumbat usus) dan malnutrisi pada anak.','Pemeriksaan penunjang: feses rutin, dijumpai telur dengan dinding tebal 2–3 lapis, bergerigi, berisi unsegmented ovum.']},
          {h:'Hookworm / Cacing Tambang (Ancylostoma duodenale & Necator americanus)', list:['Faktor risiko: tidak memakai alas kaki — larva filariform menembus kulit kaki yang kontak langsung dengan tanah terkontaminasi.','Stadium infektif: larva filariform (berbeda dari Ascaris/Trichuris yang stadium infektifnya telur).','Manifestasi klinis: ground itch (gatal di kulit tempat penetrasi larva), mual-muntah, anoreksia, nyeri abdomen; anemia (gejala 5L — lemah, letih, lesu, lunglai, lalai) akibat cacing dewasa menghisap darah dari mukosa usus secara kronik, menyebabkan perdarahan saluran cerna kronik; gangguan nutrisi.','Pemeriksaan penunjang: feses rutin (Harada Mori test untuk kultur larva), dijumpai telur dengan sitoplasma jernih berisi segmented ovum.']},
          {h:'Strongiloidiasis (Strongyloides stercoralis)', list:['Stadium infektif: larva filariform (serupa hookworm), namun unik karena Strongyloides dapat menyelesaikan siklus hidup penuh di dalam tubuh manusia (autoinfeksi) tanpa perlu keluar ke lingkungan — inilah yang membuat infeksinya bisa bertahan bertahun-tahun bahkan tanpa paparan ulang.','Manifestasi klinis: ground itch, larva currens (garis kemerahan yang bergerak cepat di kulit, khas Strongyloides), pruritus dan urtikaria bila kronik; nyeri abdomen atas akibat duodenitis, mual-muntah, anoreksia, diare.','Hyperinfection syndrome: komplikasi serius berupa diseminasi larva ke dalam darah dan SSP, terutama terjadi pada pasien imunokompromais (mis. pengguna kortikosteroid jangka panjang) — penting diwaspadai sebelum memberi imunosupresan pada pasien dengan riwayat tinggal di daerah endemis.','Pemeriksaan penunjang: dijumpai larva rhabditiform pada pemeriksaan feses, Harada Mori filter test, atau agar plate culture (metode paling sensitif).']},
          {h:'Trikuriasis (Trichuris trichiura)', list:['Faktor risiko: makan tanpa cuci tangan.','Stadium infektif: telur cacing.','Manifestasi klinis: dapat asimtomatik; diare dengan mukus dan/atau darah; prolaps rekti (pada infestasi berat, terutama anak); kolitis.','Pemeriksaan penunjang: feses rutin, dijumpai telur berbentuk tempayan dengan 2 operkulum (knob) di ujung atas dan bawah.']},
          {h:'Enterobiasis (Enterobius vermicularis)', list:['Faktor risiko: makan tanpa cuci tangan, sering pada anak usia sekolah karena penularan mudah antarteman (fecal-oral dan autoinfeksi lewat garukan).','Stadium infektif: telur cacing.','Manifestasi klinis: dapat asimtomatik; pruritus nokturna (gatal di sekitar anus terutama malam hari, saat cacing betina keluar untuk bertelur) hingga mengganggu tidur anak.','Pemeriksaan penunjang: dijumpai telur pada pemeriksaan anal swab / Graham scotch adhesive tape (dilakukan pagi hari sebelum mandi/BAB, karena telur diletakkan di perianal malam sebelumnya), telur berbentuk oval bikonkaf dengan dinding asimetris berisi larva cacing (menyerupai huruf D).']},
        ],
        mnemonic:{label:'Enterobiasis — "GaBur MaRi"', text:'Gatal dubur malam hari — kunci mengingat gejala khas Enterobius vermicularis. Trikuriasis — "3T": Trichuris, Tempayan (bentuk telur), Turun (prolaps recti).'}

      {
        id:'trematoda', cat:'cacing', level:'4A', title:'Trematoda (Cacing Daun)',
        sub:'Schistosoma dan Fasciola — cacing pipih tak bersegmen, umumnya butuh siput sebagai hospes perantara.',
        sections:[
          {h:'Skistosomiasis (Schistosoma mansoni, S. haematobium, S. japonicum)', list:['Stadium infektif: serkaria (bentuk larva yang keluar dari siput air tawar dan mampu menembus kulit manusia yang kontak dengan air).','Manifestasi klinis bervariasi tergantung spesies dan fase: penetrasi kulit oleh serkaria dapat menyebabkan ruam gatal ("swimmer\'s itch") setelah berenang di air tawar; sindrom schistosomiasis akut (demam Katayama) muncul beberapa minggu pasca infeksi berat; schistosomiasis intestinal (S. japonicum, S. mansoni, kadang S. haematobium): nyeri perut kronis/intermiten, nafsu makan turun, diare, bila berat dapat timbul ulkus kolon kronik, perdarahan usus, dan anemia defisiensi besi; genitourinary schistosomiasis (S. haematobium): hematuria mikroskopik/makroskopik, piuria, hematospermia, disuria, obstruksi leher kandung kemih, hidronefrosis, gagal ginjal, hingga peningkatan risiko kanker kandung kemih.','Pemeriksaan penunjang: dijumpai telur di tinja atau urin lewat mikroskop (tergantung spesies — S. haematobium khas ditemukan di urin karena bersarang di kandung kemih, sementara mansoni/japonicum di tinja karena bersarang di usus); dapat pula dideteksi antigen schistosoma atau DNA schistosoma dalam darah/urin/tinja, atau antibodi lewat serologi.']},
          {h:'Fasciolosis (Fasciola hepatica, Fasciola/Fasciolopsis buski)', list:['Stadium infektif: metaserkaria (biasanya tertelan lewat tanaman air seperti selada air yang terkontaminasi).','Manifestasi klinis F. hepatica: fase akut — demam, nyeri perut kanan atas, hepatomegali, kadang ikterik; fase kronik — dapat asimtomatik, atau nyeri kanan atas, hepatomegali, mual-muntah, wasting, ikterik, diare, kolik bilier, kolangitis, kolelitiasis (karena cacing dewasa hidup di duktus biliaris); fasioliasis faringeal/sindrom Halzoun — terjadi akibat makan liver mentah, menimbulkan gangguan saluran napas atas seperti batuk, nyeri tenggorok, edema laring, faringitis, bahkan sufokasi (tersedak/tercekik).','Manifestasi klinis Fasciolopsis buski (hidup di usus halus, bukan hati): asimtomatik, anoreksia, mual-muntah, diare, nyeri abdomen, malabsorpsi, anemia dan defisiensi vitamin B12, obstruksi usus, hingga perforasi pada kasus berat.','Pemeriksaan penunjang: dijumpai telur pada feses/aspirasi cairan duodenum atau empedu (F. hepatica), atau cacing dewasa/telur dalam tinja (F. buski); gambaran telur kedua spesies serupa — lonjong dengan satu operkulum.']},
        ],
        mnemonic:{label:'Skistosomiasis — "4S"', text:'Schistosoma · Spina (duri pada telur) · Sulawesi (endemis S. japonicum di Indonesia) · Serkaria (stadium infektif).'}

        sections:[
          {h:'Taeniasis (Taenia saginata & Taenia solium)', list:['Cara penularan: Taeniasis (infeksi cacing pita dewasa di usus) terjadi bila manusia makan daging (sapi untuk T. saginata, babi untuk T. solium) mentah/kurang matang yang mengandung sistiserkus — stadium infektif untuk taeniasis. Sistiserkosis (infeksi larva di jaringan tubuh, termasuk otak) terjadi bila manusia tertelan TELUR cacing (misalnya lewat makanan terkontaminasi feses penderita taeniasis) — stadium infektif untuk sistiserkosis berbeda dari taeniasis.','Manifestasi klinis taeniasis: dapat asimtomatik, mual, anoreksia, nyeri epigastrium, urtikaria, nyeri kepala.','Neurosistiserkosis — HANYA disebabkan oleh Taenia solium (babi), TIDAK oleh T. saginata (sapi) — poin krusial yang sering diujikan. Manifestasinya: kejang fokal, fokal dengan generalisata parsial, atau kejang umum; nyeri kepala menyerupai migrain atau tension type headache; defisit neurokognitif; peningkatan tekanan intrakranial (TIK); hidrosefalus (akibat kista mengganggu aliran cairan serebrospinal).','Pemeriksaan penunjang: diagnosis taeniasis umumnya ditegakkan dengan identifikasi telur atau proglotid dalam tinja — telur kedua spesies sulit dibedakan (berstruktur radial dengan 6 kait di dalamnya, berisi onkosfer dan embriosfer), namun proglotidnya dapat dibedakan: T. saginata memiliki proglotid gravid dengan cabang lebih banyak dibanding T. solium.']},

      {

        sub:'Infeksi cacing filaria pada sistem limfatik — kronisnya menyebabkan elephantiasis.',
        sections:[
          {h:'Etiologi & Vektor', list:['Penyebab: Wuchereria bancrofti, Brugia malayi, Brugia timori.','Vektor: nyamuk Culex (perkotaan), juga dapat ditularkan Anopheles/Aedes (perdesaan, tergantung spesies filaria) — bentuk infektif yang ditularkan adalah larva stadium III (L3).']},
          {h:'Manifestasi Klinis', list:['Fase akut: adenolimfangitis akut (demam disertai limfadenopati yang nyeri, akibat reaksi inflamasi terhadap cacing dewasa/larva yang mati di pembuluh limfe), atau demam filarial (demam tanpa limfangitis/limfadenopati).','Fase kronik: limfedema akibat kerusakan dan obstruksi kronis pembuluh limfatik oleh cacing dewasa yang hidup bertahun-tahun di sana — bila berlanjut, berkembang menjadi elephantiasis (pembengkakan masif dan penebalan kulit, khas pada tungkai/skrotum).','Wuchereria bancrofti sering menyebabkan gangguan limfatik di area genital (khas: edema skrotum) selain limfedema tungkai yang bisa sampai ke lipat paha — berbeda dari Brugia malayi/timori yang limfedemanya umumnya tidak sampai sejauh itu (tidak sampai paha).']},
          {h:'Diagnosis', list:['Ditemukannya mikrofilaria dalam darah, diperiksa pada MALAM HARI (pukul 22.00–02.00) menggunakan pewarnaan Giemsa pada apusan darah tepi — waktu pengambilan sampel ini sangat penting dan sering ditanyakan, karena mikrofilaria filaria limfatik (terutama W. bancrofti) memiliki periodisitas nokturna, yaitu jumlahnya di darah tepi memuncak pada malam hari mengikuti pola aktivitas vektor nyamuknya yang juga menggigit malam hari.']},
          {h:'Membedakan Spesies pada Apusan Darah', list:['Ketiga spesies dibedakan lewat karakteristik selubung (sheath), susunan inti tubuh mikrofilaria, cephalic space (rasio panjang:lebar ujung kepala), dan ada/tidaknya inti di ujung ekor (nukleus terminal).']},
        ],
        table:{title:'Karakteristik Mikrofilaria per Spesies', head:['Spesies','Vektor Khas','Karakteristik'],
          rows:[

        diagram:{title:'Pola Limfedema: Bancrofti vs Brugia', html:`

      {
        id:'filariasis-tatalaksana', cat:'filariasis', level:'4A', title:'Filariasis — Terapi & Profilaksis',
        sub:'DEC sebagai andalan utama, ditambah pembedahan untuk sekuel elephantiasis.',
        sections:[
          {h:'Terapi', list:['Dietilkarbamazin (DEC) 6 mg/kgBB selama 12 hari — bekerja sebagai makrofilarisida sekaligus mikrofilarisida, artinya membunuh baik cacing dewasa maupun mikrofilaria yang beredar di darah.','Penting dipahami: DEC dapat mengeradikasi mikrofilaria dan cacing dewasa, TETAPI TIDAK dapat menyembuhkan perubahan anatomi yang sudah terjadi pada elephantiasis — karena kerusakan pembuluh limfatik akibat obstruksi kronik bersifat permanen, sehingga terapi obat hanya efektif mencegah perburukan lebih lanjut, bukan mengembalikan anatomi yang sudah rusak.','Pembedahan — untuk mengatasi sekuel/komplikasi anatomis yang sudah terlanjur terjadi: aspirasi hidrokel, limfangioplasti, prosedur jembatan limfe (lymphatic bridging), eksisi radikal dan graft kulit, serta bedah mikrolimfatik.']},
          {h:'Profilaksis (Program Eliminasi Filariasis)', list:['DEC 6 mg/kgBB dosis tunggal DAN Albendazole 400 mg dosis tunggal per tahun, ATAU','Ivermectin 150–200 mcg/kg dosis tunggal DAN Albendazole 400 mg dosis tunggal per tahun — kombinasi ini diberikan secara massal (mass drug administration) di daerah endemis sebagai strategi eliminasi filariasis limfatik jangka panjang.']},

      // ---------------- SEPSIS ----------------
      {
        id:'sepsis', cat:'sepsis', level:'3B', title:'Sepsis & Syok Sepsis',
        sub:'Disregulasi sistem imun terhadap infeksi yang menyebabkan disfungsi organ — kegawatdaruratan dengan mortalitas tinggi.',
        sections:[
          {h:'Definisi', list:['Sepsis adalah keadaan mengancam jiwa yang disebabkan oleh respons inflamasi tubuh yang berlebihan terhadap suatu infeksi — bukan infeksinya sendiri yang langsung mematikan, melainkan respons imun tubuh sendiri yang menjadi tidak terkendali dan justru merusak organ-organ vital (disregulasi imun).']},
          {h:'Etiologi', list:['Infeksi, paling sering disebabkan oleh bakteri — sumber tersering meliputi pneumonia, abses intra-abdomen, dan pielonefritis.']},
          {h:'Klasifikasi (Sepsis-3, 2016)', list:['Sepsis: disregulasi sistem imun terhadap infeksi yang menyebabkan disfungsi organ.','Syok Sepsis: sepsis yang sudah menyebabkan gangguan sirkulasi dan metabolik, ditandai dua kriteria berikut secara bersamaan — hipotensi persisten yang memerlukan vasopressor untuk mempertahankan MAP (Mean Arterial Pressure) >65 mmHg, DAN asidosis laktat dengan kadar laktat >18 mg/dL (>2 mmol/L) meski sudah mendapat resusitasi cairan adekuat.']},
          {h:'Disfungsi Organ (Poin Penilaian)', list:['Respirasi: penurunan rasio PaO2/FiO2.','Kardiovaskular: hipotensi/kebutuhan vasopressor.','Hematologi: penurunan jumlah platelet (trombositopenia akibat koagulopati konsumtif).','Hepar: peningkatan bilirubin.','SSP: penurunan GCS (kesadaran).','Ginjal: peningkatan kreatinin, oliguria.','Ketujuh domain ini menjadi dasar perhitungan skor SOFA, alat ukur standar untuk menilai derajat disfungsi organ pada sepsis.']},
          {h:'Skoring', sub:[
            {t:'qSOFA (quick SOFA)', list:['Tujuan: mengidentifikasi risiko sepsis pada pasien DI LUAR ICU (skrining cepat di IGD/bangsal biasa) — praktis karena tidak butuh hasil laboratorium, hanya tanda vital dan kesadaran.','Komponen (masing-masing bernilai 1 poin): GCS <15, RR >22×/menit, TDS (tekanan darah sistolik) <100 mmHg.','Interpretasi: skor 0–1 = risiko rendah sepsis; skor 2–3 = risiko tinggi sepsis, perlu evaluasi lanjut segera.']},
            {t:'SOFA (Sequential Organ Failure Assessment)', list:['Tujuan: menilai risiko mortalitas pada pasien DI ICU, dengan menghitung skor dari 6 sistem organ (respirasi, koagulasi, hepar, kardiovaskular, SSP, renal), masing-masing diberi skor 0–4 berdasar derajat gangguannya.','Sepsis ditegakkan bila terdapat bukti/suspek infeksi DISERTAI peningkatan skor SOFA ≥2 poin dari baseline.','Korelasi skor SOFA total dengan mortalitas: skor 0–6 → mortalitas <10%; skor 7–9 → 15–20%; skor 10–12 → 40–50%; skor 13–14 → 50–60%; skor 15 → >80%; skor 15–24 → >90% — menggambarkan bagaimana risiko kematian meningkat tajam seiring makin banyak organ yang gagal berfungsi.']},

          {h:'Manifestasi Klinis', list:['Gangguan sistem organ: SSP (gangguan kesadaran), kardiovaskular (hipotensi), koagulopati (petekie dan purpura akibat DIC), hepar (ikterus), ginjal (oliguria), respirasi (dispnea dan ARDS).','Gejala khas syok sepsis: MAP <65 mmHg, akral dingin dengan CRT memanjang, dan edema generalisata (akibat kebocoran kapiler sistemik yang menyertai respons inflamasi berat).']},
