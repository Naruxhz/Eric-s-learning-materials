<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Belajar — Pilih Materi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1EFE9; --bg-panel:#FFFFFF; --ink:#1C1B19; --muted:#6E6A62; --line:#DEDACE;
  --red:#9E2A3D; --red-deep:#7A1E30; --red-tint:#F6E4E6;
  --teal:#1E5B5E; --teal-tint:#E3EFEC;
  --amber:#B9832E; --amber-tint:#F8ECD8;
  --shadow: 0 1px 2px rgba(28,27,25,0.06), 0 8px 24px rgba(28,27,25,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans', sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;}
h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0; letter-spacing:-0.01em;}
a{color:inherit; text-decoration:none;}
::selection{background:var(--red-tint); color:var(--red-deep);}

.wrap{max-width:980px; margin:0 auto; padding:64px 32px 80px;}
.eyebrow{font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); display:flex; align-items:center; gap:8px; margin-bottom:16px;}
.eyebrow::before{content:""; width:20px; height:1px; background:var(--red);}
h1{font-size:clamp(34px,5.5vw,54px); line-height:1.04;}
h1 em{font-style:italic; color:var(--red);}
p.lede{font-size:16.5px; color:var(--muted); max-width:560px; margin-top:16px;}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; margin-top:48px; min-height:80px;}
.card{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:26px;
  position:relative; overflow:hidden; transition:all .18s ease; box-shadow:var(--shadow); cursor:pointer;
}
.card:hover{transform:translateY(-3px); border-color:#cfc9ba;}
.card .icon{width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:18px;}
.card.c-red .icon{background:var(--red-tint); color:var(--red-deep);}
.card.c-teal .icon{background:var(--teal-tint); color:var(--teal);}
.card.c-amber .icon{background:var(--amber-tint); color:var(--amber);}
.card.c-muted .icon{background:var(--bg); color:var(--muted);}
.card h3{font-size:19px; margin-bottom:6px;}
.card p{font-size:13px; color:var(--muted); margin:0 0 18px; min-height:36px;}
.card .meta{display:flex; align-items:center; justify-content:space-between; font-size:11.5px; font-family:'IBM Plex Mono', monospace; padding-top:14px; border-top:1px solid var(--line);}
.card .stat{color:var(--muted);}
.card .go{color:var(--red-deep); font-weight:600; display:flex; align-items:center; gap:4px;}
.card:hover .go{gap:7px;}
.go svg{transition:transform .15s ease;}

.state-msg{grid-column:1/-1; text-align:center; padding:50px 20px; color:var(--muted); font-size:13.5px;}
.state-msg.err{color:var(--red-deep);}
.skeleton{background:linear-gradient(90deg, var(--bg-panel) 25%, var(--bg) 50%, var(--bg-panel) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:14px; height:168px; border:1px solid var(--line);}
@keyframes shimmer{0%{background-position:200% 0;} 100%{background-position:-200% 0;}}

footer{margin-top:70px; padding-top:22px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
footer .wm{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); opacity:0.7;}
footer .stat-total{font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono', monospace;}

@media (max-width:600px){ .wrap{padding:44px 20px 60px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">By Naruxhz ඞ</div>
  <h1>Kumpulan<br><em>Materi</em> UKMPPD.</h1>
  <p class="lede">Kumpulan modul belajar per mata kuliah — rangkuman lengkap, skema/algoritma diagnosis, dan latihan soal, semua dalam satu tempat. Pilih mata kuliah untuk mulai belajar.</p>

  <div class="grid" id="cardGrid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <footer>
    <span class="wm">Ruang Belajar · by Naruxhz</span>
    <span class="stat-total" id="totalStat">memuat…</span>
  </footer>
</div>

<script>
function esc(s){ return (s+'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function loadSubjects(){
  const grid = document.getElementById('cardGrid');
  const totalStat = document.getElementById('totalStat');
  try{
    const res = await fetch('/api/subjects');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const subjects = data.subjects || [];

    if(subjects.length === 0){
      grid.innerHTML = `<div class="state-msg">Belum ada mata kuliah terdaftar. Tambahkan folder baru berisi <code>index.html</code> dan <code>meta.json</code> di repo untuk memunculkannya di sini.</div>`;
      totalStat.textContent = '0 mata kuliah tersedia';
      return;
    }

    grid.innerHTML = subjects.map(s => `
      <a class="card c-${esc(s.warna||'red')}" href="./${esc(s.folder)}/">
        <div class="icon">${s.ikon||'📚'}</div>
        <h3>${esc(s.nama)}</h3>
        <p>${esc(s.deskripsi||'')}</p>
        <div class="meta">
          <span class="stat">${s.topik!=null ? esc(s.topik)+' topik' : ''}${s.topik!=null && s.soal!=null ? ' · ' : ''}${s.soal!=null ? esc(s.soal)+' soal' : ''}</span>
          <span class="go">Buka <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
      </a>
    `).join('');

    totalStat.textContent = `${subjects.length} mata kuliah tersedia`;
  }catch(err){
    grid.innerHTML = `<div class="state-msg err">Gagal memuat daftar mata kuliah (${esc(err.message)}). Coba muat ulang halaman.</div>`;
    totalStat.textContent = '—';
  }
}
loadSubjects();
</script>
</body>
</html>
