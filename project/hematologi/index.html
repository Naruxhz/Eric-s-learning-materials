  answer:2,
  explain:'Meski darah lengkap dan apusan darah tepi dapat memberi kecurigaan awal, pemeriksaan penunjang terbaik (gold standard) untuk konfirmasi diagnosis leukemia adalah <b>aspirasi dan biopsi sumsum tulang</b>, yang menilai persentase sel blas serta morfologi sel secara langsung.'
},
{
  vignette:'Seorang laki-laki berusia 48 tahun yang bekerja di pabrik baterai selama 15 tahun datang dengan keluhan nyeri perut kolik berulang, konstipasi, dan lemas. Pemeriksaan fisik ditemukan garis kebiruan pada gusi (Burton line). Laboratorium: anemia mikrositik hipokrom dengan basophilic stippling pada eritrosit.',
  question:'Apakah penyebab anemia mikrositik pada pasien ini?',
  options:['Defisiensi besi kronik','Talasemia','Keracunan timbal (Pb) menyebabkan anemia sideroblastik','Anemia penyakit kronis','Defisiensi vitamin B6'],
  answer:2,
  explain:'Riwayat paparan kerja jangka panjang (pabrik baterai mengandung timbal), Burton line pada gusi, dan basophilic stippling pada eritrosit merupakan gambaran klasik <b>keracunan timbal (plumbism)</b>, yang mengganggu sintesis heme dan menyebabkan <b>anemia sideroblastik</b> akuisita.'
},
{
  vignette:'Seorang perempuan berusia 27 tahun sedang merencanakan kehamilan dan berkonsultasi ke dokter mengenai suplementasi yang dianjurkan untuk mencegah kelainan kongenital pada janin, khususnya kelainan tabung saraf (neural tube defect).',
  question:'Apakah suplementasi yang paling tepat direkomendasikan sejak periode prakonsepsi?',
  options:['Vitamin B12','Zat besi','Asam folat (vitamin B9)','Vitamin B6','Vitamin D'],
  answer:2,
  explain:'Suplementasi <b>asam folat (vitamin B9)</b> sejak periode prakonsepsi dan awal kehamilan terbukti efektif menurunkan risiko kelainan tabung saraf (neural tube defect) pada janin, karena folat esensial untuk sintesis DNA pada fase pembelahan sel yang cepat.'
},
{
  vignette:'Seorang laki-laki berusia 52 tahun dengan Multiple Myeloma yang baru terdiagnosis mengeluh nyeri punggung hebat dan kelemahan tungkai bawah mendadak sejak 6 jam yang lalu. Pemeriksaan fisik: kekuatan motorik tungkai menurun, refleks patologis (+), retensi urin.',
  question:'Apakah komplikasi kegawatdaruratan yang paling mungkin dialami pasien ini?',
  options:['Hiperkalsemia akut','Gagal ginjal akut','Kompresi medula spinalis (spinal cord compression)','Sindrom hiperviskositas','Fraktur kompresi vertebra tanpa kompresi saraf'],
  answer:2,
  explain:'Kelemahan motorik mendadak, refleks patologis positif, dan retensi urin pada pasien Multiple Myeloma sangat mengarah pada <b>kompresi medula spinalis</b> akibat destruksi tulang vertebra oleh sel plasma ganas atau fraktur kompresi — kegawatdaruratan onkologis yang memerlukan evaluasi dan tatalaksana segera (kortikosteroid dosis tinggi, radioterapi/dekompresi bedah) untuk mencegah kelumpuhan permanen.'
},
];
</script>
<script>
/* =========================================================
   APP LOGIC
   ========================================================= */
const state = {
  view:'home',        // home | topic | quiz
  topicId:null,
  done:new Set(),
  quizIdx:0,
  quizAnswers:[],      // array parallel to QUIZ: null (unanswered) or {chosen, correct}
};

/* ---------- Progress persistence (localStorage) ---------- */
const PROGRESS_KEY = 'hematologi-progress-v1';
function loadProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed.done)) state.done = new Set(parsed.done);
  }catch(e){ console.warn('Gagal memuat progres tersimpan:', e); }
}
function saveProgress(){
  try{
    localStorage.setItem(PROGRESS_KEY, JSON.stringify({ done:[...state.done] }));
  }catch(e){ console.warn('Gagal menyimpan progres:', e); }
}

const QUIZ_PROGRESS_KEY = 'hematologi-quiz-progress-v1';
function loadQuizProgress(){
  try{
    const raw = localStorage.getItem(QUIZ_PROGRESS_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed.quizAnswers) || parsed.quizAnswers.length!==QUIZ.length) return null;
    return parsed;
  }catch(e){ console.warn('Gagal memuat progres kuis:', e); return null; }
}
function saveQuizProgress(){
  try{
    localStorage.setItem(QUIZ_PROGRESS_KEY, JSON.stringify({ quizIdx:state.quizIdx, quizAnswers:state.quizAnswers }));
  }catch(e){ console.warn('Gagal menyimpan progres kuis:', e); }
}
function clearQuizProgress(){
  try{ localStorage.removeItem(QUIZ_PROGRESS_KEY); }catch(e){}
}

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const viewRoot = $('#viewRoot');

function esc(s){ return (s+'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function findTopic(id){ return TOPICS.find(t=>t.id===id); }
function topicsInCat(catId){ return TOPICS.filter(t=>t.cat===catId); }

/* ---------- Sidebar / Nav tree ---------- */
function renderNavTree(filter){
  const q = (filter||'').trim().toLowerCase();
  const groups = {};
  CATEGORIES.forEach(c=>{
    const group = c.group || '__solo__';
    if(!groups[group]) groups[group] = [];
    groups[group].push(c);
  });

  let html = '';
  Object.keys(groups).forEach(groupKey=>{
    const cats = groups[groupKey];
    cats.forEach(cat=>{
      let topics = topicsInCat(cat.id);
      if(q){
        topics = topics.filter(t =>
          t.title.toLowerCase().includes(q) ||
          (t.sub||'').toLowerCase().includes(q) ||
          JSON.stringify(t.sections||[]).toLowerCase().includes(q)
        );
      }
      if(q && topics.length===0) return;
      const isOpen = !!q || cat.id === (findTopic(state.topicId)||{}).cat;
      const label = groupKey!=='__solo__' ? `${groupKey} · ${cat.label}` : cat.label;
      html += `<div class="nav-cat ${isOpen?'open':''}" data-cat="${cat.id}">
        <div class="nav-cat-head">
          <span>${esc(label)}</span>
          <span style="display:flex;align-items:center;">
            <span class="badge-count">${topics.length}</span>
            <svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </div>
        <div class="nav-list">
          ${topics.map(t=>`
            <div class="nav-item ${t.id===state.topicId?'active':''}" data-topic="${t.id}">
              <span class="dot"></span>
              <span>${esc(t.title)}</span>
              <span class="check ${state.done.has(t.id)?'done':''}"></span>
            </div>`).join('')}
        </div>
      </div>`;
    });
  });
  $('#navTree').innerHTML = html;

  $$('.nav-cat-head').forEach(h=>{
    h.addEventListener('click', ()=>{
      h.closest('.nav-cat').classList.toggle('open');
    });
  });
  $$('.nav-item').forEach(it=>{
    it.addEventListener('click', ()=>{
      goTopic(it.dataset.topic);
      closeSidebarMobile();
    });
  });
  updateProgress();
}

function updateProgress(){
  $('#progressLabel').textContent = `${state.done.size} / ${TOPICS.length}`;
  $('#progressFill').style.width = (state.done.size/TOPICS.length*100)+'%';
}

/* ---------- Home / Hero view ---------- */
function renderHome(push){
  state.view='home'; state.topicId=null;
  if(push!==false){ history.pushState({view:'home'}, '', '#'); }
  setActiveModeButtons();
  const mikro = topicsInCat('anemia-mikro'), normo = topicsInCat('anemia-normo'), makro = topicsInCat('anemia-makro');
  viewRoot.innerHTML = `
  <div class="content-wrap">
    <div class="hero reveal">
      <div class="eyebrow">By Naruxhz</div>
      <h1>Peta <em>Hematologi</em><br>untuk UKMPPD.</h1>
      <p class="lede">Rangkuman interaktif ${TOPICS.length} topik hematologi — dari anemia mikrositik hingga transfusi darah — lengkap dengan algoritma diagnosis, mnemonic, tabel banding, dan ${QUIZ.length} soal latihan.</p>
      <div class="hero-stats">
        <div class="stat"><b>${TOPICS.length}</b><span>Topik Klinis</span></div>
        <div class="stat"><b>${QUIZ.length}</b><span>Soal Latihan</span></div>
        <div class="stat"><b>10</b><span>Kategori</span></div>
      </div>
    </div>

    <div class="algo-widget reveal">
      <h3>Coba alur pikir: Klasifikasi Anemia berdasarkan MCV</h3>
      <div class="sub">Pilih hasil MCV pasien untuk melihat kemungkinan diagnosis — persis alur berpikir yang dipakai di soal UKMPPD.</div>
      <div class="algo-row" id="algoRow">
        <button class="algo-btn" data-mcv="low"><b>MCV ↓ (&lt;80 fL)</b><span>Mikrositik Hipokrom</span></button>
        <button class="algo-btn" data-mcv="normal"><b>MCV Normal (80–100 fL)</b><span>Normokrom Normositer</span></button>
        <button class="algo-btn" data-mcv="high"><b>MCV ↑ (&gt;100 fL)</b><span>Makrositer</span></button>
      </div>
      <div class="algo-result" id="algoResult">Pilih salah satu kategori MCV di atas untuk melihat diagnosis banding.</div>
    </div>

    <div style="margin-top:52px;">
      <h2 style="font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); font-weight:600;">Jelajahi semua topik</h2>
      <div class="home-grid">
        ${TOPICS.map((t,i)=>`
          <div class="home-card reveal" style="animation-delay:${Math.min(i*18,300)}ms" data-topic="${t.id}">
            <div class="n">${esc(t.level)} · ${esc(CATEGORIES.find(c=>c.id===t.cat).label)}</div>
            <h4>${esc(t.title)}</h4>
            <p>${esc(t.sub||'')}</p>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  const algoMap = {
    low:{label:'MCV ↓ — Anemia Hipokrom Mikrositer', ids:['adb','apk','thalassemia','sideroblastik']},
    normal:{label:'MCV Normal — Anemia Normokrom Normositer', ids:['aiha','g6pd','ckd-anemia','aplastik']},
    high:{label:'MCV ↑ — Anemia Makrositer', ids:['b12','b9']},
  };
  $$('.algo-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      $$('.algo-btn').forEach(x=>x.classList.remove('picked'));
      b.classList.add('picked');
      const key = b.dataset.mcv;
      const data = algoMap[key];
      const chips = data.ids.map(id=>{
        const t = findTopic(id);
        return `<span class="chip" data-topic="${id}">${esc(t.title)}</span>`;
      }).join('');
      $('#algoResult').innerHTML = `<div class="rlabel">${esc(data.label)}</div>Diagnosis banding yang perlu dipertimbangkan: <div class="chips">${chips}</div>`;
      $$('#algoResult .chip').forEach(c=>c.addEventListener('click', ()=>goTopic(c.dataset.topic)));
    });
  });

  $$('.home-card').forEach(c=>c.addEventListener('click', ()=>goTopic(c.dataset.topic)));
}

/* ---------- Topic view ---------- */
function renderSectionList(items){
  return `<ul>${items.map(li=>`<li>${li}</li>`).join('')}</ul>`;
}
function renderSection(sec){
  let inner = '';
  if(sec.list) inner += renderSectionList(sec.list);
  if(sec.sub){
    sec.sub.forEach(s=>{
      inner += `<div class="sub-h">${esc(s.t)}</div>${renderSectionList(s.list)}`;
    });
  }
  return `<div class="section-block reveal"><h2>${esc(sec.h)}</h2>${inner}</div>`;
}
function renderTable(tbl){
  return `<div class="section-block reveal"><h2>${esc(tbl.title)}</h2>
    <table class="data-tbl"><thead><tr>${tbl.head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${tbl.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function goTopic(id, push){
  state.view='topic'; state.topicId=id;
  if(push!==false){ history.pushState({view:'topic', topicId:id}, '', '#'+id); }
  setActiveModeButtons();
  const t = findTopic(id);
  const cat = CATEGORIES.find(c=>c.id===t.cat);
  const idx = TOPICS.indexOf(t);
  const prev = TOPICS[idx-1], next = TOPICS[idx+1];

  viewRoot.innerHTML = `
  <div class="content-wrap">
    <div class="crumbs reveal">
      <span>${esc(cat.group ? cat.group : 'Hematologi')}</span>
      <span class="sep">/</span>
      <span>${esc(cat.label)}</span>
    </div>
    <div class="topic-head reveal">
      <h1>${esc(t.title)}</h1>
      <span class="badge-level">Kompetensi ${esc(t.level)}</span>
    </div>
    <div class="topic-sub reveal">${esc(t.sub||'')}</div>
    <button class="mark-btn ${state.done.has(id)?'done':''}" id="markBtn">
      <span class="dotc"></span>
      <span id="markBtnLabel">${state.done.has(id)?'Sudah dipelajari':'Tandai sudah dipelajari'}</span>
    </button>

    ${(t.sections||[]).map(renderSection).join('')}
    ${t.images ? `<div class="topic-images reveal">${t.images.map(im=>`
      <div class="topic-image-card">
        <img src="${esc(im.src)}" alt="${esc(im.alt||im.caption||'')}" loading="lazy">
        <div class="cap">${esc(im.caption||'')}</div>
      </div>`).join('')}</div>` : ''}
    ${t.diagram ? `<div class="section-block reveal"><h2>${esc(t.diagram.title||'Skema / Algoritma')}</h2><div class="flowcard">${t.diagram.note?`<div class="fnote">${esc(t.diagram.note)}</div>`:''}${t.diagram.html}</div></div>` : ''}
    ${t.mnemonic ? `<div class="callout mnemonic reveal"><div class="clabel">Mnemonic — ${esc(t.mnemonic.label)}</div>${esc(t.mnemonic.text)}</div>` : ''}
    ${t.table ? renderTable(t.table) : ''}
    ${t.extra ? `<div class="extra-wrap reveal">
      <div class="extra-wrap-head"><span class="tag">+ Referensi Tambahan</span><b>Pendalaman Klinis</b></div>
      <div class="extra-wrap-note">Wawasan tambahan di luar materi PPT — dari literatur kedokteran standar, untuk memperkaya pemahaman.</div>
      ${t.extra.map(e=>`<div class="extra-block"><h3>${esc(e.h)}</h3><ul>${e.list.map(li=>`<li>${li}</li>`).join('')}</ul></div>`).join('')}
    </div>` : ''}

    <div class="topic-nav">
      ${prev ? `<button class="tn-btn prev" data-topic="${prev.id}"><div class="lbl">← Sebelumnya</div><div class="ttl">${esc(prev.title)}</div></button>` : '<div></div>'}
      ${next ? `<button class="tn-btn next" data-topic="${next.id}"><div class="lbl">Selanjutnya →</div><div class="ttl">${esc(next.title)}</div></button>` : '<div></div>'}
    </div>
  </div>`;

  $('#markBtn').addEventListener('click', ()=>{
    if(state.done.has(id)) state.done.delete(id); else state.done.add(id);
    saveProgress();
    goTopic(id, false);
    renderNavTree($('#searchInput').value);
  });
  $$('.tn-btn[data-topic]').forEach(b=>b.addEventListener('click', ()=>goTopic(b.dataset.topic)));

  renderNavTree($('#searchInput').value);
  window.scrollTo({top:0, behavior:'instant'});
}
</script>
<script>
/* ---------- Quiz view ---------- */
function quizScoreSoFar(){
  return state.quizAnswers.reduce((n,a)=> n + (a && a.correct ? 1 : 0), 0);
}
function quizAnsweredCount(){
  return state.quizAnswers.reduce((n,a)=> n + (a ? 1 : 0), 0);
}

function startQuiz(push, forceRestart){
  state.view='quiz'; state.topicId=null;
  const saved = forceRestart ? null : loadQuizProgress();
  if(saved){
    state.quizIdx = saved.quizIdx;
    state.quizAnswers = saved.quizAnswers;
  } else {
    state.quizIdx = 0;
    state.quizAnswers = new Array(QUIZ.length).fill(null);
    clearQuizProgress();
  }
  if(push!==false){ history.pushState({view:'quiz'}, '', '#quiz'); }
  setActiveModeButtons();
  renderQuizQuestion();
  renderNavTree($('#searchInput').value);
  window.scrollTo({top:0, behavior:'instant'});
}

function renderQuizQuestion(){
  const q = QUIZ[state.quizIdx];
  const total = QUIZ.length;
  const letters = ['A','B','C','D','E'];
  const already = state.quizAnswers[state.quizIdx]; // {chosen, correct} or null
  const isLast = state.quizIdx===total-1;
  const allAnswered = quizAnsweredCount()===total;

  viewRoot.innerHTML = `
  <div class="quiz-shell">
    <div class="quiz-top">
      <span class="quiz-count mono">SOAL ${state.quizIdx+1} / ${total}</span>
      <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${(state.quizIdx)/total*100}%"></div></div>
      <span class="quiz-count mono" id="quizScoreLabel">SKOR ${quizScoreSoFar()}</span>
    </div>
    <div class="qcard reveal">
      <div class="vignette">${esc(q.vignette)}</div>
      <div class="question">${esc(q.question)}</div>
      <div id="optsWrap">
        ${q.options.map((opt,i)=>`
          <div class="opt${already ? ' disabled' : ''}${already && i===q.answer ? ' correct' : ''}${already && !already.correct && i===already.chosen ? ' wrong' : ''}${already && i!==q.answer && i!==already.chosen ? ' dim' : ''}" data-i="${i}">
            <div class="lt">${letters[i]}</div>
            <div>${esc(opt)}</div>
          </div>`).join('')}
      </div>
      <div class="qexplain${already ? ' show' : ''}" id="qexplain"><b>Pembahasan.</b> ${q.explain}</div>
      <div class="qnext-row" style="justify-content:space-between;">
        <button class="btn-ghost" id="qPrevBtn" ${state.quizIdx===0 ? 'disabled' : ''}>← Soal Sebelumnya</button>
        <button class="btn-primary" id="qNextBtn" ${already ? '' : 'disabled'}>${isLast ? 'Lihat Hasil' : 'Soal Berikutnya →'}</button>
      </div>
    </div>
  </div>`;

  if(!already){
    $$('.opt').forEach(optEl=>{
      optEl.addEventListener('click', ()=>{
        if(state.quizAnswers[state.quizIdx]) return;
        const chosen = parseInt(optEl.dataset.i,10);
        const correct = chosen===q.answer;
        state.quizAnswers[state.quizIdx] = {chosen, correct};
        saveQuizProgress();
        $$('.opt').forEach(o=>{
          o.classList.add('disabled');
          const i = parseInt(o.dataset.i,10);
          if(i===q.answer) o.classList.add('correct');
          else if(i===chosen) o.classList.add('wrong');
          else o.classList.add('dim');
        });
        $('#qexplain').classList.add('show');
        $('#qNextBtn').disabled = false;
        $('#quizScoreLabel').textContent = `SKOR ${quizScoreSoFar()}`;
      });
    });
  }

  $('#qPrevBtn').addEventListener('click', ()=>{
    if(state.quizIdx>0){
      state.quizIdx--;
      saveQuizProgress();
      renderQuizQuestion();
      window.scrollTo({top:0, behavior:'instant'});
    }
  });

  $('#qNextBtn').addEventListener('click', ()=>{
    if(!state.quizAnswers[state.quizIdx]) return;
    if(!isLast){
      state.quizIdx++;
      saveQuizProgress();
      renderQuizQuestion();
      window.scrollTo({top:0, behavior:'instant'});
    } else {
      renderQuizResult();
    }
  });
}

function renderQuizResult(){
  const total = QUIZ.length;
  const score = quizScoreSoFar();
  const pct = Math.round(score/total*100);
  let msg = 'Terus berlatih, sedikit lagi!';
  if(pct>=80) msg = 'Mantap — pemahamanmu sudah kuat.';
  else if(pct>=60) msg = 'Bagus, tinjau ulang topik yang masih salah.';
  clearQuizProgress();
  viewRoot.innerHTML = `
  <div class="quiz-shell">
    <div class="qcard quiz-result reveal">
      <div class="quiz-count mono">HASIL KUIS</div>
      <div class="score">${score}<span>/${total}</span></div>
      <p style="color:var(--muted); font-size:14px;">${msg}</p>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:22px; flex-wrap:wrap;">
        <button class="btn-primary" id="retryBtn">Ulangi Kuis</button>
        <button class="btn-ghost" id="homeBtn">Kembali ke Beranda</button>
      </div>
    </div>
  </div>`;
  $('#retryBtn').addEventListener('click', ()=> startQuiz(true, true));
  $('#homeBtn').addEventListener('click', ()=> renderHome());
}

/* ---------- Mode toggle / sidebar wiring ---------- */
function setActiveModeButtons(){
  $('#btnModeBelajar').classList.toggle('active', state.view!=='quiz');
  $('#btnModeQuiz').classList.toggle('active', state.view==='quiz');
}
$('#btnModeBelajar').addEventListener('click', ()=>{ if(state.view==='quiz') renderHome(); });
$('#sbBrandHome').addEventListener('click', ()=>{ renderHome(); closeSidebarMobile(); });
$('#resetProgressBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  if(confirm('Reset semua progres belajar (topik yang sudah ditandai selesai)? Tindakan ini tidak bisa dibatalkan.')){
    state.done.clear();
    saveProgress();
    renderNavTree($('#searchInput').value);
    if(state.view==='topic') goTopic(state.topicId, false);
  }
});
$('#btnModeQuiz').addEventListener('click', startQuiz);

$('#searchInput').addEventListener('input', (e)=>{
  renderNavTree(e.target.value);
});

/* Mobile sidebar */
const sidebarEl = $('#sidebar'), overlayEl = $('#sbOverlay');
function openSidebarMobile(){ sidebarEl.classList.add('open'); overlayEl.classList.add('show'); }
function closeSidebarMobile(){ sidebarEl.classList.remove('open'); overlayEl.classList.remove('show'); }
$('#hamburgerBtn').addEventListener('click', openSidebarMobile);
overlayEl.addEventListener('click', closeSidebarMobile);

/* Browser back/forward support */
window.addEventListener('popstate', (e)=>{
  const st = e.state;
  if(!st || st.view==='home'){ renderHome(false); }
  else if(st.view==='topic' && findTopic(st.topicId)){ goTopic(st.topicId, false); }
  else if(st.view==='quiz'){ startQuiz(false); }
  else { renderHome(false); }
  closeSidebarMobile();
});

/* Init */
loadProgress();
$('#quizCountLabel').textContent = QUIZ.length;
renderNavTree('');
const initialHash = decodeURIComponent(location.hash.replace('#',''));
if(initialHash && findTopic(initialHash)){
  history.replaceState({view:'topic', topicId:initialHash}, '', '#'+initialHash);
  goTopic(initialHash, false);
} else if(initialHash === 'quiz'){
  history.replaceState({view:'quiz'}, '', '#quiz');
  startQuiz(false);
} else {
  history.replaceState({view:'home'}, '', '#');
  renderHome(false);
}
</script>
</body>
</html>
