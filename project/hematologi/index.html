<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hematologi — Atlas Belajar Interaktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1EFE9;
  --bg-panel:#FFFFFF;
  --ink:#1C1B19;
  --muted:#6E6A62;
  --line:#DEDACE;
  --red:#9E2A3D;
  --red-deep:#7A1E30;
  --red-tint:#F6E4E6;
  --teal:#1E5B5E;
  --teal-tint:#E3EFEC;
  --amber:#B9832E;
  --amber-tint:#F8ECD8;
  --shadow: 0 1px 2px rgba(28,27,25,0.06), 0 8px 24px rgba(28,27,25,0.05);
  --radius: 10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'IBM Plex Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
h1,h2,h3,h4{
  font-family:'Fraunces', serif;
  font-weight:600;
  margin:0;
  letter-spacing:-0.01em;
}
.mono{font-family:'IBM Plex Mono', monospace;}
::selection{background:var(--red-tint); color:var(--red-deep);}
a{color:inherit;}
button{font-family:inherit;}

/* ---------- App shell ---------- */
#app{display:flex; min-height:100vh;}

/* Sidebar */
#sidebar{
  width:290px;
  flex-shrink:0;
  background:var(--bg-panel);
  border-right:1px solid var(--line);
  height:100vh;
  position:sticky;
  top:0;
  overflow-y:auto;
  padding:20px 14px 40px;
}
.sb-brand{
  display:flex; align-items:center; gap:10px;
  padding:6px 8px 18px;
  border-bottom:1px solid var(--line);
  margin-bottom:14px;
  transition:opacity .15s ease;
}
.sb-brand:hover{opacity:0.7;}
.sb-brand .cell{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, #d24a5f, var(--red-deep) 70%);
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.15);
  flex-shrink:0;
}
.sb-brand .t1{font-size:17px; line-height:1.1;}
.sb-brand .t2{font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-top:2px;}
.watermark{
  font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--muted); opacity:0.55;
  text-align:right; margin:-8px 4px 14px 0; letter-spacing:0.02em;
}

.search-box{
  display:flex; align-items:center; gap:8px;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 10px;
  margin-bottom:16px;
}
.search-box input{
  border:none; background:transparent; outline:none;
  font-size:13.5px; width:100%; color:var(--ink); font-family:inherit;
}
.search-box svg{flex-shrink:0; opacity:0.5;}

.mode-toggle{
  display:flex; background:var(--bg); border:1px solid var(--line);
  border-radius:8px; padding:3px; margin-bottom:18px; gap:3px;
}
.mode-toggle button{
  flex:1; border:none; background:transparent; padding:8px 6px;
  border-radius:6px; font-size:12.5px; font-weight:600; color:var(--muted);
  cursor:pointer; transition:all .15s ease;
}
.mode-toggle button.active{background:var(--red); color:#fff; box-shadow:var(--shadow);}

.nav-cat{margin-bottom:4px;}
.nav-cat-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 8px; cursor:pointer; border-radius:7px;
  font-size:13px; font-weight:600;
  user-select:none;
}
.nav-cat-head:hover{background:var(--bg);}
.nav-cat-head .chev{transition:transform .18s ease; opacity:0.5;}
.nav-cat-head .badge-count{
  font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted);
  background:var(--bg); border:1px solid var(--line); border-radius:20px;
  padding:1px 7px; margin-left:6px;
}
.nav-cat.open .chev{transform:rotate(90deg);}
.nav-list{max-height:0; overflow:hidden; transition:max-height .25s ease;}
.nav-cat.open .nav-list{max-height:1200px;}
.nav-item{
  display:flex; align-items:center; gap:8px;
  padding:7px 8px 7px 22px; font-size:13px; cursor:pointer;
  border-radius:7px; color:var(--muted); position:relative;
}
.nav-item:hover{background:var(--bg); color:var(--ink);}
.nav-item.active{background:var(--red-tint); color:var(--red-deep); font-weight:600;}
.nav-item .dot{width:5px;height:5px;border-radius:50%; background:currentColor; opacity:0.5; flex-shrink:0;}
.nav-item .check{
  margin-left:auto; width:14px; height:14px; border-radius:50%;
  border:1.5px solid var(--line); flex-shrink:0;
}
.nav-item .check.done{background:var(--teal); border-color:var(--teal);}

.sb-progress{
  margin-top:20px; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--line);
}
.sb-progress .lbl{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:6px;}
.sb-progress .bar{height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
.sb-progress .fill{height:100%; background:linear-gradient(90deg, var(--teal), #2a7a7d); border-radius:4px; transition:width .3s ease;}
.sb-progress-foot{
  display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px;
}
.sb-progress-foot span{font-size:10px; color:var(--muted); opacity:0.8;}
.sb-progress-foot button{
  border:none; background:transparent; color:var(--muted); font-size:10.5px; font-weight:600;
  cursor:pointer; text-decoration:underline; padding:0; flex-shrink:0;
}
.sb-progress-foot button:hover{color:var(--red);}

/* Main */
#main{flex:1; min-width:0;}
.topbar{
  position:sticky; top:0; z-index:5;
  background:rgba(241,239,233,0.88); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:14px 40px; display:none; align-items:center; gap:10px;
}
.hamburger{display:none; border:1px solid var(--line); background:#fff; border-radius:8px; width:36px; height:36px; align-items:center; justify-content:center; cursor:pointer;}

.content-wrap{max-width:880px; margin:0 auto; padding:56px 40px 120px;}
</style>
</head>
<body>
<style>
/* ---------- Hero (home view) ---------- */
.hero{padding-bottom:12px;}
.hero .eyebrow{
  font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--red); display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.hero .eyebrow::before{content:""; width:20px; height:1px; background:var(--red);}
.hero h1{font-size:clamp(34px,5vw,52px); line-height:1.02;}
.hero h1 em{font-style:italic; color:var(--red);}
.hero p.lede{font-size:16.5px; color:var(--muted); max-width:560px; margin-top:16px;}
.hero-stats{display:flex; gap:28px; margin-top:30px; flex-wrap:wrap;}
.hero-stats .stat b{font-family:'Fraunces',serif; font-size:28px; display:block;}
.hero-stats .stat span{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}

/* Signature: MCV algorithm widget */
.algo-widget{
  margin-top:40px; background:var(--bg-panel); border:1px solid var(--line); border-radius:14px;
  padding:28px 28px 24px; box-shadow:var(--shadow);
}
.algo-widget h3{font-size:16px; margin-bottom:4px;}
.algo-widget .sub{font-size:12.5px; color:var(--muted); margin-bottom:20px;}
.algo-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.algo-btn{
  flex:1; min-width:150px; text-align:left; border:1.5px solid var(--line); background:var(--bg);
  border-radius:9px; padding:12px 14px; cursor:pointer; transition:all .15s ease;
}
.algo-btn b{display:block; font-size:13.5px; font-family:'IBM Plex Mono',monospace;}
.algo-btn span{font-size:11.5px; color:var(--muted);}
.algo-btn:hover{border-color:var(--red); background:var(--red-tint);}
.algo-btn.picked{border-color:var(--red); background:var(--red-tint); box-shadow:inset 0 0 0 1px var(--red);}
.algo-result{
  margin-top:16px; padding:16px 18px; border-radius:10px; background:var(--teal-tint);
  border:1px solid #c8ddd9; font-size:13.5px; min-height:20px;
}
.algo-result .rlabel{font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal); font-weight:600; margin-bottom:6px;}
.algo-result .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
.chip{
  background:#fff; border:1px solid var(--line); padding:5px 11px; border-radius:20px; font-size:12.5px;
  font-family:'IBM Plex Mono', monospace; cursor:pointer;
}
.chip:hover{border-color:var(--teal); color:var(--teal);}

.home-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; margin-top:44px;}
.home-card{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:18px;
  cursor:pointer; transition:all .15s ease;
}
.home-card:hover{transform:translateY(-2px); box-shadow:var(--shadow); border-color:#cfc9ba;}
.home-card .n{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--red); margin-bottom:8px;}
.home-card h4{font-size:15.5px;}
.home-card p{font-size:12.5px; color:var(--muted); margin-top:6px;}

/* ---------- Topic page ---------- */
.crumbs{font-size:12px; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:6px;}
.crumbs .sep{opacity:0.5;}
.topic-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:6px;}
.topic-head h1{font-size:clamp(28px,4vw,40px);}
.badge-level{
  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#fff;
  background:var(--red); border-radius:6px; padding:4px 9px; flex-shrink:0; margin-top:6px;
  white-space:nowrap;
}
.topic-sub{color:var(--muted); font-size:14.5px; margin-bottom:8px;}
.mark-btn{
  display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--line); background:#fff;
  padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; margin:18px 0 8px;
  color:var(--muted);
}
.mark-btn.done{border-color:var(--teal); background:var(--teal-tint); color:var(--teal);}
.mark-btn .dotc{width:9px;height:9px;border-radius:50%; border:1.5px solid currentColor;}
.mark-btn.done .dotc{background:var(--teal);}

.section-block{margin-top:30px;}
.section-block h2{
  font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--red);
  font-family:'IBM Plex Mono', monospace; font-weight:600;
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.section-block h2::after{content:""; flex:1; height:1px; background:var(--line);}
.section-block ul{margin:0; padding-left:20px;}
.section-block li{margin-bottom:7px; font-size:14.5px;}
.section-block p{font-size:14.5px; margin:0 0 10px;}
.section-block .sub-h{font-weight:600; font-size:14px; margin-top:14px; margin-bottom:6px; font-family:'Fraunces',serif;}

.extra-wrap{margin-top:34px; border-top:2px dashed var(--line); padding-top:26px;}
.extra-wrap-head{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
.extra-wrap-head .tag{
  font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; letter-spacing:0.06em;
  color:#fff; background:var(--teal); padding:3px 9px; border-radius:20px; text-transform:uppercase;
}
.extra-wrap-head b{font-family:'Fraunces',serif; font-size:16px;}
.extra-wrap-note{font-size:12px; color:var(--muted); margin-bottom:18px;}
.extra-block{margin-top:22px;}
.extra-block h3{
  font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal);
  font-family:'IBM Plex Mono', monospace; font-weight:600; display:flex; align-items:center; gap:10px; margin-bottom:10px;
}
.extra-block h3::after{content:""; flex:1; height:1px; background:var(--line);}
.extra-block ul{margin:0; padding-left:20px;}
.extra-block li{margin-bottom:7px; font-size:14px;}

.topic-images{display:flex; gap:14px; flex-wrap:wrap; margin:18px 0;}
.topic-image-card{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
  overflow:hidden; width:200px; flex-shrink:0; box-shadow:var(--shadow);
}
.topic-image-card img{display:block; width:100%; height:auto;}
.topic-image-card .cap{padding:9px 11px; font-size:11.5px; color:var(--muted); line-height:1.4;}
@media (max-width:640px){ .topic-image-card{width:100%;} }

.callout{
  border-radius:10px; padding:16px 18px; margin:14px 0; font-size:13.5px; border:1px solid;
}
.callout.mnemonic{background:var(--amber-tint); border-color:#e3caa0;}
.callout.mnemonic .clabel{font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--amber); font-weight:700; margin-bottom:6px;}
.callout.key{background:var(--red-tint); border-color:#e0b7bd;}
.callout.key .clabel{font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--red-deep); font-weight:700; margin-bottom:6px;}

table.data-tbl{width:100%; border-collapse:collapse; margin:14px 0; font-size:13px;}
table.data-tbl th, table.data-tbl td{border:1px solid var(--line); padding:9px 11px; text-align:left; vertical-align:top;}
table.data-tbl th{background:var(--bg); font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted);}
table.data-tbl tr:nth-child(even) td{background:#fbfaf7;}

.topic-nav{display:flex; justify-content:space-between; margin-top:56px; padding-top:22px; border-top:1px solid var(--line); gap:14px;}
.tn-btn{flex:1; border:1px solid var(--line); background:#fff; border-radius:10px; padding:14px 16px; cursor:pointer; max-width:48%;}
.tn-btn .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}
.tn-btn .ttl{font-family:'Fraunces',serif; font-size:15px; margin-top:3px;}
.tn-btn.next{text-align:right; margin-left:auto;}

/* ---------- Quiz ---------- */
.quiz-shell{max-width:680px; margin:0 auto; padding:56px 40px 100px;}
.quiz-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:26px;}
.quiz-progress-track{height:6px; background:var(--line); border-radius:4px; flex:1; margin:0 16px; overflow:hidden;}
.quiz-progress-fill{height:100%; background:var(--red); border-radius:4px; transition:width .3s ease;}
.quiz-count{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--muted); white-space:nowrap;}
.qcard{background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:28px; box-shadow:var(--shadow);}
.qcard .vignette{font-size:15px; line-height:1.65; margin-bottom:20px;}
.qcard .question{font-weight:600; font-size:15px; margin-bottom:18px; font-family:'Fraunces',serif;}
.opt{
  display:flex; gap:12px; align-items:flex-start; padding:13px 14px; border:1.5px solid var(--line);
  border-radius:9px; margin-bottom:10px; cursor:pointer; font-size:14px; transition:all .12s ease;
}
.opt:hover{border-color:#c9a; background:var(--red-tint);}
.opt .lt{
  width:24px;height:24px; border-radius:50%; border:1.5px solid var(--line); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;
  font-family:'IBM Plex Mono',monospace;
}
.opt.correct{border-color:var(--teal); background:var(--teal-tint);}
.opt.correct .lt{background:var(--teal); border-color:var(--teal); color:#fff;}
.opt.wrong{border-color:var(--red); background:var(--red-tint);}
.opt.wrong .lt{background:var(--red); border-color:var(--red); color:#fff;}
.opt.disabled{cursor:default;}
.opt.disabled:hover{background:none;}
.opt.dim{opacity:0.55;}

.qexplain{margin-top:16px; padding:15px 16px; background:var(--bg); border-radius:9px; font-size:13.5px; border-left:3px solid var(--teal); display:none;}
.qexplain.show{display:block;}
.qexplain b{color:var(--teal);}
.qnext-row{display:flex; justify-content:flex-end; margin-top:18px;}
.btn-primary{
  background:var(--red); color:#fff; border:none; padding:11px 22px; border-radius:8px;
  font-weight:600; font-size:13.5px; cursor:pointer;
}
.btn-primary:disabled{opacity:0.35; cursor:not-allowed;}
.btn-ghost{background:transparent; border:1.5px solid var(--line); padding:11px 22px; border-radius:8px; font-weight:600; font-size:13.5px; cursor:pointer;}
.btn-ghost:disabled{opacity:0.35; cursor:not-allowed;}

.quiz-result{text-align:center; padding:40px 20px;}
.quiz-result .score{font-family:'Fraunces',serif; font-size:64px; margin:14px 0;}
.quiz-result .score span{font-size:28px; color:var(--muted);}

/* ---------- Flow / algorithm diagrams (from PPT schemes) ---------- */
.flowcard{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
  padding:22px 22px 20px; margin-top:14px;
}
.flowcard .fnote{font-size:12px; color:var(--muted); margin-bottom:16px;}
.fstep{
  display:flex; align-items:center; gap:12px; margin-bottom:10px;
}
.fstep .fbox{
  background:var(--bg); border:1.5px solid var(--line); border-radius:9px; padding:10px 14px;
  font-size:13px; font-weight:600; flex-shrink:0;
}
.fstep .farrow{color:var(--muted); font-size:15px; flex-shrink:0;}
.fstep .fresult{font-size:13px; color:var(--muted);}
.fsplit{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:10px 0 4px;}
.fsplit.three{grid-template-columns:1fr 1fr 1fr;}
.fbranch{
  border:1.5px solid var(--line); border-radius:10px; padding:14px 15px; background:var(--bg);
}
.fbranch.red{border-color:#dfb3ba; background:var(--red-tint);}
.fbranch.teal{border-color:#b7d4cf; background:var(--teal-tint);}
.fbranch.amber{border-color:#e3caa0; background:var(--amber-tint);}
.fbranch .flabel{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em;
  color:var(--muted); margin-bottom:6px; font-weight:600;
}
.fbranch.red .flabel{color:var(--red-deep);}
.fbranch.teal .flabel{color:var(--teal);}
.fbranch.amber .flabel{color:var(--amber);}
.fbranch .fhead{font-family:'Fraunces',serif; font-size:15px; margin-bottom:6px;}
.fbranch ul{margin:0; padding-left:16px;}
.fbranch li{font-size:12.5px; margin-bottom:4px;}
.fbranch p{font-size:12.5px; margin:0;}
.fdivider{
  display:flex; align-items:center; gap:8px; margin:16px 0 10px; font-size:11px;
  color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-family:'IBM Plex Mono',monospace;
}
.fdivider::before, .fdivider::after{content:""; flex:1; height:1px; background:var(--line);}
.fseq{counter-reset:fseq; margin-top:6px;}
.fseq-item{
  counter-increment:fseq; display:flex; gap:14px; padding:12px 0; border-top:1px solid var(--line);
}
.fseq-item:first-child{border-top:none;}
.fseq-item .fnum{
  width:26px; height:26px; border-radius:50%; background:var(--red); color:#fff; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;
}
.fseq-item .fbody b{display:block; font-size:13.5px; margin-bottom:3px;}
.fseq-item .fbody span{font-size:12.5px; color:var(--muted);}
@media (max-width:640px){
  .fsplit, .fsplit.three{grid-template-columns:1fr;}
}

/* ---------- Scroll reveal ---------- */
.reveal{opacity:0; transform:translateY(10px); animation:rise .5s ease forwards;}
@keyframes rise{to{opacity:1; transform:none;}}

@media (max-width:880px){
  #sidebar{position:fixed; left:0; top:0; z-index:50; transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,0.25); width:280px;}
  #sidebar.open{transform:translateX(0);}
  .sb-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:40;}
  .sb-overlay.show{display:block;}
  .topbar{display:flex;}
  .hamburger{display:flex;}
  .content-wrap, .quiz-shell{padding:32px 20px 90px;}
  .algo-row{flex-direction:column;}
  .topic-nav{flex-direction:column;}
  .tn-btn{max-width:100%;}
}
@media (prefers-reduced-motion: reduce){
  .reveal{animation:none; opacity:1; transform:none;}
}
</style>
<div class="sb-overlay" id="sbOverlay"></div>
<div id="app">
  <aside id="sidebar">
    <div class="sb-brand" id="sbBrandHome" style="cursor:pointer;">

{
  id:'adb', cat:'anemia-mikro', level:'4A', title:'Anemia Defisiensi Besi',
  sub:'Kegagalan pembentukan Hb akibat kekurangan besi — penyebab anemia mikrositik tersering.',
  sections:[
    {h:'Definisi', list:['Anemia defisiensi besi terjadi ketika cadangan besi tubuh habis sehingga sintesis heme (komponen inti hemoglobin) terganggu. Karena besi adalah bahan baku wajib pembentukan heme, sel darah merah yang dihasilkan menjadi lebih kecil (mikrositik) dan pucat (hipokrom) dibanding normal — tubuh "terpaksa" membuat eritrosit seadanya dari besi yang tersisa.','Ini adalah jenis anemia tersering di dunia, dan pada dasarnya selalu merupakan gejala dari suatu penyebab yang mendasari (misalnya perdarahan kronik) — bukan penyakit primer itu sendiri, sehingga mencari sumber kehilangan besinya sama pentingnya dengan mengoreksi anemianya.']},
    {h:'Manifestasi Klinis', list:['Atrofi papil lidah & glositis — permukaan lidah tampak licin/halus karena papil lidah mengalami atrofi akibat turnover sel epitel yang tinggi namun kekurangan besi untuk regenerasi jaringan.','Angular cheilitis — retak dan peradangan di sudut mulut, juga akibat gangguan regenerasi epitel mukosa yang cepat membelah.','Pica — keinginan mengonsumsi bahan bukan makanan seperti tanah, es batu, atau kapur; mekanismenya belum sepenuhnya jelas namun diduga terkait perubahan neurotransmiter akibat defisiensi besi di otak.','Koilonikia (spoon nail) — kuku menjadi cekung seperti sendok, biasanya baru muncul pada defisiensi besi yang sudah berlangsung lama dan berat.']},
    {h:'Darah Tepi', list:['Teardrop cell — eritrosit berbentuk seperti tetesan air mata, terbentuk saat sel yang kaku dan abnormal "diperas" melewati sinusoid limpa yang sempit.','Pencil cell / cigar cell — eritrosit memanjang menyerupai pensil/cerutu, mencerminkan sintesis hemoglobin yang tidak adekuat sehingga bentuk sel gagal mempertahankan bikonkavitas normalnya.','Poikilositosis (variasi bentuk) dan anisositosis (variasi ukuran) — mencerminkan populasi eritrosit yang diproduksi dalam kondisi kekurangan bahan baku, sehingga ukuran dan bentuknya tidak seragam.']},
    {h:'Pemeriksaan Penunjang', list:['Profil besi menunjukkan pola yang saling berkaitan secara logis: Ferritin ↓↓ (cadangan besi tubuh benar-benar habis) — Serum Besi ↓↓ (besi yang beredar di darah juga rendah) — Saturasi Transferin ↓↓ (transferin, protein pengangkut besi, sebagian besar kosong tidak terisi besi) — TIBC ↑↑ (tubuh mengkompensasi dengan memproduksi lebih banyak transferin agar bisa "menangkap" besi sekecil apapun yang tersedia).','Serum feritin adalah pemeriksaan paling sensitif untuk ADB karena secara langsung mencerminkan cadangan besi di jaringan (terutama hati dan sumsum tulang) — namun perlu diingat feritin juga reaktan fase akut, sehingga bisa naik palsu saat ada inflamasi/infeksi bersamaan.','TIBC (Total Iron Binding Capacity) lebih sering dipakai secara klinis dibanding pemeriksaan transferin langsung karena lebih murah dan luas tersedia, walau secara konsep keduanya mengukur hal yang serupa.']},
    {h:'Tatalaksana', sub:[
      {t:'Tanpa gejala klinis', list:['Tingkatkan asupan besi dari makanan — daging merah dan hati ayam dipilih karena mengandung besi heme yang jauh lebih mudah diserap usus dibanding besi non-heme dari sumber nabati.','Hindari teh, kopi, PPI, dan antasida di sekitar waktu makan karena zat-zat ini menghambat absorpsi besi — tanin dalam teh/kopi mengikat besi menjadi kompleks yang sulit diserap, sementara obat penekan asam lambung mengurangi kelarutan besi yang dibutuhkan untuk penyerapan optimal di duodenum.']},
      {t:'Dengan gejala klinis — lini pertama (besi elemental 150–200 mg)', list:['Ferro Sulfat (20% besi elemental) — sediaan 325 mg (65 mg besi elemental) 3×1, merupakan pilihan tersering karena murah dan efektif.','Ferro Fumarat (33% besi elemental) — sediaan 325 mg (107 mg besi elemental) 2×1, kandungan besi elementalnya paling tinggi per tablet sehingga frekuensi minumnya bisa lebih jarang.','Ferro Glukonat (12% besi elemental) — sediaan 325 mg (39 mg besi elemental) 4×1, sering dipilih bila pasien tidak tahan efek samping GI sediaan lain karena iritasi lambungnya relatif lebih ringan.','Target terapi: Hb naik 1 g/dL dalam 2–3 minggu sebagai tanda respons awal yang baik, mencapai Hb 11 g/dL dalam 3 bulan, kemudian terapi tetap dilanjutkan hingga 6–12 bulan dengan dosis rumatan 60 mg besi elemental/hari — bukan dihentikan begitu Hb normal, karena cadangan besi jaringan (feritin) butuh waktu lebih lama untuk terisi kembali dibanding Hb itu sendiri.']},
      {t:'Lini kedua', list:['Besi parenteral dipertimbangkan bila ada malabsorpsi (misalnya penyakit celiac, riwayat bedah bariatrik) atau intoleransi berat terhadap sediaan oral, karena rute IV melewati proses absorpsi usus yang bermasalah tersebut.']},
      {t:'Suportif', list:['Vitamin C (asam askorbat) diberikan bersamaan karena mengubah besi feri (Fe³⁺) menjadi bentuk fero (Fe²⁺) yang jauh lebih mudah diserap oleh enterosit duodenum.']},
      {t:'Transfusi', list:['PRC dipertimbangkan bila Hb <7 g/dL atau ada gangguan hemodinamik (misalnya takikardia berat, hipotensi) — bukan untuk mengoreksi anemia secara rutin, karena tatalaksana definitif ADB tetaplah suplementasi besi, bukan transfusi.']},
    ]},
    {h:'Respon & Monitoring Terapi', list:['Retikulosit mulai naik pada minggu pertama terapi (sumsum tulang merespons cepat begitu bahan baku besi tersedia), mencapai puncak sekitar hari ke-10, lalu perlahan kembali ke nilai normal setelah hari ke-14 seiring Hb yang mulai membaik.','Hb secara rata-rata naik sekitar 0,15 g/dL per hari, atau kira-kira 2 g/dL setelah 3–4 minggu terapi adekuat — kecepatan ini menjadi patokan untuk menilai apakah terapi berjalan efektif atau perlu dievaluasi ulang (misalnya kepatuhan minum obat atau sumber perdarahan yang belum teratasi).','Hb biasanya kembali normal setelah 4–10 minggu terapi, meski terapi tetap dilanjutkan lebih lama lagi untuk mengisi ulang cadangan besi jaringan.']},
  ],

    rows:[['ADB','↓↓','↓↓','↑↑','↓↓'],['Anemia Penyakit Kronis','↓','N / ↑','↓↓','N / ↓'],['Thalassemia','N / ↑','N / ↑','N','N / ↑'],['Sideroblastik','↑','↑','N / ↓','↑']]}

{
  id:'apk', cat:'anemia-mikro', level:'4A', title:'Anemia Penyakit Kronis (ACD)',
  sub:'Anemia yang menyertai kondisi inflamasi atau penyakit kronis yang mendasari.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Saat tubuh mengalami inflamasi kronik (infeksi lama, autoimun, keganasan), hati melepaskan hepcidin dalam jumlah besar sebagai bagian respons imun. Hepcidin ini "mengunci" besi di dalam sel penyimpan (makrofag dan hepatosit) sehingga besi tidak bisa dilepas ke sirkulasi untuk dipakai eritropoiesis — bukan karena tubuh kekurangan besi, tapi karena besinya "disembunyikan" sebagai strategi pertahanan tubuh (membatasi besi yang bisa dipakai kuman patogen untuk berkembang biak).','Selain itu, sitokin inflamasi juga menekan produksi eritropoietin dan memperpendek usia eritrosit, sehingga produksi sel darah merah semakin tertekan dari beberapa sisi sekaligus.']},
    {h:'Gejala', list:['5L: Lesu, Lelah, Letih, Lemah, Lalai — gejala umum anemia yang tidak spesifik, muncul karena berkurangnya kapasitas darah membawa oksigen ke jaringan.','Selalu terdapat riwayat penyakit kronis yang mendasari (misalnya rheumatoid arthritis, tuberkulosis, gagal ginjal kronik, atau keganasan) — mencari dan menatalaksana penyakit dasarnya menjadi kunci utama, bukan sekadar mengoreksi anemianya.']},
    {h:'Pemeriksaan Penunjang', list:['Gambaran khasnya adalah normositik normokrom, karena derajat gangguannya biasanya masih ringan-sedang.','Baru menjadi mikrositik hipokrom pada kasus yang sudah sangat kronis dan berat, saat gangguan pemanfaatan besinya makin parah.','Pola profil besi: Serum besi ↓ (karena "dikunci" hepcidin), Ferritin normal/↑ (karena cadangan besi sebenarnya cukup — bahkan feritin bisa naik sebagai reaktan fase akut), TIBC ↓↓ (berkebalikan dengan ADB — tubuh tidak sedang "kelaparan" besi sehingga tidak perlu memproduksi banyak transferin), saturasi transferin normal/↓.']},
    {h:'Tatalaksana', list:['Tatalaksana utama adalah mengobati penyakit kronis/inflamasi yang mendasari — begitu inflamasi terkontrol, produksi hepcidin akan turun dan eritropoiesis kembali membaik dengan sendirinya.','Suplementasi besi umumnya tidak banyak membantu (karena masalahnya bukan kekurangan besi absolut) kecuali terbukti ada defisiensi besi yang menyertai.','Transfusi PRC dipertimbangkan bila Hb <7 g/dL atau bergejala berat, sebagai tindakan suportif sambil menunggu penyakit dasarnya terkontrol.']},
  ],
  mnemonic:{label:'"Fe Tal Cidera Kronis"', text:'Alur pikir cepat membedakan 4 anemia mikrositik lewat TIBC & feritin: TIBC↓↓ + feritin N/↑ + besi sumsum tulang (+) → Anemia Penyakit Kronis. TIBC↑↑ + feritin↓↓ + besi sumsum tulang (–) → Anemia Defisiensi Besi.'}

{
  id:'thalassemia', cat:'anemia-mikro', level:'2', title:'Thalassemia',
  sub:'Penyakit genetik autosomal resesif akibat defek sintesis rantai globin.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Hemoglobin normal tersusun dari 2 rantai alfa dan 2 rantai beta globin. Pada thalassemia, terjadi mutasi/delesi gen yang membuat salah satu rantai globin (alfa atau beta) diproduksi berkurang atau tidak sama sekali.','Rantai globin yang produksinya normal jadi berlebih relatif dan mengendap di dalam sel, merusak membran eritrosit dari dalam serta memicu eritrosit dihancurkan lebih dini di limpa (hemolisis) maupun bahkan sebelum sempat matang di sumsum tulang (eritropoiesis inefektif) — inilah sebabnya thalassemia menimbulkan anemia yang jauh lebih berat daripada sekadar "kurang bahan baku" seperti pada ADB.']},
    {h:'Klinis', list:['Anemia dan ikterus — ikterus muncul akibat pemecahan eritrosit berlebihan (hemolisis) yang melepaskan bilirubin dalam jumlah besar.','Hepatosplenomegali — terjadi karena dua hal sekaligus: limpa dan hati bekerja keras menghancurkan eritrosit abnormal (ekstramedular hemolisis), dan keduanya juga menjadi tempat eritropoiesis ekstrameduler sebagai usaha kompensasi tubuh saat sumsum tulang tidak mencukupi.','Facies cooley / rodent face — wajah khas dengan dahi menonjol, tulang pipi melebar, dan jembatan hidung tenggelam; ini terjadi karena sumsum tulang yang terus-menerus "dipaksa kerja lembur" untuk kompensasi anemia sampai meluas ke tulang wajah dan tengkorak, sehingga tulang menebal dan berubah bentuk.','Hiperpigmentasi kulit — akibat penumpukan besi (dari hemolisis kronis maupun transfusi berulang) yang terdeposit di kulit.','Riwayat keluarga thalassemia & riwayat transfusi berulang penting ditanyakan karena penyakit ini diturunkan secara autosomal resesif — kedua orang tua biasanya carrier tanpa gejala.']},
    {h:'Klasifikasi', sub:[
      {t:'Berdasarkan Fenotip', list:['Mayor — transfusion dependent, gejala berat muncul sejak usia dini karena hampir tidak ada rantai globin fungsional yang diproduksi.','Minor (trait) — asimtomatik atau anemia ringan saja, karena hanya satu alel yang bermutasi sehingga produksi rantai globin masih cukup untuk mencegah gejala berat.']},
      {t:'Thalassemia Alfa (delesi kromosom 16)', list:['Minor: α-thal 2 (silent carrier, kehilangan 1 dari 4 gen alfa) & α-thal 1 (carrier, kehilangan 2 gen) — keduanya asimtomatik atau hanya anemia ringan karena masih ada cukup gen alfa yang berfungsi.','HbH Disease (kehilangan 3 dari 4 gen alfa): rantai beta yang berlebih membentuk tetramer HbH (4 rantai beta), yang tidak stabil dan mudah rusak, sehingga menimbulkan anemia hemolitik kronik dan splenomegali.','Hb Bart\'s (kehilangan seluruh 4 gen alfa): rantai gamma janin yang berlebih membentuk tetramer Hb Bart\'s yang punya afinitas oksigen sangat tinggi sehingga sulit melepaskan oksigen ke jaringan janin — kondisi ini fatal dan menyebabkan hidrops fetalis serta kematian janin dalam kandungan (IUFD).']},
      {t:'Thalassemia Beta (mutasi kromosom 11, mayoritas di Indonesia)', list:['Minor: asimtomatik, umumnya baru terdeteksi insidental saat skrining MDT (mean corpuscular volume rendah pada pemeriksaan rutin) — penting dikenali terutama untuk konseling pranikah karena berisiko menurunkan thalassemia mayor bila menikah dengan sesama carrier.','Mayor: karena rantai beta hampir tidak diproduksi sama sekali, gejala baru muncul setelah usia 6 bulan (saat produksi HbF janin yang tadinya melindungi mulai digantikan HbA dewasa yang butuh rantai beta) — anemia berat, transfusi seumur hidup, dan splenomegali progresif.']},
    ]},
    {h:'Pemeriksaan Penunjang', list:['Darah tepi: mikrositik hipokrom, anisositosis dan poikilositosis (variasi ukuran & bentuk akibat produksi eritrosit yang tidak sempurna), sel target (target cell — eritrosit dengan area pucat di tengah dikelilingi cincin merah, akibat rasio membran-terhadap-hemoglobin yang tidak proporsional), dan Howell-Jolly body (sisa fragmen nukleus yang biasanya dibersihkan oleh limpa yang sehat — munculnya menandakan fungsi limpa mulai terganggu).','Elektroforesis Hb adalah gold standard karena secara langsung mengukur proporsi tiap jenis hemoglobin: pada thalassemia alfa akan tampak HbH & Hb Bart\'s; pada thalassemia beta akan tampak HbA1 menurun (karena rantai beta kurang) dengan HbA2 dan HbF meningkat sebagai kompensasi (tubuh "beralih" memproduksi jenis Hb yang tidak membutuhkan rantai beta normal).']},
    {h:'Tatalaksana', list:['Transfusi darah pertama diberikan bila Hb <7 g/dL (dipastikan dengan 2× pemeriksaan dalam 2 minggu untuk menyingkirkan variasi sesaat) atau Hb >7 namun sudah bergejala klinis (facies cooley, gangguan tumbuh kembang) — prinsipnya adalah menjaga Hb cukup tinggi agar sumsum tulang tidak terus-menerus "dipaksa kerja lembur" yang justru memperparah deformitas tulang.','Transfusi rutin berikutnya dipertahankan bila Hb <8 g/dL, untuk menjaga Hb pra-transfusi tetap di ambang aman.','Asam folat 2×1 mg/hari serta vitamin E & C diberikan sebagai suportif — asam folat karena eritropoiesis yang sangat aktif membutuhkan folat ekstra, sementara vitamin E & C berperan sebagai antioksidan melindungi membran eritrosit yang rapuh.','Splenektomi dipertimbangkan bila splenomegali sudah masif (menyebabkan hipersplenisme yang memperparah anemia) atau kebutuhan PRC sudah >200–220 mL/kgBB/tahun — tanda bahwa limpa terlalu agresif menghancurkan eritrosit maupun sel transfusi.']},
    {h:'Komplikasi', list:['Hemolisis kronis dan terutama transfusi berulang menyebabkan penumpukan besi berlebih (overload besi) di berbagai organ — jantung, hati, dan kelenjar endokrin — yang disebut hemosiderosis, dan bisa berujung pada gagal jantung, sirosis hati, hingga gangguan pertumbuhan/pubertas bila tidak dicegah.','Tatalaksana pencegahan/koreksi overload besi adalah Iron Chelating Agent (deferoxamine, deferiprone, atau deferasirox) yang bekerja mengikat kelebihan besi agar bisa dikeluarkan tubuh melalui urin/feses, biasanya dimulai setelah pasien menerima sekitar 10–20 kali transfusi atau feritin serum sudah cukup tinggi.']},
  ],

{
  id:'sideroblastik', cat:'anemia-mikro', level:'2', title:'Anemia Sideroblastik',
  sub:'Defek eritropoiesis pada jalur porfirin — besi masuk mitokondria namun gagal terikat pada heme.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Sintesis heme normalnya terjadi melalui serangkaian reaksi enzimatik dalam mitokondria eritroblas, di mana besi akhirnya digabungkan dengan protoporfirin membentuk heme. Pada anemia sideroblastik, ada gangguan pada enzim di jalur ini (paling sering ALA-synthase) sehingga besi yang sudah masuk ke mitokondria gagal diikat menjadi heme.','Akibatnya besi yang tidak terpakai menumpuk mengelilingi nukleus eritroblas membentuk gambaran cincin (ring sideroblast) — sementara di sisi lain tubuh justru "mengira" kekurangan besi sehingga terus menyerap dan mengedarkan besi lebih banyak, menjelaskan mengapa profil besinya berlawanan dengan ADB (serum besi dan feritin justru meningkat).']},
    {h:'Etiologi', sub:[
      {t:'Kongenital', list:['X-linked recessive — paling sering akibat mutasi gen ALAS2, mengenai laki-laki dengan pola pewarisan terkait kromosom X.','Autosomal recessive — bentuk yang lebih jarang, terkait mutasi gen lain dalam jalur sintesis heme.']},
      {t:'Acquired', list:['Klonal/neoplastik — akibat mutasi somatik pada sel prekursor eritroid.','Myelodysplastic syndrome with ring sideroblast (MDS-RS) — salah satu subtipe sindrom mielodisplastik yang secara spesifik ditandai dominasi ring sideroblast di sumsum tulang.']},
      {t:'Metabolik/reversibel', list:['Alkohol — bersifat toksik langsung terhadap mitokondria eritroblas dan mengganggu metabolisme vitamin B6 (piridoksin, kofaktor penting ALA-synthase).','Obat: isoniazid, chloramphenicol, dan linezolid — ketiganya diketahui mengganggu fungsi mitokondria atau menghambat kerja piridoksin sebagai kofaktor enzim sintesis heme.','Toksisitas zink — zink berlebih dapat mengganggu absorpsi tembaga, yang juga dibutuhkan sebagai kofaktor enzim dalam jalur sintesis heme.']},
    ]},
    {h:'Diagnosis', list:['Diagnosis ditegakkan melalui pemeriksaan sumsum tulang dengan pewarnaan Prussian blue, yang akan menunjukkan gambaran ring sideroblastik — endapan besi yang mengelilingi nukleus eritroblas membentuk cincin, sebagai bukti langsung bahwa besi gagal diintegrasikan ke dalam heme meski sudah tersedia dalam jumlah cukup bahkan berlebih.']},
  ],
},

          <li>Retikulosit normal → <b>Anemia on CKD</b></li>
          <li>WBC & Trombosit juga turun → <b>Anemia Aplastik</b></li>
        </ul>
      </div>
    </div>`}
},
{
  id:'aiha', cat:'anemia-normo', level:'3A', title:'AIHA (Autoimmune Hemolytic Anemia)',
  sub:'Penghancuran eritrosit oleh autoantibodi.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Sistem imun pasien "salah mengenali" antigen di permukaan eritrosit sendiri sebagai benda asing, lalu membentuk autoantibodi yang menempel pada eritrosit tersebut. Eritrosit yang dilapisi antibodi ini kemudian ditangkap dan dihancurkan oleh makrofag di limpa (dan kadang hati), atau langsung dilisiskan oleh sistem komplemen di pembuluh darah — menjelaskan mengapa terjadi anemia hemolitik dengan tanda-tanda peningkatan destruksi eritrosit (bilirubin & LDH naik, retikulosit naik sebagai usaha kompensasi sumsum tulang).']},
    {h:'Klasifikasi', list:['Primer (idiopatik): terjadi tanpa penyakit dasar yang jelas.','Sekunder: menyertai penyakit lain seperti limfoma, Evans syndrome, SLE, antiphospholipid syndrome, atau IBD — pada kondisi ini sistem imun yang sudah "kacau" akibat penyakit dasarnya ikut menyerang eritrosit.','Diinduksi obat: golongan penisilin, kinin, kuinidin, sulfonamid — obat dapat menempel pada membran eritrosit dan mengubahnya menjadi "tampak asing" di mata sistem imun, atau memicu pembentukan kompleks imun yang ikut merusak eritrosit.','Diinduksi aloantibodi: reaksi hemolitik transfusi (antibodi terhadap eritrosit donor) dan penyakit hemolitik pada bayi baru lahir (antibodi ibu menyerang eritrosit janin akibat inkompatibilitas Rh/ABO).','Warm (diperantarai IgG, bereaksi optimal pada suhu tubuh) vs Cold (diperantarai IgM, bereaksi optimal pada suhu lebih rendah dari suhu tubuh) — pembagian ini penting karena menentukan pola klinis dan strategi terapi yang sangat berbeda.']},
    {h:'Pemeriksaan Penunjang', list:['Normositik normokrom — karena masalahnya bukan pada sintesis Hb, melainkan destruksi eritrosit yang sudah matang.','Retikulositosis (>2%) — sumsum tulang berusaha mengkompensasi hilangnya eritrosit dengan mempercepat produksi.','LDH dan bilirubin indirek meningkat — keduanya dilepaskan saat eritrosit pecah (hemolisis), menjadi penanda tidak langsung derajat hemolisis.','Direct antiglobulin test (DAT) / Coombs test positif — pemeriksaan kunci yang membuktikan adanya antibodi/komplemen menempel langsung pada eritrosit pasien, sehingga menjadi dasar diagnosis definitif AIHA.','Sferosit (eritrosit bulat tanpa area pucat di tengah, akibat sebagian membrannya "digigit" makrofag) pada tipe warm; aglutinasi (eritrosit saling menggumpal) pada tipe cold akibat IgM yang mengikat banyak eritrosit sekaligus.']},
    {h:'Tatalaksana', list:['Lini pertama: kortikosteroid — Prednison 1 mg/kgBB/hari oral, atau metilprednisolon IV pada kasus berat, bekerja menekan sistem imun agar produksi autoantibodi dan aktivitas makrofag penghancur eritrosit berkurang.','Lini kedua bila steroid gagal/kambuh: splenektomi (menghilangkan tempat utama destruksi eritrosit) atau anti-CD20 (rituximab, menekan sel B penghasil autoantibodi).','Transfusi memerlukan perhatian khusus karena sel darah donor pun berisiko dikenali dan dihancurkan oleh autoantibodi pasien yang sama — crossmatch menjadi lebih sulit dan hasil transfusi kadang tidak bertahan lama, sehingga transfusi hanya diberikan bila benar-benar diperlukan secara klinis (bukan sekadar mengejar angka Hb).']},
  ],
  table:{title:'Warm vs Cold AIHA', head:['Aspek','Warm (70%)','Cold (30%)'],
    rows:[
      ['Suhu aglutinasi','Suhu tubuh (37°C)','Di bawah suhu tubuh (4–37°C)'],
      ['Klinis','Akut & berat; penyakit kolagen, idiopatik','Acrocyanosis, pasca infeksi, idiopatik'],
      ['Prevalensi','Usia muda','Usia tua'],
      ['Direct Coombs test','Positif IgG','Positif komplemen C3, IgG negatif'],
      ['Tipe antibodi','IgG (warm agglutinin)','IgM (cold agglutinin) mengikat C3'],
      ['Terapi','Kortikosteroid dosis tinggi, splenektomi bila resisten','Hindari paparan dingin; steroid & splenektomi kurang efektif'],
    ]}
},
{
  id:'g6pd', cat:'anemia-normo', level:'3A', title:'Anemia Defisiensi G6PD',
  sub:'Enzimopati terkait kromosom X (Xq28) yang paling umum diderita manusia.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Enzim G6PD (Glukosa-6-Fosfat Dehidrogenase) berperan menjaga persediaan glutation tereduksi di dalam eritrosit — molekul yang melindungi sel dari kerusakan akibat stres oksidatif. Saat G6PD kurang/tidak berfungsi, eritrosit kehilangan pertahanan antioksidannya.','Ketika terpapar zat pengoksidasi (obat tertentu, infeksi, atau kacang fava), hemoglobin di dalam eritrosit yang tidak terlindungi ini akan mengalami denaturasi dan mengendap membentuk Heinz bodies, lalu eritrosit yang rusak ini dihancurkan baik oleh makrofag limpa (menyisakan gambaran bite cells, karena sebagian membrannya "digigit") maupun langsung pecah di pembuluh darah (hemolisis intravaskular) — menjelaskan mengapa hemolisis pada G6PD bersifat akut dan episodik, hanya muncul saat ada pemicu.']},
    {h:'Epidemiologi', list:['Prevalensi tinggi di daerah endemis malaria, termasuk Asia Tenggara & Indonesia — diduga karena eritrosit defisiensi G6PD justru kurang nyaman menjadi tempat hidup parasit malaria, memberi keuntungan evolusioner (heterozygote advantage) bagi pembawa gen ini di daerah endemis.','Gen G6PD terletak pada lengan panjang kromosom X (Xq28), berdekatan dengan gen hemofilia A, diskeratosis kongenita, dan buta warna — kedekatan lokasi ini kadang menjadi alasan kondisi-kondisi tersebut disebut bersamaan dalam soal-soal genetik terkait kromosom X.']},
    {h:'Manifestasi Klinis', list:['Sebagian besar pasien asimtomatik sehari-hari karena eritrosit yang belum terpapar stresor oksidatif tetap berfungsi normal.','Gejala muncul saat eritrosit mengalami stres oksidatif — dipicu oleh obat (penyebab tersering), infeksi (yang juga menghasilkan reactive oxygen species selama respons imun), atau konsumsi kacang fava (mengandung senyawa oksidator vicine dan convicine).','Hemolisis akut ditandai lemah, nyeri punggung (diduga terkait pelepasan hemoglobin bebas yang mengiritasi ginjal), anemia, dan ikterus yang muncul mendadak beberapa hari setelah paparan pemicu.','Bilirubin tidak terkonjugasi meningkat, LDH meningkat, dan retikulositosis — pola klasik penanda hemolisis akut, serupa dengan AIHA namun pemicunya berbeda (oksidatif, bukan autoimun).']},
    {h:'Pemeriksaan Penunjang', list:['Heinz body pada pewarnaan supravital — tampak sebagai presipitat hemoglobin yang terdenaturasi di dalam eritrosit, bukti langsung kerusakan oksidatif pada hemoglobin.','Bite cells — eritrosit dengan cekungan di tepinya, terbentuk saat makrofag limpa "menggigit" bagian membran yang mengandung Heinz bodies sambil membiarkan sisa selnya tetap beredar.']},
  ],
  mnemonic:{label:'Obat Pencetus Hemolisis G6PD (Definite Risk)', text:'Primaquine · Dapsone · Sulfametoksazol · Kotrimoksazol · Nitrofurantoin · Nalidixic acid · Niridazole · Acetanilide · Naphthalene · Methylene blue'}
},
{
  id:'ckd-anemia', cat:'anemia-normo', level:'3A', title:'Anemia on CKD',
  sub:'Anemia akibat defisiensi eritropoietin pada gagal ginjal kronik.',
  sections:[
    {h:'Patofisiologi', list:['Ginjal yang sehat memiliki sel-sel khusus di korteks yang mendeteksi kadar oksigen darah, dan akan melepaskan eritropoietin (EPO) saat mendeteksi hipoksia, yang kemudian merangsang sumsum tulang memproduksi lebih banyak eritrosit.','Pada CKD, jaringan ginjal yang berfungsi rusak progresif sehingga sel penghasil EPO ikut berkurang — akibatnya sekresi EPO terganggu meski tubuh sebenarnya butuh lebih banyak eritrosit (misalnya karena anemia itu sendiri menyebabkan hipoksia jaringan). Ini adalah lingkaran yang sulit diputus tanpa intervensi dari luar berupa suplementasi EPO.']},
    {h:'Manifestasi Klinis', list:['5L: lemah, letih, lesu — gejala umum anemia akibat berkurangnya kapasitas darah membawa oksigen.','Konjungtiva anemis pada pemeriksaan fisik.','Disertai manifestasi gagal ginjal kronik lainnya seperti edema, hipertensi, mual, dan penurunan produksi urin — penting untuk mengenali anemia ini sebagai bagian dari gambaran klinis CKD secara keseluruhan, bukan kondisi yang berdiri sendiri.']},
    {h:'Pemeriksaan Penunjang', list:['Morfologi darah tepi (MDT): normositik normokromik — karena masalahnya pada jumlah produksi eritrosit (kekurangan sinyal EPO), bukan pada kualitas sintesis hemoglobinnya.','Fungsi ginjal: ureum dan kreatinin meningkat, mengonfirmasi adanya penurunan fungsi ginjal yang mendasari.','USG: ginjal mengecil — tanda kerusakan struktural kronik pada CKD lanjut.','Kadar eritropoietin menurun, mengonfirmasi mekanisme utama anemia pada pasien ini.']},
    {h:'Tatalaksana', list:['Mengatasi penyakit ginjal dasar sesuai penyebab dan stadium CKD-nya (kontrol tekanan darah, gula darah, dan faktor risiko progresi lainnya).','Suplementasi eritropoietin (ESA) untuk mengganti sinyal yang seharusnya diproduksi ginjal.','Transfusi darah dipertimbangkan bila anemia berat atau bergejala, sebagai tindakan suportif jangka pendek — bukan solusi jangka panjang karena tidak mengoreksi defisiensi EPO yang mendasarinya.']},
  ]
},
{
  id:'aplastik', cat:'anemia-normo', level:'2', title:'Anemia Aplastik',
  sub:'Anemia berat/fatal akibat gangguan stem cell sumsum tulang → pansitopenia.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Anemia aplastik terjadi ketika sel punca hematopoietik (hematopoietic stem cell) di sumsum tulang rusak atau berkurang drastis jumlahnya, sehingga sumsum tulang gagal memproduksi ketiga lini sel darah (eritrosit, leukosit, trombosit) secara bersamaan — inilah yang membedakannya dari anemia jenis lain yang biasanya hanya mengganggu lini eritrosit saja.','Kerusakan ini bisa terjadi melalui serangan autoimun terhadap sel punca, toksisitas langsung bahan kimia/obat/radiasi, atau infeksi virus yang merusak sumsum tulang — pada banyak kasus penyebab pastinya tidak dapat ditemukan (idiopatik).']},
    {h:'Etiologi', list:['Idiopatik — merupakan penyebab tersering, diduga besar berkaitan dengan mekanisme autoimun terhadap sel punca yang belum sepenuhnya dipahami.','Radiasi — merusak DNA sel punca yang sedang aktif membelah.','Obat & bahan kimia: kemoterapi (bekerja menghambat pembelahan sel, termasuk sel punca normal), benzene, garam emas, kloramfenikol, hydantoin, carbamazepine — sebagian bersifat dose-dependent (predictable) dan sebagian bersifat idiosinkratik (reaksi individual yang tidak bisa diprediksi dari dosis).','Infeksi virus: hepatitis (terutama hepatitis non-A non-B non-C), EBV, CMV, parvovirus, HIV — virus-virus ini dapat menginfeksi atau memicu respons imun yang merusak sel punca sumsum tulang.','Penyakit imun, hemoglobinuria paroksismal nokturnal (PNH, yang dapat tumpang tindih dengan anemia aplastik), dan kehamilan (jarang, biasanya membaik setelah persalinan).']},
    {h:'Manifestasi Klinis', list:['Gejala anemia: 5L (lemah, letih, lesu, lunglai, lalai/lupa), pucat, pusing, jantung berdebar, dan sesak napas — akibat berkurangnya eritrosit.','Gejala trombositopenia: perdarahan mukosa dan memar di bawah kulit (ekimosis) — akibat berkurangnya trombosit yang berperan dalam hemostasis primer.','Gejala leukopenia: rentan mengalami infeksi berulang dan demam — akibat berkurangnya leukosit yang bertugas melawan infeksi. Kombinasi ketiga gejala ini sekaligus (bukan hanya salah satu) adalah kunci mencurigai pansitopenia seperti pada anemia aplastik.']},
    {h:'Pemeriksaan Penunjang', list:['Gold Standard: Biopsi sumsum tulang, yang akan menunjukkan gambaran hiposelular dengan banyak jaringan lemak menggantikan sel-sel hematopoietik normal — membuktikan secara langsung bahwa sumsum tulang memang "kosong", bukan sekadar tertekan sementara.']},
    {h:'Tatalaksana', list:['Identifikasi dan hentikan/tatalaksana etiologi dasar bila diketahui (misalnya menghentikan obat penyebab).','Suportif: transfusi (bila Hb <7 g/dL), serta pencegahan perdarahan & infeksi (misalnya menghindari trauma, kewaspadaan terhadap tanda infeksi dini) selagi menunggu terapi definitif bekerja.','Definitif: transplantasi sumsum tulang dari donor HLA matched, idealnya saudara kandung — memberi sumber sel punca baru yang sehat untuk menggantikan yang rusak, dan merupakan satu-satunya terapi yang berpotensi kuratif total.','Imunosupresi (ATG, ALG, cyclosporin, cyclophosphamide, kortikosteroid) menjadi pilihan bila transplantasi tidak memungkinkan (misalnya tidak ada donor cocok) — bekerja dengan asumsi bahwa kerusakan sel punca sebagian besar dimediasi oleh serangan autoimun, sehingga menekan sistem imun dapat memberi kesempatan sel punca yang tersisa untuk pulih.']},
  ]
},
// ---------------- ANEMIA MAKROSITER ----------------
{
  id:'b12', cat:'anemia-makro', level:'2', title:'Anemia Defisiensi Vitamin B12',
  sub:'Gangguan sintesis eritrosit & myelinisasi sistem saraf akibat defisiensi kobalamin.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Vitamin B12 (kobalamin) adalah kofaktor penting untuk enzim yang terlibat dalam sintesis DNA. Saat kekurangan, pembelahan sel — termasuk sel prekursor eritrosit di sumsum tulang — menjadi terganggu, sementara sitoplasma sel tetap berkembang normal. Akibatnya terbentuk sel besar dengan inti yang "tertinggal" perkembangannya (megaloblastik), termasuk eritrosit besar berbentuk oval (makroovalosit).','B12 juga berperan penting dalam metabolisme mielin saraf, sehingga defisiensinya juga menimbulkan gangguan neurologis (kesemutan, kebas, ataksia) — inilah yang membedakannya secara klinis dari defisiensi asam folat, yang meski sama-sama menyebabkan anemia megaloblastik, tidak mengganggu saraf.','Absorpsi B12 memerlukan faktor intrinsik yang diproduksi sel parietal lambung, kemudian kompleks B12-faktor intrinsik diserap secara spesifik di ileum terminal — sehingga gangguan di lambung (gastritis atrofi) maupun di ileum (reseksi usus, penyakit Crohn) sama-sama bisa menyebabkan defisiensi B12.']},
    {h:'Etiologi', sub:[
      {t:'Malabsorpsi', list:['Defisiensi faktor intrinsik akibat gastritis atrofi autoimun (anemia pernisiosa) — sistem imun menyerang sel parietal lambung penghasil faktor intrinsik.','Gastrektomi — mengurangi jumlah sel parietal penghasil faktor intrinsik secara langsung.','Crohn disease — terutama bila mengenai ileum terminal, tempat spesifik penyerapan kompleks B12-faktor intrinsik.']},
      {t:'Malnutrisi', list:['Diet vegan/vegetarian ketat — karena B12 secara alami hanya terdapat pada produk hewani, sehingga pola makan tanpa suplementasi berisiko defisiensi dalam jangka panjang (biasanya butuh waktu bertahun-tahun karena cadangan B12 di hati cukup besar).']},
    ]},
    {h:'Diagnosis', list:['MCV meningkat dan hitung retikulosit rendah — mencerminkan eritropoiesis yang tidak efektif meski sel prekursornya banyak (karena gagal membelah dengan benar).','Apusan darah tepi: makroovalosit (eritrosit besar oval) dan neutrofil hipersegmentasi (inti neutrofil dengan lebih dari 5 lobus, akibat gangguan pembelahan sel yang sama juga memengaruhi lini leukosit).','Vitamin B12 serum rendah (<100 pg/mL) sebagai pemeriksaan skrining awal.','Asam metilmalonat dan homosistein meningkat — keduanya adalah substrat metabolik yang membutuhkan B12 sebagai kofaktor untuk diproses lebih lanjut, sehingga menumpuk saat B12 kurang; ini membantu membedakan dari defisiensi folat murni (di mana metilmalonat tetap normal).','Gold Standard: Tes Schilling untuk memastikan penyebab spesifik malabsorpsi (defisiensi faktor intrinsik vs gangguan usus lain).']},
    {h:'Tatalaksana', list:['Vitamin B12 parenteral (IM/SC) 1 mg/hari selama 1 minggu untuk cepat mengisi kembali cadangan yang sudah sangat rendah.','Dilanjutkan 1 mg/minggu selama 4 minggu, lalu 1 mg/bulan sebagai dosis rumatan jangka panjang (seringkali seumur hidup bila penyebabnya adalah gangguan absorpsi permanen seperti anemia pernisiosa atau reseksi ileum).','Sediaan oral kurang efektif bila ada gangguan absorpsi GI yang mendasari — karena masalah utamanya justru pada proses penyerapannya, sehingga rute parenteral (yang melewati proses absorpsi usus) lebih diandalkan pada kasus tersebut.']},
  ],
  mnemonic:{label:'Ingat', text:'Reseksi usus dapat memicu defisiensi Vitamin B12. Manifestasi khas: gangguan neurologis (kesemutan, kebas, ataksia) + glositis atrofi — beda dari defisiensi B9 yang tidak bergejala neurologis.'},
  diagram:{title:'Prosedur Tes Schilling', note:'Gold standard untuk menilai penyebab defisiensi vitamin B12 — membedakan gangguan absorpsi di ileum akibat kurangnya faktor intrinsik vs penyebab lain.', html:`
    <div class="fseq">
      <div class="fseq-item"><div class="fnum">1</div><div class="fbody"><b>Tahap 1 — Tanpa faktor intrinsik</b><span>Pasien diberikan vitamin B12 radioaktif per oral, diikuti dosis B12 non-radioaktif dosis besar (flooding dose) secara IM/parenteral untuk menjenuhkan reseptor hati. Ekskresi B12 radioaktif dalam urin 24 jam kemudian diukur.</span></div></div>
      <div class="fseq-item"><div class="fnum">2</div><div class="fbody"><b>Interpretasi Tahap 1</b><span>Ekskresi urin rendah (&lt;7%) menunjukkan adanya malabsorpsi B12 — namun belum diketahui penyebabnya (faktor intrinsik vs gangguan usus lain).</span></div></div>
      <div class="fseq-item"><div class="fnum">3</div><div class="fbody"><b>Tahap 2 — Dengan faktor intrinsik</b><span>Tes diulang, kali ini B12 radioaktif oral diberikan bersama faktor intrinsik. Ekskresi urin diukur kembali.</span></div></div>
      <div class="fseq-item"><div class="fnum">4</div><div class="fbody"><b>Interpretasi Tahap 2</b><span>Bila ekskresi urin normal setelah penambahan faktor intrinsik → <b>Anemia pernisiosa</b> (defisiensi faktor intrinsik / gastritis atrofi autoimun). Bila tetap rendah → penyebab malabsorpsi lain di usus (mis. reseksi ileum, penyakit Crohn, overgrowth bakteri).</span></div></div>
    </div>`}
},
{
  id:'b9', cat:'anemia-makro', level:'2', title:'Anemia Defisiensi Vitamin B9 (Asam Folat)',
  sub:'Anemia megaloblastik tanpa gejala neurologis, absorpsi di duodenum.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Sama seperti B12, asam folat (vitamin B9) juga merupakan kofaktor penting untuk sintesis DNA — namun perannya lebih di jalur sintesis basa nukleotida secara langsung. Kekurangannya menghasilkan gambaran megaloblastik yang identik secara morfologi dengan defisiensi B12.','Perbedaan utamanya: folat diserap di duodenum & jejunum proksimal (bukan ileum), tidak membutuhkan faktor intrinsik, dan cadangannya di tubuh jauh lebih sedikit (hanya cukup untuk sekitar 2–4 bulan) dibanding cadangan B12 yang bisa bertahan bertahun-tahun — sehingga defisiensi folat cenderung muncul lebih cepat saat asupan berkurang, misalnya pada kondisi akut seperti alkoholisme berat atau malnutrisi mendadak.','Karena folat tidak berperan dalam metabolisme mielin saraf, defisiensinya tidak menimbulkan gejala neurologis — inilah pembeda klinis utama dari defisiensi B12 meski gambaran darahnya serupa.']},
    {h:'Etiologi', list:['Diet kurang adekuat — folat mudah rusak oleh pemanasan sehingga makanan yang terlalu lama dimasak juga bisa mengurangi asupan efektifnya.','Kebutuhan meningkat, terutama pada kehamilan — karena folat sangat dibutuhkan untuk pembelahan sel yang cepat pada pertumbuhan janin, sehingga suplementasi folat rutin dianjurkan sejak sebelum dan selama kehamilan.','Malabsorpsi, banyak terjadi akibat masalah di usus halus bagian proksimal tempat folat diserap.','Obat-obatan seperti fenitoin, metotreksat, sulfasalazine, dan trimetoprim — beberapa bekerja sebagai antagonis folat langsung (metotreksat, trimetoprim menghambat enzim dihidrofolat reduktase), sementara yang lain mengganggu absorpsinya.']},
    {h:'Pemeriksaan Penunjang', list:['Morfologi darah tepi (MDT): neutrofil hipersegmentasi — gambaran yang identik dengan defisiensi B12 karena mekanisme dasarnya sama-sama gangguan sintesis DNA.','Kadar serum folat (B9) menurun sebagai konfirmasi diagnosis.','Untuk membedakan dari defisiensi B12: kadar asam metilmalonat tetap normal pada defisiensi folat murni (berbeda dengan B12 yang meningkat), sementara homosistein tetap meningkat pada keduanya karena keduanya sama-sama dibutuhkan dalam siklus metabolisme homosistein.']},
    {h:'Tatalaksana', list:['Asam folat 1–5 mg/hari selama 1–4 bulan, tergantung derajat defisiensi dan kemampuan mengatasi penyebab dasarnya.','Dosis 1 mg/hari umumnya sudah efektif untuk sebagian besar kasus, kecuali pada malabsorpsi berat yang mungkin membutuhkan dosis lebih tinggi.']},
  ],
  table:{title:'Defisiensi B9 vs B12', head:['Aspek','Defisiensi B9 (Asam Folat)','Defisiensi B12 (Anemia Pernisiosa)'],
    rows:[
      ['Darah tepi','Makrositik, makroovalosit, neutrofil hipersegmentasi','Sama — makroovalosit & neutrofil hipersegmentasi'],
      ['Etiologi','Alkohol, fenitoin, fenobarbital, kehamilan','Vegetarian, gastrektomi, anemia pernisiosa'],
      ['Absorpsi','Duodenum','Ileum, gaster (faktor intrinsik)'],
      ['Gejala khas','Riwayat anak dengan NTD (jika ibu defisiensi)','Gejala neurologis (kebas, kesemutan)'],
      ['Penunjang','Metilmalonat normal, homosistein ↑','Schilling test (+) — Gold Standard'],
      ['Tatalaksana','Asam folat 1 mg/hari','Cobalamin 1000 mcg IM/SC/hari (5 hari) → 1000 mcg/minggu (5 minggu) → 100–1000 mcg/minggu'],
    ]}
},
// ---------------- GANGGUAN HEMOSTASIS ----------------
{
  id:'hemostasis-overview', cat:'hemostasis', level:'1', title:'Alur Diagnosis Gangguan Hemostasis',
  sub:'Klasifikasi gangguan hemostasis primer, sekunder, dan tersier berdasarkan komponen yang terganggu.',
  sections:[
    {h:'Cara Berpikir', list:['Hemostasis primer melibatkan pembuluh darah & trombosit (klinis: petekie, purpura; BT memanjang)','Hemostasis sekunder melibatkan faktor koagulasi (klinis: ekimosis, hemartrosis; PT/aPTT memanjang)','Hemostasis tersier terkait fibrinolisis/stasis vena (klinis: bengkak, hangat; D-dimer meningkat)']},
  ],
  diagram:{title:'Skema Gangguan Hemostasis Primer – Sekunder – Tersier', html:`
