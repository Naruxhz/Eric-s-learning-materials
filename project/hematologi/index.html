{
  id:'hsp', cat:'hemostasis', level:'2', title:'Henoch-Schönlein Purpura (HSP)',
  sub:'Vaskulitis generalisata akut yang dimediasi IgA, mengenai pembuluh darah kecil.',
  sections:[
    {h:'Patofisiologi Singkat', list:['HSP adalah reaksi vaskulitis yang dipicu deposisi kompleks imun IgA pada dinding pembuluh darah kecil (venula, kapiler, arteriol). Deposit ini memicu peradangan pada dinding pembuluh darah, yang membuatnya menjadi rapuh dan bocor — menjelaskan mengapa muncul purpura (perdarahan kecil di kulit) meski jumlah trombosit dan faktor koagulasi pasien sepenuhnya normal (berbeda dari ITP atau hemofilia).','Karena deposit IgA ini dapat terjadi di berbagai organ, gejalanya pun bisa muncul di banyak tempat sekaligus: kulit (purpura), sendi (artritis akibat inflamasi sinovial), saluran cerna (nyeri perut akibat vaskulitis dinding usus), dan ginjal (glomerulus yang juga mengalami deposit IgA, menimbulkan hematuria).']},
    {h:'Definisi', list:['Melibatkan pembuluh darah ukuran kecil pada kulit, traktus gastrointestinal, ginjal, dan sendi; pada kasus yang lebih jarang juga dapat melibatkan paru dan sistem saraf pusat.']},
    {h:'Epidemiologi', list:['Sekitar 90% kasus terjadi pada anak-anak, terutama usia 3–15 tahun — jarang pada dewasa, dan bila terjadi pada dewasa cenderung lebih berat.','Rasio laki-laki : perempuan = 1,5 : 1, menunjukkan sedikit predominansi pada anak laki-laki.','Gejala awal sering tidak spesifik seperti nyeri kepala, demam ringan, dan anoreksia, muncul beberapa hari sebelum tanda khas purpura terlihat — sehingga di fase awal sering disangka infeksi virus biasa.']},
    {h:'Manifestasi Klinis', list:['Palpable purpura — bercak kemerahan yang bisa diraba (berbeda dari ruam biasa yang rata), khas muncul simetris di ekstremitas bawah dan bokong; biasanya didahului riwayat infeksi saluran napas atas 1–3 minggu sebelumnya, yang diduga memicu respons imun IgA berlebih.','Artritis, biasanya mengenai sendi besar (lutut, pergelangan kaki), bersifat sementara dan tidak meninggalkan kerusakan sendi permanen.','Nyeri abdomen akibat vaskulitis pada dinding usus, pada kasus berat bisa disertai perdarahan saluran cerna atau bahkan intususepsi (usus yang masuk ke bagian usus lainnya) sebagai komplikasi.','Hematuria, sebagai tanda keterlibatan ginjal (nefritis HSP) — perlu dipantau karena bisa berkembang menjadi masalah ginjal jangka panjang meski gejala kulit sudah membaik.']},
    {h:'Tatalaksana', list:['Suportif: menjaga hidrasi dan nutrisi yang adekuat, serta analgetik untuk mengatasi nyeri sendi/perut — pada sebagian besar kasus anak, HSP bersifat self-limited dan membaik dengan sendirinya dalam beberapa minggu.','Bila ada tanda inflamasi berat (nyeri perut hebat, artritis mengganggu aktivitas): prednison 1 mg/kg/hari selama 1–2 minggu lalu tapering off — kortikosteroid membantu meredakan gejala lebih cepat namun tidak terbukti mengubah perjalanan penyakit ginjalnya secara jangka panjang.','Kasus berat (misalnya perdarahan GI masif atau keterlibatan ginjal progresif) mempertimbangkan IVIG sebagai terapi tambahan.']},
  ],
  mnemonic:{label:'Awas Jebakan', text:'HSP berhubungan dengan IgA Nefropati (Berger Disease) — BUKAN Buerger Disease (penyakit vaskular kaki/tangan menghitam).'}
},
{
  id:'itp', cat:'hemostasis', level:'2', title:'Immune Thrombocytopenia Purpura (ITP)',
  sub:'Trombositopenia menetap (<150.000/µL) akibat autoantibodi terhadap antigen trombosit.',
  sections:[
    {h:'Patofisiologi', list:['Sistem imun pasien membentuk autoantibodi (mayoritas IgG) yang menyerang glikoprotein di membran trombosit, paling sering glikoprotein IIb-IIIa atau Ib-IX — dua protein yang berperan penting dalam agregasi dan adhesi trombosit saat proses pembekuan darah normal.','Trombosit yang sudah dilapisi antibodi ini kemudian dikenali sebagai "target" oleh reseptor Fc IgG pada makrofag (terutama di limpa), yang kemudian menghancurkan trombosit tersebut lebih cepat dari biasanya — mempersingkat usia trombosit dari normalnya 7–10 hari menjadi hanya beberapa jam pada kasus berat.','Pada kasus yang lebih berat, autoantibodi ini juga menyerang megakariosit (sel prekursor trombosit di sumsum tulang), sehingga produksi trombosit baru pun ikut terganggu — menjelaskan mengapa derajat ITP bisa bervariasi dari ringan hingga sangat berat.']},
    {h:'Manifestasi Klinis', list:['Perdarahan: ekimosis, petekie, dan purpura — derajatnya sangat bergantung pada jumlah trombosit yang tersisa; perdarahan spontan berat biasanya baru muncul saat trombosit di bawah 10.000–20.000/µL.']},
    {h:'Klasifikasi', sub:[
      {t:'Derajat', list:['ITP ringan: hanya trombosit yang diserang, sementara megakariosit di sumsum tulang masih mampu berkompensasi memproduksi trombosit lebih banyak.','ITP berat: megakariosit turut diserang oleh autoantibodi, sehingga produksi trombosit dari sumsum tulang pun ikut menurun — kombinasi destruksi cepat dan produksi rendah inilah yang membuat trombositnya bisa sangat rendah.']},
      {t:'Perjalanan penyakit', list:['ITP akut: lebih sering pada anak, biasanya dipicu infeksi virus sebelumnya, >90% sembuh spontan dalam 3–6 bulan (self-limited), dengan manifestasi purpura kulit & mukosa.','ITP kronik: lebih sering pada dewasa (terutama perempuan), berlangsung >12 bulan, cenderung menimbulkan perdarahan yang lebih berat dengan traktus urogenital (misalnya menoragia) sebagai tempat perdarahan tersering.']},
    ]},
    {h:'Pemeriksaan Penunjang', list:['Trombositopenia terisolasi; morfologi eritrosit, leukosit, dan retikulosit umumnya normal — karena masalahnya spesifik pada trombosit saja, bukan mengenai seluruh lini sel darah seperti pada anemia aplastik.','Bleeding time memanjang, mencerminkan gangguan hemostasis primer akibat kurangnya trombosit fungsional.','Aspirasi sumsum tulang tidak rutin dilakukan, hanya dipertimbangkan pada usia >40 tahun, gambaran klinis yang tidak khas, atau tidak respons terhadap terapi — untuk menyingkirkan penyebab lain seperti keganasan hematologi yang juga bisa menyebabkan trombositopenia.']},
    {h:'Tatalaksana', list:['Angka trombosit (AT) >30.000/mm³ dengan kondisi asimtomatik atau purpura minimal → umumnya tidak diterapi rutin, cukup observasi, karena risiko perdarahan berat pada rentang ini relatif rendah.','Perdarahan mukosa dengan AT <20.000, atau perdarahan ringan dengan AT <10.000 → kortikosteroid (Prednison 1–2 mg/kgBB/hari), bekerja menekan produksi autoantibodi dan aktivitas makrofag penghancur trombosit.','Transfusi suspensi trombosit dipertimbangkan pada situasi berisiko tinggi: AT <20.000, perdarahan retina/berat, AT <50.000 dengan perdarahan mukosa berulang, kecurigaan perdarahan intrakranial, atau sebelum operasi dengan AT <150.000 — meski perlu diingat trombosit donor juga berisiko cepat dihancurkan oleh autoantibodi yang masih beredar, sehingga transfusi lebih bersifat "penopang sementara" daripada solusi jangka panjang.']},
  ],
  mnemonic:{label:'Kata Kunci UKMPPD', text:'Riwayat infeksi + purpura + trombositopenia, tanpa penyebab lain → curigai ITP. ITP adalah diagnosis "tong sampah" — pilihan terakhir setelah menyingkirkan penyebab lain.'}
},
{
  id:'hemofilia', cat:'hemostasis', level:'2', title:'Hemofilia',
  sub:'Gangguan pembekuan darah akibat defisiensi faktor koagulasi, diturunkan X-linked resesif.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Faktor VIII dan IX adalah bagian dari jalur intrinsik kaskade koagulasi yang bekerja mengaktifkan faktor X menuju jalur bersama (common pathway) untuk akhirnya membentuk fibrin yang menstabilkan bekuan darah. Tanpa faktor ini dalam jumlah cukup, bekuan awal (yang dibentuk trombosit) tetap terbentuk namun rapuh dan mudah pecah kembali — sehingga perdarahan hemofilia sering bersifat "delayed" (baru terlihat beberapa jam setelah trauma) dan cenderung terjadi di jaringan dalam seperti sendi dan otot, berbeda dari gangguan trombosit yang biasanya langsung tampak di kulit/mukosa.','Karena gen F.VIII dan F.IX terletak di kromosom X, hemofilia diwariskan secara X-linked resesif — hampir selalu mengenai laki-laki (yang hanya punya 1 kromosom X), sementara perempuan biasanya menjadi carrier asimtomatik (kecuali kasus yang sangat jarang).']},
    {h:'Klasifikasi & Epidemiologi', list:['Hemofilia A: defisiensi faktor VIII ("hemofilia klasik") — merupakan bentuk tersering, sekitar 80% dari seluruh kasus hemofilia.','Hemofilia B: defisiensi faktor IX (dikenal sebagai Christmas disease, dinamai dari pasien pertama yang dilaporkan) — sekitar 15% kasus.','Hemofilia C: defisiensi faktor XI — sekitar 5% kasus, dengan pola pewarisan autosomal (bukan X-linked) sehingga bisa mengenai laki-laki maupun perempuan.','Sekitar 70% pasien memiliki riwayat keluarga dengan gangguan pembekuan darah serupa, meski 30% sisanya bisa merupakan mutasi baru (de novo) tanpa riwayat keluarga.']},
    {h:'Manifestasi Klinis', list:['Perdarahan dalam (hematoma jaringan lunak, hemartrosis sendi) yang dapat terjadi spontan atau bahkan akibat trauma yang sangat ringan pada kasus berat.','Tipe perdarahan yang khas: hemartrosis (perdarahan sendi, paling sering lutut, siku, pergelangan kaki — bila berulang dapat merusak sendi secara permanen/artropati hemofilik), hematoma otot, perdarahan intrakranial (paling berbahaya), hematuria, epistaksis, dan perdarahan tali pusat/frenulum pada bayi baru lahir.','Riwayat perdarahan berlebihan sejak kecil (misalnya perdarahan lama setelah sirkumsisi, atau memar berlebihan saat mulai belajar merangkak/berjalan) menjadi petunjuk penting dalam anamnesis.']},
    {h:'Pemeriksaan Penunjang', list:['Trombosit normal, Bleeding Time normal, dan PT normal — karena hemostasis primer (trombosit) dan jalur ekstrinsik (PT) tidak terganggu; masalahnya spesifik pada jalur intrinsik.','Clotting Time memanjang dan aPTT memanjang — mencerminkan gangguan pada jalur intrinsik koagulasi tempat faktor VIII dan IX berperan.','Gold Standard: pemeriksaan kadar faktor VIII, IX, atau XI secara spesifik, yang sekaligus menentukan jenis hemofilia dan derajat keparahannya.']},
    {h:'Tatalaksana', list:['Hindari trauma dan aktivitas berisiko tinggi cedera, sebagai pencegahan utama.','Perdarahan akut ditatalaksana dengan prinsip RICE (Rest, Ice, Compression, Elevation) sebagai pertolongan awal sambil menunggu koreksi faktor.','Analgetik bila nyeri (hindari NSAID/aspirin karena efek antiplatelet dapat memperparah perdarahan) serta rehabilitasi medik untuk mencegah/memperbaiki kerusakan sendi akibat hemartrosis berulang.','Koreksi faktor sesuai jenis hemofilia: F.VIII → konsentrat F.VIII atau kriopresipitat (mengandung F.VIII dalam jumlah tinggi); F.IX & F.XI → konsentrat F.IX/F.XI atau FFP bila konsentrat tidak tersedia.']},
  ],
  table:{title:'Derajat Keparahan Hemofilia', head:['Parameter','Berat','Sedang','Ringan'],
    rows:[
      ['Aktivitas F VIII/IX','<0,01 (<1%)','0,01–0,05','>0,05 (>5%)'],
      ['Usia awitan','<1 tahun','1–2 tahun','>2 tahun'],
      ['Perdarahan otot/sendi','Tanpa trauma','Trauma ringan','Trauma cukup kuat'],
      ['Perdarahan SSP','Risiko tinggi','Risiko sedang','Jarang'],
      ['Karakteristik','Selalu hemartrosis','Hemartrosis bila trauma ringan','Asimtomatis, hemartrosis jika trauma berat'],
    ]}
},
{
  id:'vwd', cat:'hemostasis', level:'2', title:'Von Willebrand Disease (vWD)',
  sub:'Gangguan kuantitas/kualitas von Willebrand Factor — autosomal dominan.',
  sections:[
    {h:'Etiologi & Patofisiologi', list:['Von Willebrand Factor (vWF) memiliki dua fungsi penting dalam hemostasis: pertama, sebagai "jembatan" yang membantu trombosit menempel pada dinding pembuluh darah yang rusak (adhesi trombosit) saat hemostasis primer; kedua, sebagai protein pembawa (carrier) yang melindungi faktor VIII dari degradasi di dalam plasma.','Karena vWD adalah gangguan autosomal dominan (berbeda dari hemofilia yang X-linked), penyakit ini dapat mengenai laki-laki maupun perempuan secara setara, dan merupakan gangguan perdarahan herediter yang paling umum di populasi.','Karena vWF berperan ganda, gangguannya menghasilkan gambaran klinis campuran: gangguan hemostasis primer (bleeding time memanjang, mirip gangguan trombosit) sekaligus gangguan hemostasis sekunder ringan (aPTT dapat memanjang akibat F.VIII yang ikut menurun karena kehilangan proteksinya).']},
    {h:'Manifestasi Klinis', list:['Perdarahan membran mukosa seperti epistaksis berulang — mencerminkan gangguan adhesi trombosit pada pembuluh darah kecil di mukosa yang rentan trauma ringan.','Menstruasi lama dan banyak (menoragia) — sering menjadi keluhan utama pada perempuan dewasa muda dan kadang baru terdiagnosis saat evaluasi menoragia.','Perdarahan berlebihan pasca operasi & trauma, termasuk prosedur gigi — karena adhesi trombosit yang terganggu membuat penghentian perdarahan awal menjadi lebih lambat dari normal.']},
    {h:'Pemeriksaan Penunjang', list:['Tes ristosetin abnormal — ristosetin adalah zat yang secara artifisial memicu vWF mengikat trombosit di laboratorium; hasil abnormal menunjukkan vWF tidak berfungsi normal.','Bleeding time memanjang, mencerminkan gangguan hemostasis primer akibat adhesi trombosit yang terganggu.','Faktor VIII menurun (karena kehilangan proteksi dari vWF) → aPTT dapat memanjang, meski biasanya tidak sememanjang pada hemofilia murni.','Kadar vWF menurun, mengonfirmasi diagnosis secara langsung.']},
    {h:'Tatalaksana', list:['Agen antifibrinolisis seperti asam traneksamat, membantu menstabilkan bekuan yang sudah terbentuk dengan menghambat pemecahannya kembali — berguna terutama untuk perdarahan mukosa ringan-sedang.','Desmopressin (DDAVP) — bekerja merangsang pelepasan cadangan vWF dari sel endotel pembuluh darah, sehingga meningkatkan kadar vWF plasma secara akut; efektif untuk vWD tipe 1 (bentuk paling ringan dan tersering).','Konsentrat vWF diberikan pada kasus lebih berat atau yang tidak respons desmopressin, menggantikan vWF secara langsung.']},
  ],
  table:{title:'Hemofilia A vs Hemofilia B vs vWD', head:['Aspek','Hemofilia A','Hemofilia B','vWD'],
    rows:[
      ['Pewarisan','X-linked resesif','X-linked resesif','Autosomal dominan'],
      ['Trombosit','Normal','Normal','Normal'],
      ['Bleeding Time','Normal','Normal','Memanjang'],
      ['PT','Normal','Normal','Normal'],
      ['aPTT','Memanjang','Memanjang','Normal / memanjang'],
      ['F VIII','Rendah','Normal','Rendah'],
      ['F IX','Normal','Rendah','Normal'],
      ['Tes Ristosetin','Normal','Normal','Abnormal'],
    ]}
},
{
  id:'vkdb', cat:'hemostasis', level:'2', title:'VKDB (Vitamin K Deficiency Bleeding)',
  sub:'Perdarahan pada neonatus/bayi akibat kekurangan faktor koagulasi dependen vitamin K (II, VII, IX, X).',
  sections:[
    {h:'Patofisiologi Singkat', list:['Vitamin K adalah kofaktor esensial untuk aktivasi faktor koagulasi II, VII, IX, dan X di hati (karenanya disebut faktor "dependen vitamin K") melalui proses karboksilasi yang membuat faktor-faktor ini mampu mengikat kalsium dan berfungsi normal dalam kaskade koagulasi.','Bayi baru lahir secara alami rentan defisiensi vitamin K karena tiga hal sekaligus: cadangan vitamin K dari plasenta sangat minim (vitamin K sulit menembus plasenta), ASI mengandung vitamin K dalam kadar sangat rendah dibanding susu formula, dan flora usus bayi (yang pada orang dewasa turut memproduksi vitamin K) belum berkembang sempurna — kombinasi inilah yang membuat profilaksis vitamin K saat lahir menjadi sangat penting secara rutin.']},
    {h:'Etiologi', list:['Tidak mendapat injeksi vitamin K profilaksis saat lahir — faktor risiko utama yang sepenuhnya dapat dicegah.','ASI eksklusif tanpa suplementasi tambahan, karena kandungan vitamin K dalam ASI memang secara alami sangat rendah.','Flora usus pembentuk vitamin K yang belum sempurna pada bayi baru lahir, terutama di minggu-minggu pertama kehidupan.','Riwayat defisiensi vitamin K pada ibu, misalnya akibat konsumsi obat antikonvulsan (yang mengganggu metabolisme vitamin K) selama kehamilan, atau malnutrisi berat pada ibu.']},
    {h:'Pemeriksaan Penunjang', list:['Profil koagulasi: Bleeding Time normal (karena trombosit dan hemostasis primer tidak terganggu), PT sangat memanjang (paling sensitif karena F.VII memiliki waktu paruh terpendek di antara faktor dependen vitamin K), aPTT normal atau sedikit memanjang.','Penurunan aktivitas faktor koagulasi dependen vitamin K (II, VII, IX, X) bila diperiksa secara spesifik.','CT-scan atau MRI kepala diperlukan untuk evaluasi bila dicurigai perdarahan intrakranial, komplikasi paling berbahaya dari VKDB.']},
    {h:'Tatalaksana', list:['Vitamin K1 (phytonadione) 1–2 mg IV/SC sebagai tatalaksana akut, akan mengoreksi faktor koagulasi dalam beberapa jam setelah pemberian.','Transfusi FFP 10–15 mL/kgBB dipertimbangkan pada perdarahan sedang–berat yang membutuhkan koreksi faktor koagulasi secara lebih cepat dibanding menunggu efek vitamin K1 saja.','Pencegahan (jauh lebih penting daripada pengobatan): Vitamin K1 0,5–1 mg IM diberikan rutin pada semua bayi baru lahir segera setelah lahir, sebagai standar perawatan neonatus di seluruh dunia.']},
  ],
  table:{title:'Klasifikasi VKDB', head:['Parameter','Early-onset','Classic','Late-onset'],
    rows:[
      ['Umur','<24 jam','2–7 hari','2–8 bulan'],
      ['Faktor Risiko','Defisiensi vit.K maternal, ibu terapi antikonvulsan','Asupan vitamin K kurang, ASI eksklusif','Diare (malabsorpsi), penyakit hati, ASI eksklusif'],
      ['Manifestasi Tersering','Perdarahan intrakranial','Perdarahan saluran cerna','Perdarahan intrakranial'],
      ['Profilaksis','Hindari obat saat hamil','Vitamin K1, susu formula','Vitamin K1, susu formula'],
    ]}
},
{
  id:'dic', cat:'hemostasis', level:'2', title:'DIC (Disseminated Intravascular Coagulation)',
  sub:'Sindrom didapat dengan aktivasi koagulasi intravaskular yang luas.',
  sections:[
    {h:'Patofisiologi Singkat', list:['DIC dipicu oleh pelepasan tromboplastin jaringan (tissue factor) dalam jumlah besar ke sirkulasi — misalnya akibat sepsis berat, kerusakan jaringan masif, atau komplikasi obstetrik — yang mengaktifkan kaskade koagulasi secara sistemik dan tidak terkontrol di seluruh pembuluh darah tubuh, bukan hanya di lokasi cedera seperti pada pembekuan normal.','Aktivasi masif ini menghabiskan (mengonsumsi) faktor koagulasi dan trombosit dalam jumlah besar untuk membentuk mikrotrombus di banyak pembuluh darah kecil sekaligus — menjelaskan istilah "consumptive coagulopathy". Paradoksnya, meski awalnya terjadi pembekuan berlebihan, pasien justru berakhir mengalami perdarahan hebat karena faktor koagulasi dan trombosit yang tersisa untuk hemostasis normal sudah habis terpakai.','Mikrotrombus yang terbentuk di berbagai organ juga menyebabkan iskemia jaringan dan disfungsi organ multipel — menjelaskan mengapa DIC bukan sekadar masalah perdarahan, tetapi juga kegagalan organ akibat sumbatan mikrovaskular di banyak tempat sekaligus.']},
    {h:'Etiologi', list:['Infeksi berat (sepsis) dan keganasan (terutama leukemia promielositik akut) merupakan penyebab tersering.','Malformasi pembuluh darah, trauma berat, luka bakar luas, reaksi alergi berat, dan syok — semuanya dapat memicu pelepasan tissue factor dalam jumlah besar ke sirkulasi.']},
    {h:'Manifestasi Klinis', list:['Perdarahan kulit & mukosa yang luas, mencerminkan habisnya cadangan faktor koagulasi dan trombosit.','Paradoksnya, tanda trombosis juga muncul bersamaan: purpura fulminan, akrosianosis perifer, dan perubahan pregangren pada jari/genital/jantung — akibat mikrotrombus yang menyumbat pembuluh darah kecil di area tersebut.','Disfungsi organ multipel: ikterus (hati), aritmia (jantung), ARDS (paru), dan gangguan organ lain — mencerminkan kerusakan luas akibat iskemia dari mikrotrombus yang tersebar di seluruh tubuh.']},
    {h:'Pemeriksaan Penunjang', list:['Trombosit turun secara kontinu (bukan sekali turun lalu stabil) — mencerminkan konsumsi trombosit yang terus berlangsung selama proses DIC aktif.','D-dimer meningkat tajam, sebagai bukti aktivitas fibrinolisis yang tinggi (tubuh berusaha memecah mikrotrombus yang terbentuk berlebihan).','PT & aPTT memanjang, mencerminkan konsumsi faktor koagulasi di jalur intrinsik maupun ekstrinsik.','Fibrinogen rendah, biasanya hanya terlihat pada DIC yang sudah berat karena fibrinogen adalah cadangan terakhir yang paling banyak jumlahnya di tubuh sebelum ikut terkuras.','Diagnosis ditegakkan dengan sistem skoring DIC (menggabungkan hitung trombosit, D-dimer, PT, dan fibrinogen) — skor >5 dianggap bermakna mendukung diagnosis DIC.']},
    {h:'Tatalaksana', list:['Tatalaksana penyebab dasar adalah kunci utama — DIC tidak akan membaik tanpa mengatasi pemicunya (misalnya sepsis diobati dengan antibiotik adekuat, atau solusio plasenta ditangani dengan persalinan segera).','Suportif: stabilisasi hemodinamik/ventilator, serta transfusi PRC untuk mengoreksi anemia akibat perdarahan.','Transfusi platelet dipertimbangkan bila ada perdarahan serius, kebutuhan tindakan bedah darurat, atau trombosit <50.000/µL.','FFP/kriopresipitat diberikan bila ada perdarahan serius disertai PT/aPTT memanjang atau fibrinogen <50 mg/dL — untuk menggantikan faktor koagulasi dan fibrinogen yang sudah terkonsumsi habis.']},
  ],
  mnemonic:{label:'Pola DIC', text:'Purpura fulminan + Trombosit ↓ + D-dimer ↑ + PT ↑ + Fibrinogen ↓'}
},
// ---------------- LIMFOMA ----------------
{
  id:'limfoma-overview', cat:'limfoma', level:'1', title:'Limfoma — Pengantar',
  sub:'Keganasan pada sistem limfatik (limfonodus, limpa, timus, atau sumsum tulang).',
  sections:[
    {h:'Konsep Dasar', list:['Limfoma adalah keganasan yang berasal dari sel limfosit (sel B, sel T, atau sel NK) yang biasanya bermula di kelenjar getah bening, namun dapat menyebar ke organ limfoid lain seperti limpa, timus, cincin Waldeyer, maupun ke sumsum tulang.','Secara garis besar, limfoma dibagi menjadi dua kelompok besar berdasarkan gambaran histopatologinya — pembagian ini penting karena keduanya memiliki karakteristik biologis, pola penyebaran, dan prognosis yang cukup berbeda meski sama-sama disebut "limfoma".']},
    {h:'Klasifikasi', list:['Limfoma Non-Hodgkin: berasal dari sel B atau sel T (baik yang masih imatur/progenitor maupun yang sudah matur) — kelompok ini jauh lebih heterogen dan lebih sering ditemui.','Limfoma Hodgkin: umumnya berasal dari sel B, namun dengan gambaran histopatologi yang sangat khas berupa sel Reed-Sternberg yang membedakannya secara jelas dari limfoma non-Hodgkin.']},
  ],
  mnemonic:{label:'Membedakan Pembesaran KGB', text:'Limfadenitis: nyeri (+), demam (+). Limfadenopati murni: tidak nyeri, tanpa alarm sign. Bila tidak nyeri + alarm sign (+) → curigai limfoma maligna (Hodgkin/Non-Hodgkin).'}
},
{
  id:'limfoma-hodgkin', cat:'limfoma', level:'1', title:'Limfoma Hodgkin',
  sub:'Keganasan kelenjar getah bening yang berasal dari sel B.',
  sections:[
    {h:'Epidemiologi', list:['Distribusi usia bimodal — memiliki dua puncak insidensi, yaitu pada usia remaja/dewasa muda dan pada usia >50 tahun, pola yang cukup unik dan berbeda dari kebanyakan keganasan lain yang biasanya hanya memiliki satu puncak usia.','Lebih sering pada pria dibanding wanita.']},
    {h:'Etiologi', list:['Infeksi virus Epstein-Barr (EBV) ditemukan pada sekitar 30% kasus — virus ini diduga berperan dalam transformasi sel B menjadi sel Reed-Sternberg melalui gangguan regulasi pertumbuhan sel yang terinfeksi.','Kondisi autoimun dan defisiensi imun (termasuk HIV) juga meningkatkan risiko, karena pengawasan sistem imun terhadap sel yang bertransformasi menjadi kurang efektif.']},
    {h:'Manifestasi Klinis', list:['Limfadenopati tanpa nyeri — paling sering mengenai KGB servikalis dan aksilaris, dengan pola penyebaran contiguous artinya menyebar berurutan ke KGB yang berdekatan secara anatomis (bukan meloncat ke lokasi jauh), mencerminkan cara penyebaran limfoma Hodgkin yang relatif lebih "teratur" dibanding non-Hodgkin.','Demam Pel-Ebstein — pola demam khas berupa periode demam tinggi selama 1–2 minggu, diselingi periode bebas demam 1–2 minggu, berulang secara siklik; termasuk dalam gejala B (bersama penurunan berat badan dan keringat malam) yang penting untuk penentuan stadium dan prognosis.','Massa mediastinum dapat menimbulkan nyeri dada, batuk kering, dan sesak napas akibat penekanan struktur di rongga dada — pada kasus berat bahkan bisa menimbulkan sindrom vena kava superior akibat penekanan pembuluh darah besar.']},
    {h:'Pemeriksaan Penunjang', list:['Darah: leukositosis dan hiperkalsemia dapat ditemukan sebagai gambaran penunjang non-spesifik akibat aktivitas sel keganasan.','Pencitraan: X-ray/CT-scan paru untuk menilai keterlibatan mediastinum dan membantu penentuan stadium penyakit.','Gold Standard: histopatologi KGB, dengan temuan sel Reed-Sternberg — sel besar dengan nukleus bilobus (dua lobus) yang masing-masing memiliki nukleolus besar menyerupai mata burung hantu ("owl\'s eyes appearance") — gambaran inilah yang menjadi penanda diagnostik definitif limfoma Hodgkin.']},
  ],
},
{
  id:'limfoma-non-hodgkin', cat:'limfoma', level:'1', title:'Limfoma Non-Hodgkin',
  sub:'Keganasan KGB dari progenitor/sel matur B, T, maupun sel NK.',
  sections:[
    {h:'Epidemiologi', list:['Distribusi usia lebih condong ke usia tua (>60 tahun), berbeda dari limfoma Hodgkin yang bimodal.','Insidensinya sekitar 5× lebih sering dibanding limfoma Hodgkin, menjadikannya kelompok limfoma yang jauh lebih sering ditemui dalam praktik klinis.']},
    {h:'Etiologi', list:['Faktor genetik — translokasi kromosom, misalnya t(14;18) yang khas pada limfoma folikuler (melibatkan gen BCL-2 yang menghambat apoptosis sehingga sel limfosit abnormal "gagal mati" sebagaimana seharusnya).','Kondisi autoimun, misalnya tiroiditis Hashimoto — inflamasi kronik yang terus-menerus merangsang proliferasi limfosit dapat meningkatkan risiko transformasi menjadi keganasan.','Defisiensi imun (termasuk HIV, transplantasi organ dengan imunosupresi jangka panjang) — menurunnya pengawasan imun terhadap sel abnormal meningkatkan risiko limfoma.']},
    {h:'Manifestasi Klinis', list:['Limfadenopati tanpa nyeri, namun berbeda dari Hodgkin — sering mengenai limfonodus intraabdominal dan menyebar secara non-contiguous (dapat "meloncat" ke lokasi KGB yang jauh dan tidak berurutan secara anatomis), mencerminkan perilaku biologis yang lebih agresif dan tidak terduga.','Splenomegali dan hepatomegali dapat ditemukan akibat infiltrasi sel limfoma ke organ tersebut.']},
    {h:'Pemeriksaan Penunjang', list:['Darah: leukositosis dan hiperkalsemia sebagai gambaran penunjang non-spesifik.','Histopatologi merupakan tes konfirmasi utama, menunjukkan proliferasi limfosit yang umumnya lebih uniform/homogen dibanding gambaran Reed-Sternberg pada Hodgkin.','Aspirasi sumsum tulang dilakukan untuk staging, menilai apakah sudah ada keterlibatan sumsum tulang yang akan memengaruhi derajat keparahan dan pilihan terapi.','Imunohistokimia membantu menentukan jenis sel asal: sel B ditandai CD20 positif, sel T ditandai CD3 positif — penting untuk menentukan jenis terapi target yang sesuai (misalnya rituximab hanya efektif untuk limfoma sel B CD20 positif).']},
  ]
},

// ---------------- LIMFADENITIS ----------------
{
  id:'limfadenitis', cat:'limfadenitis', level:'3A', title:'Limfadenitis Tuberkulosa',
  sub:'Peradangan kelenjar getah bening; bila akibat M. tuberculosis di leher disebut skrofula.',
  sections:[
    {h:'Nomenklatur', list:['Limfadenopati adalah istilah umum untuk pembengkakan kelenjar getah bening tanpa memandang penyebabnya, termasuk tanpa proses peradangan aktif (misalnya pada limfoma).','Limfadenitis secara spesifik mengacu pada pembengkakan kelenjar getah bening akibat proses peradangan/infeksi — sehingga biasanya disertai tanda inflamasi seperti nyeri, kemerahan, dan hangat pada perabaan.','Limfangitis adalah radang pada saluran (pembuluh) getah bening itu sendiri, biasanya tampak sebagai garis kemerahan yang menjalar dari lokasi infeksi menuju KGB terdekat — berbeda dari limfadenitis yang mengenai kelenjarnya.']},
    {h:'Klasifikasi', list:['Spesifik: disebabkan oleh Mycobacterium tuberculosis — bila mengenai kelenjar getah bening di leher, disebut skrofula, salah satu manifestasi TB ekstraparu yang cukup sering ditemukan.','Non-spesifik: disebabkan oleh infeksi bakteri/organisme lain (paling sering bakteri piogenik seperti Staphylococcus atau Streptococcus), umumnya perjalanan penyakitnya lebih akut dibanding TB.']},
    {h:'Manifestasi Klinis', list:['Demam dan malaise sebagai gejala sistemik akibat infeksi yang mendasari.','Limfadenopati — pembesaran kelenjar getah bening yang teraba, biasanya di area yang mengalirkan getah bening dari sumber infeksi.','Nyeri tekan limfonodus sering tidak ditemukan pada limfadenitis TB (berbeda dari limfadenitis bakterial akut yang biasanya nyeri) — hal ini karena perjalanan penyakit TB yang kronik dan indolen, sering kali membuatnya sulit dibedakan dari limfadenopati akibat keganasan hanya dari pemeriksaan fisik saja.']},
    {h:'Pemeriksaan Penunjang', list:['Leukositosis dapat ditemukan sebagai tanda infeksi aktif, meski pada TB kronik gambarannya bisa tidak terlalu mencolok.','FNAB (Fine Needle Aspiration Biopsy): pada limfadenitis spesifik (TB) akan menunjukkan granuloma dengan nekrosis kaseosa sentral, sel epiteloid, dan sel datia Langhans — gambaran khas respons imun tubuh yang berusaha "mengurung" basil TB dalam struktur granuloma; pada limfadenitis non-spesifik akan menunjukkan serbukan sel radang akut (neutrofil) tanpa gambaran granuloma tersebut.','Pemeriksaan BTA dari limfe membantu konfirmasi keberadaan basil tahan asam secara langsung.','X-ray paru penting dilakukan karena limfadenitis TB sering menyertai atau mendahului TB paru aktif, meski tidak selalu ditemukan bersamaan.']},
    {h:'Tatalaksana', list:['Tatalaksana limfadenitis TB mengikuti regimen pengobatan TB paru standar, dengan lama terapi 6–9 bulan tergantung respons dan kondisi klinis.','Regimen 6 bulan: 2RHZE (2 bulan fase intensif dengan Rifampicin-Isoniazid-Pirazinamid-Etambutol) dilanjutkan 4RH (4 bulan fase lanjutan Rifampicin-Isoniazid) — Regimen 9 bulan: 4RHZE/5RH digunakan pada kasus tertentu yang membutuhkan terapi lebih panjang.','Dosis standar: Rifampicin 5 mg/kgBB (bekerja menghambat sintesis RNA bakteri), Isoniazid 10 mg/kgBB (menghambat sintesis dinding sel mikobakteri), Pirazinamid 25 mg/kgBB (efektif pada lingkungan asam intraseluler), Etambutol 15 mg/kgBB (menghambat sintesis dinding sel, ditambahkan untuk mencegah resistensi).']},
  ]
},
// ---------------- LEUKEMIA ----------------
{
  id:'leukemia-overview', cat:'leukemia', level:'2', title:'Leukemia — Pengantar',
  sub:'Keganasan hematologi dengan peningkatan leukosit prematur di peredaran darah.',
  sections:[
    {h:'Konsep Dasar', list:['Leukemia adalah keganasan sel punca hematopoietik di sumsum tulang yang menghasilkan produksi sel darah putih abnormal secara berlebihan, yang kemudian "membanjiri" sumsum tulang dan mendesak produksi sel darah normal lainnya (eritrosit, trombosit, dan leukosit sehat) — inilah yang menjelaskan mengapa leukemia hampir selalu disertai gejala anemia dan trombositopenia sekaligus, meski leukositnya sendiri justru meningkat drastis.','Pembagian akut vs kronik bukan sekadar soal kecepatan gejala muncul, tetapi mencerminkan tingkat kematangan sel yang berproliferasi: pada leukemia akut, sel yang berproliferasi adalah sel yang masih sangat imatur (blas) yang gagal berdiferensiasi menjadi sel matang, sehingga gejalanya muncul cepat dan berat; pada leukemia kronik, sel yang berproliferasi masih relatif matang dan sebagian masih bisa berfungsi, sehingga perjalanan penyakitnya lebih lambat dan kadang baru terdeteksi insidental.']},
    {h:'Klasifikasi', list:['Akut: Acute Lymphoblastic Leukemia (ALL) — berasal dari lini limfoid, dan Acute Myeloid Leukemia (AML) — berasal dari lini myeloid.','Kronis: Chronic Lymphocytic Leukemia (CLL) — berasal dari lini limfoid, dan Chronic Myeloid Leukemia (CML) — berasal dari lini myeloid.']},
  ],
  mnemonic:{label:'Tips Menjawab Soal UKMPPD', text:'Leukosit biasanya >30.000. Pemeriksaan penunjang terbaik: aspirasi sumsum tulang. Tatalaksana definitif: transplantasi sumsum tulang. Akut = sel blas >20% tanpa organomegali; Kronik = sel blas <20% dengan organomegali.'},
  diagram:{title:'Alur Klasifikasi Leukemia', note:'Leukosit >30.000/µL → curigai leukemia. Persentase sel blas dan ada/tidaknya organomegali menentukan Akut vs Kronik.', html:`
    <div class="fstep"><div class="fbox">Leukosit &gt; 30.000</div><span class="farrow">→</span><div class="fresult">curiga <b>Leukemia</b></div></div>
    <div class="fdivider">Bagi berdasarkan sel blas & organomegali</div>
    <div class="fsplit">
      <div class="fbranch red">
        <div class="flabel">Akut — Sel blas &gt;20%, (–) organomegali</div>
        <ul>
          <li><b>AML</b> — dewasa muda, hipertrofi gingiva, mieloblas (+), Auer rod</li>
          <li><b>ALL</b> — 90% anak, nyeri sendi, limfoblas (+)</li>
        </ul>
      </div>
      <div class="fbranch teal">
        <div class="flabel">Kronik — Sel blas &lt;20%, (+) organomegali</div>
        <ul>
          <li><b>CML</b> — mutasi BCR-ABL, mielosit (+), kromosom Philadelphia</li>
          <li><b>CLL</b> — smudge cell / basket cell</li>
        </ul>
      </div>
    </div>`}
},
{
  id:'all', cat:'leukemia', level:'2', title:'Leukemia Limfoblastik Akut (ALL)',
  sub:'Keganasan sel lini limfoid (B/T) dengan sel blas yang banyak — keganasan anak tersering.',
  sections:[
    {h:'Etiologi & Epidemiologi', list:['Sebagian besar kasus bersifat idiopatik, namun kelainan genetik/kromosom diketahui meningkatkan risiko — misalnya anak dengan Down syndrome memiliki risiko ALL sekitar 20 kali lebih tinggi dibanding populasi umum, diduga terkait gen pada kromosom 21 yang berperan dalam regulasi proliferasi sel limfoid.','Merupakan keganasan tersering pada anak secara keseluruhan, dengan puncak insidensi pada usia 2–5 tahun — periode ini bertepatan dengan masa aktif proliferasi sel limfoid dalam perkembangan sistem imun anak, yang diduga membuat sel-sel ini lebih rentan mengalami mutasi onkogenik.','Sekitar 90% kasus ALL terjadi pada anak, menjadikannya kontras yang jelas dengan AML yang lebih sering pada dewasa.']},
    {h:'Manifestasi Klinis Umum Leukemia Akut (ALL & AML)', list:['Gejala anemia: lemas dan tidak bersemangat, akibat sel blas yang mendesak ruang produksi eritrosit normal di sumsum tulang.','Gejala trombositopenia: epistaksis, perdarahan gusi, dan petekie, akibat desakan serupa terhadap produksi trombosit.','Hepatosplenomegali dapat terjadi pada kedua jenis leukemia akut, namun insidensinya lebih sering pada ALL dibanding AML — mencerminkan kecenderungan sel limfoblas untuk berinfiltrasi ke organ limfoid seperti hati dan limpa.','Sindrom leukostasis — pengentalan darah (hyperviscosity) akibat leukosit yang sangat tinggi (>100.000/mm³), dapat menyumbat mikrovaskular dan menyebabkan gangguan perfusi organ, termasuk gejala neurologis dan respirasi akut yang mengancam nyawa bila tidak segera ditangani.']},
    {h:'Manifestasi Klinis Khas ALL', list:['Demam tanpa fokus infeksi yang jelas — berbeda dari demam akibat infeksi biasa, disebabkan oleh sitokin yang dilepaskan sel leukemia itu sendiri.','Limfadenopati yang tidak nyeri, persisten, dan progresif — mencerminkan infiltrasi sel limfoblas ke kelenjar getah bening.','Nyeri tulang, akibat ekspansi sel leukemia di dalam rongga sumsum tulang yang meningkatkan tekanan intramedular.','Meningeal leukemia — tanda dan gejala menyerupai meningitis (nyeri kepala, kaku kuduk, muntah) akibat infiltrasi sel blas ke susunan saraf pusat, salah satu tempat "persembunyian" sel leukemia yang sulit dijangkau kemoterapi standar (sanctuary site) sehingga sering memerlukan terapi intratekal tambahan.','Obstruksi jalan napas dapat terjadi akibat infiltrasi sel blas ke timus, membentuk massa mediastinum yang menekan trakea — lebih sering pada ALL sel T.','Pembesaran testis (pada anak laki-laki) — testis juga merupakan sanctuary site lain tempat sel leukemia dapat bersembunyi dan menjadi sumber kekambuhan meski terapi sistemik sudah berhasil menekan sel leukemia di darah dan sumsum tulang.']},
    {h:'Pemeriksaan Penunjang', list:['Darah lengkap umumnya menunjukkan pola pansitopenia parsial: anemia dan trombositopenia (akibat desakan sel blas), disertai leukositosis atau justru leukopenia (tergantung apakah sel blas yang berlebihan tersebut dominan beredar di darah tepi atau masih terkonsentrasi di sumsum tulang).','Hapusan darah tepi menunjukkan sel limfoblas yang meningkat, memberikan kecurigaan awal sebelum konfirmasi lebih lanjut.','Gold Standard: aspirasi & biopsi sumsum tulang, dengan ambang diagnostik sel limfoblas >20% dari total sel berinti di sumsum tulang.']},
    {h:'Tatalaksana (Kemoterapi)', list:['Terapi Induksi (4–6 minggu): bertujuan mengurangi massa sel tumor secepat mungkin hingga mencapai remisi (sel blas sumsum tulang <5%).','Terapi Konsolidasi (beberapa bulan): bertujuan mematikan sisa sel tumor mikroskopik yang mungkin masih tersisa setelah remisi tercapai, untuk mencegah kekambuhan dini.','Terapi Rumatan (hingga 2 tahun): fase terpanjang, menggunakan kemoterapi dosis rendah dalam jangka waktu lama untuk mempertahankan remisi dan mengeliminasi sel leukemia residual dalam jumlah sangat kecil yang tersisa.']},
  ],
  table:{title:'Klasifikasi Morfologi ALL', head:['Subtipe','Karakteristik'],
    rows:[
      ['L1','Sel blas kecil, homogen, sedikit sitoplasma, nukleolus tidak jelas — paling sering pada anak'],
      ['L2','Sel blas besar, heterogen, nukleolus jelas — paling sering pada dewasa'],
      ['L3','Sel blas besar, homogen — misal pada limfoma Burkitt'],
    ]}
},
{
  id:'aml', cat:'leukemia', level:'2', title:'Leukemia Myeloid Akut (AML)',
  sub:'Keganasan sel lini myeloid dengan sel blas yang banyak — sering pada lansia >65 tahun.',
  sections:[
    {h:'Etiologi', list:['Sebagian besar idiopatik, namun beberapa faktor risiko dikenal meningkatkan kemungkinan terjadinya AML.','Gangguan hematopoietik lain seperti anemia aplastik dan CML dapat bertransformasi menjadi AML sebagai komplikasi jangka panjangnya (pada CML disebut krisis blas myeloid).','Kelainan genetik/kromosom, termasuk Down syndrome, juga meningkatkan risiko AML — meski pada usia yang lebih muda dibanding populasi umum.','Faktor lingkungan seperti radiasi ionisasi dan paparan bahan kimia benzena diketahui bersifat leukemogenik, merusak DNA sel punca myeloid dan memicu mutasi onkogenik.']},
    {h:'Manifestasi Klinis Khas AML', list:['Leukemia kutis (sarkoma mieloid) — infiltrasi sel mieloblas ke kulit membentuk lesi nodular berwarna ungu kebiruan, gambaran khas yang jarang ditemukan pada ALL.','Hiperplasia gingiva — pembengkakan gusi akibat infiltrasi sel mieloblas ke jaringan mukosa mulut, terutama pada subtipe AML monositik/monoblastik yang memiliki kecenderungan lebih besar berinfiltrasi ke jaringan lunak ekstramedular.']},
    {h:'Pemeriksaan Penunjang', list:['Darah lengkap: pola serupa ALL — anemia, trombositopenia, disertai leukositosis atau leukopenia.','Hapusan darah tepi: mieloblas meningkat, dengan penanda khas berupa Auer rods — badan inklusi sitoplasma berbentuk tongkat merah yang merupakan agregat granula azurofilik abnormal, ditemukan hanya pada lini myeloid dan menjadi petunjuk morfologi penting yang membedakan AML dari ALL secara visual.','Gold Standard: aspirasi & biopsi sumsum tulang, dengan ambang diagnostik sel mieloblas >20%.','Imunohistokimia: mieloperoksidase positif pada AML (enzim spesifik granulosit/monosit), sementara pada ALL hasilnya negatif — pemeriksaan ini menjadi cara konfirmasi laboratorium untuk membedakan kedua jenis leukemia akut bila morfologi saja belum cukup jelas.']},
    {h:'Tatalaksana (Kemoterapi)', list:['Terapi Induksi (4–6 minggu) untuk mencapai remisi awal.','Terapi Konsolidasi (beberapa bulan) untuk mengeliminasi sisa sel tumor mikroskopik.','Terapi Rumatan (hingga 2 tahun) untuk mempertahankan remisi jangka panjang — meski pada beberapa protokol AML modern durasi rumatan dapat lebih singkat dibanding ALL, tergantung subtipe dan risiko sitogenetiknya.']},
  ],
},
{
  id:'cll', cat:'leukemia', level:'2', title:'Leukemia Limfositik Kronis (CLL)',
  sub:'Akumulasi progresif limfosit B matur/imatur — khas dewasa tua.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Berbeda dari leukemia akut yang sel proliferatifnya sangat imatur, CLL ditandai akumulasi limfosit B yang secara morfologi tampak matang namun secara fungsional tidak bekerja normal — sel-sel ini menumpuk perlahan di darah, sumsum tulang, dan kelenjar getah bening karena gagal mengalami apoptosis sebagaimana limfosit normal pada akhir siklus hidupnya, bukan karena berproliferasi sangat cepat. Inilah salah satu alasan mengapa CLL berjalan sangat indolen (lambat) dan kadang tidak bergejala bertahun-tahun.']},
    {h:'Manifestasi Klinis', list:['Gejala konstitusional (gejala B): penurunan berat badan, demam, dan keringat malam — menandakan aktivitas penyakit yang mulai signifikan.','Limfadenopati tidak nyeri akibat infiltrasi sel B limfositik ke kelenjar getah bening.','Hepatomegali dan splenomegali akibat infiltrasi sel yang sama ke organ tersebut.','Infeksi berulang, terutama pada tahap awal penyakit — tampak paradoksal karena leukositnya justru tinggi, namun ini terjadi karena leukosit yang menumpuk adalah sel limfosit B abnormal yang tidak berfungsi optimal, sementara produksi sel imun normal lainnya (termasuk imunoglobulin) justru tertekan.','Leukemia kutis (makula, papul, nodul) dapat terjadi akibat infiltrasi sel ke kulit, meski tidak sesering pada AML.']},
    {h:'Pemeriksaan Penunjang', list:['Darah lengkap: limfositosis absolut (biasanya kriteria diagnostik menyaratkan hitung limfosit >5.000/µL yang menetap), disertai granulositopenia, trombositopenia, dan Hb rendah pada tahap lanjut akibat desakan sel CLL terhadap lini sel lain.','Hapusan darah tepi: smudge cells (juga disebut basket cells) — limfosit yang pecah/rusak saat pembuatan preparat apus karena membran selnya rapuh, gambaran yang sangat khas dan sering menjadi petunjuk diagnostik awal CLL.','Aspirasi sumsum tulang dilakukan bila pemeriksaan lain belum konklusif, menunjukkan limfosit matur >30% dengan penurunan sel lini myeloid akibat desakan ruang sumsum tulang.']},
    {h:'Tatalaksana', list:['Pasien asimtomatik cukup diobservasi ("watch and wait") — karena CLL berjalan sangat lambat, terapi dini pada pasien tanpa gejala tidak terbukti memperbaiki kelangsungan hidup dan hanya menambah efek samping.','Kemoterapi paliatif diberikan saat penyakit mulai bergejala/progresif; bila sel CLL menunjukkan CD20 positif, ditambahkan rituximab (antibodi monoklonal anti-CD20) untuk meningkatkan efektivitas terapi.','Transplantasi stem cell hematopoietik dipertimbangkan pada kasus tertentu yang berisiko tinggi atau kambuh, meski bukan pilihan lini pertama mengingat usia pasien CLL yang umumnya sudah lanjut.']},
  ],
},
{
  id:'cml', cat:'leukemia', level:'2', title:'Leukemia Mieloid Kronis (CML)',
  sub:'Proliferasi granulosit matur & imatur tanpa gangguan diferensiasi — kromosom Philadelphia.',
  sections:[
    {h:'Etiologi', list:['Kromosom Philadelphia — hasil translokasi resiprokal antara gen ABL1 pada kromosom 9 dengan gen BCR pada kromosom 22, dituliskan sebagai t(9;22), yang membentuk gen fusi BCR-ABL. Gen fusi ini menghasilkan protein tirosin kinase yang aktif secara terus-menerus (constitutively active) tanpa perlu sinyal regulasi normal, sehingga terus-menerus mendorong sel myeloid berproliferasi tak terkendali — inilah dasar biologis mengapa terapi target inhibitor tirosin kinase begitu efektif pada CML, karena langsung menghambat "mesin" penggerak utama penyakitnya.','Lebih sering pada laki-laki usia >65 tahun, meski dapat terjadi pada usia berapa pun.']},
    {h:'Manifestasi Klinis per Fase', sub:[
      {t:'Fase Kronis (blas <10%)', list:['Gejala konstitusional: penurunan berat badan, demam, keringat malam — sering ringan dan tidak spesifik sehingga banyak kasus baru terdeteksi insidental saat pemeriksaan darah rutin.','Splenomegali, kadang masif, akibat infiltrasi sel granulosit berlebihan ke limpa — pada fase ini sel-sel yang berproliferasi masih relatif matang sehingga fungsinya sebagian besar masih baik.']},
      {t:'Fase Akselerasi (blas 10–19%)', list:['Tanda anemia mulai muncul: lemas, konjungtiva pucat — menandakan sel blas yang mulai mendesak lini eritrosit normal.','Leukostasis dapat terjadi akibat leukosit yang sangat tinggi, menyebabkan iskemia jaringan karena penyumbatan mikrovaskular.','Splenomegali yang semakin ekstrem menjadi pertanda peringatan bahwa penyakit sedang bertransformasi menuju krisis blas.']},
      {t:'Fase Krisis Blas (blas >20%)', list:['Merupakan fase terakhir dan paling agresif dari CML, dengan gejala menyerupai leukemia akut — perburukan cepat, sitopenia berat, dan risiko komplikasi tinggi.','Krisis blas dapat mengarah ke tipe myeloid (AML, sekitar 2/3 kasus, sesuai asal sel CML dari lini myeloid) atau tipe limfoid (ALL, sekitar 1/3 kasus, menunjukkan bahwa mutasi BCR-ABL sebenarnya terjadi pada sel punca yang masih berpotensi berdiferensiasi ke berbagai lini sel).']},
    ]},
    {h:'Pemeriksaan Penunjang', list:['Darah lengkap: leukositosis berat (seringkali >100.000/µL), disertai trombositosis, basofilia, dan eosinofilia — pola peningkatan multi-lini granulosit ini khas CML dan berbeda dari leukemia akut yang biasanya lebih dominan satu jenis sel blas saja.','Apusan darah tepi menunjukkan dominasi granulosit pada berbagai tahap maturasi (mielosit, metamielosit) — mencerminkan proses maturasi yang masih berjalan meski berlebihan, berbeda dari leukemia akut yang maturasinya benar-benar terhenti pada tahap blas.','Aspirasi sumsum tulang: granulositosis dengan banyak mielosit/promielosit, mengonfirmasi hiperselularitas lini myeloid.','Gold Standard: pemeriksaan genetik untuk mendeteksi gen BCR-ABL, baik melalui sitogenetik konvensional (menemukan kromosom Philadelphia) maupun PCR (lebih sensitif) — pemeriksaan ini juga digunakan untuk memantau respons terapi jangka panjang.']},
    {h:'Tatalaksana', list:['Targeted therapy sebagai lini pertama pada fase kronis & akselerasi: inhibitor tirosin kinase yang diminum seumur hidup — imatinib (generasi pertama), dasatinib dan nilotinib (generasi kedua, digunakan bila resistensi atau intoleransi imatinib) — bekerja langsung menghambat protein BCR-ABL yang menjadi akar masalah penyakit ini.','Hidroksiurea digunakan sebagai alternatif bila targeted therapy gagal atau sebagai terapi sitoreduktif cepat sementara menunggu hasil pemeriksaan genetik.','Transplantasi stem cell hematopoietik merupakan tatalaksana definitif dengan potensi kuratif, memberikan remisi jangka panjang (>9 tahun) — namun mengingat efektivitas tinggi dan risiko lebih rendah dari inhibitor tirosin kinase, transplantasi kini lebih sering dicadangkan untuk kasus yang gagal terapi target atau sudah masuk fase krisis blas.']},
  ]
},

{
  id:'polisitemia', cat:'lainnya', level:'2', title:'Polisitemia Vera',
  sub:'Kelainan neoplastik myeloproliferatif kronik dengan peningkatan eritrosit — 90% akibat mutasi gen JAK2.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Pada kondisi normal, produksi eritrosit oleh sumsum tulang diatur ketat oleh sinyal eritropoietin (EPO) dari ginjal, yang hanya dilepas saat tubuh mendeteksi hipoksia. Pada Polisitemia Vera, terjadi mutasi somatik pada gen JAK2 (JAK2 V617F pada sekitar 90% kasus) di sel punca hematopoietik, yang membuat jalur sinyal JAK-STAT di dalam sel aktif secara terus-menerus tanpa perlu diaktivasi oleh EPO.','Akibatnya, sumsum tulang terus memproduksi eritrosit (dan sering juga leukosit serta trombosit) secara berlebihan meski kadar EPO dalam darah justru rendah (karena tubuh berusaha "mengerem" produksi dengan menekan EPO, namun sel sumsum tulang tidak lagi peduli terhadap sinyal ini) — inilah yang menjelaskan mengapa kadar eritropoietin yang rendah justru menjadi salah satu kriteria diagnosis, bertolak belakang dengan polisitemia sekunder (misalnya akibat penyakit paru kronik) yang EPO-nya justru meningkat sebagai respons kompensasi normal terhadap hipoksia.']},
    {h:'Definisi', list:['Hb di atas normal: Laki-laki >16,5 g/dL; Perempuan >16 g/dL.','Stem cell hematopoietik aktif memproduksi eritrosit terus-menerus tanpa membutuhkan stimulasi eritropoietin, akibat mutasi JAK2 yang membuat jalur sinyal proliferasinya aktif secara otonom.']},
    {h:'Manifestasi Klinis', list:['Biasanya asimtomatik pada tahap awal — banyak kasus terdeteksi insidental saat pemeriksaan darah rutin menunjukkan Hb/Ht yang tinggi tanpa keluhan apapun.','Gejala non-spesifik seperti mudah lelah, pusing, dan nyeri kepala dapat muncul akibat darah yang menjadi lebih kental (viscous) sehingga aliran darah ke jaringan, termasuk otak, menjadi kurang optimal.','Sindrom hiperviskositas — darah yang terlalu kental meningkatkan risiko perdarahan mukosa (paradoks, karena trombosit yang berlebihan justru sering disfungsional), gejala neurologis, dan gangguan penglihatan akibat gangguan aliran darah di pembuluh kecil.','Plethora (wajah tampak kemerahan akibat pembuluh darah kulit yang penuh sel darah merah), pruritus (gatal, klasik memberat setelah mandi air hangat — diduga terkait pelepasan histamin dari basofil yang jumlahnya ikut meningkat), tinnitus, hipertensi, dan splenomegali (akibat hematopoiesis ekstramedular serta penumpukan sel darah berlebih).']},
    {h:'Diagnosis', list:['Kriteria mayor: Hb >16,5 g/dL (pria) / >16 g/dL (wanita) atau Ht >49%/>48%, disertai peningkatan red cell mass; biopsi sumsum tulang menunjukkan hiperselularitas pada ketiga lini sel (eritrosit, granulosit, trombosit) — mencerminkan proses myeloproliferatif yang tidak hanya mengenai satu lini sel saja; dan ditemukannya mutasi gen JAK2.','Kriteria minor: kadar eritropoietin serum yang rendah, sesuai dengan patofisiologi bahwa proliferasi sel terjadi independen dari sinyal EPO.','Diagnosis ditegakkan bila memenuhi ketiga kriteria mayor, ATAU dua kriteria mayor pertama disertai kriteria minor.']},
    {h:'Tatalaksana', list:['Flebotomi (mengeluarkan darah secara berkala) 200–500 cc/minggu hingga hematokrit mencapai maksimal 45% — merupakan cara tercepat dan paling langsung untuk mengurangi volume sel darah merah serta menurunkan viskositas darah, sehingga menjadi tatalaksana lini pertama.','Hidroksiurea 15 mg/kgBB/hari dipertimbangkan pada pasien risiko tinggi trombosis, bekerja menekan proliferasi sel di sumsum tulang secara farmakologis.','JAK2 inhibitor (ruxolitinib) menjadi pilihan pada kasus yang resisten atau intoleran terhadap hidroksiurea, bekerja langsung menghambat jalur sinyal JAK-STAT yang menjadi akar masalah penyakit ini.','Suportif: Aspirin dosis rendah 1×80 mg untuk mencegah komplikasi trombosis (risiko utama kematian pada polisitemia vera), dan allopurinol 1×100–300 mg untuk mengatasi hiperurisemia akibat tingginya turnover sel yang melepaskan asam urat berlebih.']},
  ],
  mnemonic:{label:'MED+EASY — "PVR"', text:'Plethora · pruritus · hiperViskositas (perdarahan mukosa) · RBC meningkat (Hb meningkat)'}
},
{
  id:'myeloma', cat:'lainnya', level:'1', title:'Multiple Myeloma',
  sub:'Keganasan sel plasma monoklonal yang menginfiltrasi sumsum tulang.',
  sections:[
    {h:'Patofisiologi Singkat', list:['Multiple Myeloma bermula dari satu klon sel plasma (sel B yang sudah matang dan seharusnya memproduksi antibodi) yang bertransformasi menjadi ganas dan berproliferasi tak terkendali di sumsum tulang. Karena berasal dari satu klon tunggal, sel-sel ini menghasilkan imunoglobulin yang identik dalam jumlah sangat besar (disebut protein monoklonal atau M-protein), yang justru tidak berfungsi sebagai antibodi normal.','Sel plasma ganas ini juga merangsang aktivitas osteoklas (sel penghancur tulang) secara berlebihan sambil menekan osteoblas (sel pembentuk tulang), sehingga terjadi destruksi tulang progresif (lesi litik) yang melepaskan kalsium ke darah (hiperkalsemia) sekaligus menyebabkan nyeri tulang dan risiko fraktur patologis.','Rantai ringan imunoglobulin monoklonal berlebih yang difiltrasi ginjal (protein Bence Jones) bersifat toksik terhadap tubulus ginjal, sehingga sering menyebabkan gangguan fungsi ginjal — salah satu dari empat manifestasi klasik OLD CRAB (hiperkalsemia, gangguan ginjal, anemia, lesi tulang) yang menjadi ciri khas penyakit ini.']},
    {h:'Klasifikasi', list:['IgG dan IgA merupakan bentuk paling sering ditemukan, sesuai dengan proporsi alami jenis imunoglobulin yang paling banyak diproduksi sel plasma pada populasi umum.','Mieloma Bence Jones (hanya memproduksi rantai ringan tanpa rantai berat lengkap) terjadi pada sekitar 15–20% kasus — bentuk ini cenderung lebih agresif terhadap ginjal karena rantai ringan lebih mudah difiltrasi dan menumpuk di tubulus.','IgD, IgE, IgM sangat jarang ditemukan sebagai jenis protein monoklonal pada Multiple Myeloma.']},
    {h:'Manifestasi Klinis', list:['Sering asimtomatik pada tahap awal (fase smoldering myeloma), terdeteksi insidental saat pemeriksaan darah rutin menunjukkan peningkatan protein total atau anemia yang tidak jelas sebabnya.','Demam ringan dapat muncul terkait aktivitas penyakit atau infeksi berulang (karena produksi imunoglobulin fungsional normal ikut tertekan oleh dominasi klon sel plasma ganas).','Gangguan tulang: nyeri tulang (terutama tulang belakang, panggul, tengkorak) akibat lesi osteolisis, hingga fraktur spontan/patologis pada kasus lanjut.','Gejala hiperkalsemia (mual, konstipasi, poliuria, gangguan kesadaran) akibat kalsium yang dilepas dari tulang yang hancur.','Urin berbusa akibat proteinuria Bence Jones, salah satu tanda keterlibatan ginjal.']},
    {h:'Pemeriksaan Penunjang', list:['Elektroforesis protein serum merupakan pemeriksaan awal terbaik, menemukan gambaran protein monoklonal (M-spike) — puncak tajam pada grafik elektroforesis yang mencerminkan produksi imunoglobulin identik berlebihan dari satu klon sel.','Urinalisis untuk mendeteksi protein Bence Jones, menandakan ekskresi rantai ringan monoklonal berlebih melalui ginjal.','Darah: anemia (Hb <10 g/dL, akibat desakan sel plasma ganas terhadap eritropoiesis normal di sumsum tulang), hiperkalsemia (>11 mg/dL, akibat destruksi tulang), kreatinin meningkat (>2 mg/dL, akibat toksisitas rantai ringan terhadap ginjal).','Pencitraan: whole body CT-scan menjadi pilihan pertama karena lebih sensitif mendeteksi lesi tulang dini dibanding foto polos konvensional; skeletal survey (foto polos seluruh tulang) tetap dapat digunakan dan menunjukkan gambaran klasik lesi "punched-out" (area radiolusen bulat tegas seperti dilubangi).','Konfirmasi diagnosis: biopsi sumsum tulang menunjukkan sel plasma monoklonal >10% dari total sel berinti, dengan gambaran morfologi khas "fried-egg appearance" (nukleus eksentrik dikelilingi sitoplasma basofilik luas, menyerupai telur goreng).']},
  ],
  mnemonic:{label:'Diagnosis Multiple Myeloma — "OLD CRAB"', text:'Old age · Calcium elevated · Renal failure · Anemia · Bone lytic lesion'}
},

{
  id:'hipersensitivitas', cat:'imunologi', level:'4A', title:'Reaksi Hipersensitivitas',
  sub:'Respons sistem imun berlebihan terhadap antigen yang berpotensi merusak tubuh.',
  sections:[
    {h:'Konsep Dasar', list:['Hipersensitivitas terjadi ketika sistem imun, yang seharusnya melindungi tubuh, justru bereaksi berlebihan terhadap suatu antigen (baik dari luar tubuh seperti alergen dan obat, maupun dari tubuh sendiri seperti pada penyakit autoimun) sehingga menimbulkan kerusakan jaringan. Klasifikasi Gell & Coombs membagi reaksi ini menjadi empat tipe berdasarkan mekanisme imunologis yang mendasarinya — pembagian ini penting secara klinis karena menentukan kecepatan onset gejala, jenis pemeriksaan penunjang yang relevan, dan pilihan terapi.']},
    {h:'Klasifikasi', list:['Tipe I (Immediate) — diperantarai IgE: antigen (alergen) berikatan dengan IgE yang sudah menempel di permukaan sel mast dan basofil, memicu degranulasi cepat (dalam hitungan menit) yang melepaskan histamin dan mediator inflamasi lain, menimbulkan gejala klasik alergi seperti urtikaria, bronkospasme, hingga anafilaksis.','Tipe II (Sitotoksik) — diperantarai IgM/IgG: antibodi menempel langsung pada antigen yang berada di permukaan sel tubuh sendiri (atau sel donor pada transfusi), mengaktifkan sistem komplemen atau menarik sel fagosit untuk menghancurkan sel yang "ditandai" tersebut — contoh klasiknya adalah reaksi hemolisis pada AIHA atau reaksi transfusi inkompatibel.','Tipe III (Kompleks Imun) — diperantarai IgG: berbeda dari tipe II yang antibodinya menempel langsung pada sel, pada tipe ini antigen dan antibodi membentuk kompleks yang bersirkulasi bebas dalam darah terlebih dahulu, baru kemudian mengendap di jaringan tertentu (ginjal, sendi, pembuluh darah kecil) dan memicu inflamasi lokal di tempat pengendapannya.','Tipe IV (T-cell mediated / Delayed): berbeda dari ketiga tipe lain yang melibatkan antibodi, tipe ini sepenuhnya diperantarai sel T (baik T helper maupun T sitotoksik) tanpa melibatkan antibodi sama sekali — karena membutuhkan waktu bagi sel T untuk teraktivasi dan bermigrasi ke lokasi antigen, reaksi ini baru muncul 24–72 jam setelah paparan (delayed), jauh lebih lambat dibanding tipe I yang immediate.']},
  ],
  table:{title:'Contoh Klinis per Tipe Hipersensitivitas', head:['Tipe I','Tipe II','Tipe III','Tipe IV'],
    rows:[[
      'Alergi makanan, asma, urtikaria, anafilaksis',
      'AIHA, reaksi transfusi, rheumatic heart disease, penyakit Graves, myastenia gravis, Goodpasture syndrome',

      'Dermatitis kontak, tes Mantoux, penyakit celiac, diabetes melitus, multiple sklerosis',
    ]]},

{
  id:'anafilaksis', cat:'imunologi', level:'4A', title:'Reaksi Anafilaksis',
  sub:'Reaksi hipersensitivitas tipe I berat diperantarai IgE, berpotensi mengancam nyawa.',
  sections:[
    {h:'Definisi & Patofisiologi', list:['Anafilaksis adalah bentuk paling berat dari reaksi hipersensitivitas tipe I, terjadi saat paparan ulang alergen memicu degranulasi masif sel mast dan basofil di seluruh tubuh secara sistemik (bukan lokal seperti pada alergi biasa), melepaskan histamin dan mediator inflamasi lain dalam jumlah besar ke sirkulasi.','Mediator yang dilepas menyebabkan vasodilatasi luas dan peningkatan permeabilitas kapiler di seluruh tubuh, sehingga cairan intravaskular bocor ke jaringan interstisial — inilah yang menyebabkan syok anafilaktik, yaitu syok distributif akibat volume darah efektif yang menurun drastis meski volume cairan tubuh total tidak berkurang. Mediator yang sama juga menyebabkan bronkospasme dan edema laring, sumber utama kematian pada anafilaksis bila jalan napas tidak segera diamankan.']},
    {h:'Etiologi', list:['Alergi makanan (kacang, seafood, telur, susu, dan lainnya) — termasuk pemicu tersering terutama pada anak.','Alergi obat (NSAID, antibiotik golongan penisilin/sefalosporin, dan lainnya) — sering menjadi pemicu pada dewasa, termasuk pada prosedur medis seperti transfusi atau pemberian obat suntik.']},
    {h:'Kriteria Diagnosis', list:[
      'Kriteria 1: Hipotensi (tekanan darah sistolik <90 mmHg) yang muncul setelah paparan alergen.',
      'Kriteria 2: Gejala kulit/mukosa akut (urtikaria, angioedema) disertai minimal 1 dari: hipotensi/penurunan kesadaran/nyeri dada/anuria, ATAU gejala respirasi (sesak, hipoksia, mengi, batuk) — kombinasi gejala kulit dengan gejala sistemik lain inilah yang paling sering dipakai untuk menegakkan diagnosis di lapangan.',
      'Kriteria 3: Munculnya ≥2 gejala setelah paparan alergen dari kategori GIT (mual, muntah, nyeri perut), hipotensi/penurunan kesadaran, respirasi, dan kulit/mukosa — berguna terutama saat gejala kulit tidak dominan atau tidak muncul.',
      'Diagnosis anafilaksis ditegakkan bila minimal 1 dari 3 kriteria di atas terpenuhi.',
    ]},

    {h:'Thrombocyte Concentrate', list:['Diberikan pada perdarahan akibat trombositopenia atau gangguan fungsi trombosit, untuk menggantikan trombosit yang kurang/tidak berfungsi.','Sebagai pencegahan perdarahan spontan bila trombosit <10.000/µL, ambang di mana risiko perdarahan spontan meningkat tajam meski tanpa trauma.','Profilaksis sebelum operasi bila trombosit <50.000/µL (kecuali untuk operasi berisiko tinggi seperti trepanasi/kraniotomi dan kardiovaskular yang membutuhkan ambang lebih tinggi, <100.000/µL, mengingat konsekuensi perdarahan pada area tersebut jauh lebih berbahaya).']},

{

  question:'Apakah diagnosis yang paling mungkin?',

},
{
  vignette:'Seorang laki-laki berusia 55 tahun datang dengan keluhan benjolan multipel tidak nyeri di leher, ketiak, dan lipat paha sejak 2 bulan, disertai penurunan berat badan 8 kg dan keringat malam. Pemeriksaan fisik ditemukan limfadenopati generalisata dan splenomegali. Biopsi kelenjar getah bening menunjukkan proliferasi limfosit B monomorfik tanpa sel Reed-Sternberg. Imunohistokimia CD20 positif.',
  question:'Apakah diagnosis yang paling mungkin?',

},
{
  vignette:'Seorang anak perempuan berusia 8 tahun dibawa ibunya karena benjolan di leher kanan yang nyeri sejak 5 hari, disertai demam. Dua minggu sebelumnya pasien mengalami luka pada kulit kepala yang bernanah. Pemeriksaan fisik: limfadenopati servikal kanan, nyeri tekan (+), hangat, teraba fluktuasi. Tidak ditemukan gejala B (penurunan berat badan/keringat malam).',

{

{

{

{

},
{

},
{

},
{

{

},

},

{

},
{

{

  explain:'Trombosit <10.000/µL merupakan indikasi transfusi profilaksis untuk mencegah perdarahan spontan, dan sebelum tindakan invasif seperti pemasangan kateter, transfusi <b>Thrombocyte Concentrate</b> diperlukan untuk mencapai kadar aman.'
},
{
  vignette:'Seorang laki-laki berusia 60 tahun dengan CKD stage 5 rutin menjalani hemodialisis. Pasien mengeluh lemas kronik. Laboratorium: Hb 8,5 g/dL, MCV normal, kadar eritropoietin serum sangat rendah, feritin dan cadangan besi cukup.',
  question:'Apakah tatalaksana yang paling tepat untuk mengatasi anemia pasien ini?',

  explain:'Anemia pada CKD terjadi akibat defisiensi produksi eritropoietin oleh ginjal, sehingga tatalaksana lini utama (dengan cadangan besi yang sudah cukup) adalah <b>suplementasi eritropoietin (Erythropoiesis-Stimulating Agent/ESA)</b>, bukan transfusi rutin yang berisiko komplikasi jangka panjang.'
},
{

  question:'Apakah kondisi yang mendasari keluhan pasien ini?',

  answer:1,
  explain:'Dapson termasuk obat dengan risiko pasti (definite risk) memicu hemolisis pada individu dengan <b>defisiensi G6PD</b>. Gejala hemolisis akut (urin gelap, ikterus, lemas) muncul beberapa hari setelah paparan obat oksidatif tersebut.'
},
{
  vignette:'Seorang bayi berusia 3 bulan dengan riwayat diare kronik sejak usia 1 bulan dan mendapat ASI eksklusif tanpa suplementasi vitamin K tambahan, dibawa ke IGD dengan kejang dan penurunan kesadaran mendadak. CT-scan kepala menunjukkan perdarahan intrakranial luas.',
  question:'Apakah klasifikasi VKDB yang paling mungkin dialami bayi ini?',
  options:['Early-onset VKDB','Classic VKDB','Late-onset VKDB','VKDB akibat obat maternal','Bukan VKDB'],
  answer:2,
  explain:'VKDB yang terjadi pada usia 2–8 bulan, berhubungan dengan diare kronik (malabsorpsi vitamin K) dan ASI eksklusif tanpa profilaksis, dengan manifestasi tersering berupa <b>perdarahan intrakranial</b>, merupakan <b>Late-onset VKDB</b> — bentuk paling berbahaya karena sering terlambat dikenali.'
},
{
  vignette:'Seorang anak laki-laki berusia 6 tahun dengan riwayat HSP 3 minggu yang lalu (sudah membaik) datang kontrol dan ditemukan urin berwarna seperti teh disertai edema kelopak mata ringan. Urinalisis menunjukkan hematuria dan proteinuria ringan.',
  question:'Apakah komplikasi yang paling mungkin terjadi pada pasien ini?',
  options:['Gagal ginjal akut e.c. NSAID','IgA Nefropati (nefritis HSP)','Sindrom nefrotik primer','Infeksi saluran kemih','Glomerulonefritis pasca-streptokokus'],
  answer:1,

},
{
  vignette:'Seorang laki-laki berusia 40 tahun datang dengan keluhan lemas dan mudah memar sejak 3 minggu. Pemeriksaan fisik: hepatosplenomegali, limfadenopati generalisata. Laboratorium: leukosit 95.000/µL, Hb 7,5 g/dL, trombosit 30.000/µL. Dokter merencanakan pemeriksaan penunjang untuk konfirmasi diagnosis leukemia.',
